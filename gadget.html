<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>録画ガジェット</title>
  <style>
    :root { color-scheme: dark; }
    html, body {
      margin: 0;
      padding: 0;
      background: transparent;
      overflow: hidden;
      font-family: system-ui, -apple-system, "Segoe UI", "Hiragino Kaku Gothic ProN", "Noto Sans JP", sans-serif;
      -webkit-user-select: none;
      user-select: none;
    }
    /* タイトルバーの代わりにカード全体をドラッグ可能にする。
       ボタンやプレビューは drag を無効化してクリックできるようにする。 */
    .card {
      -webkit-app-region: drag;
      box-sizing: border-box;
      width: 100%;
      height: 100vh;
      background: rgba(20, 22, 28, 0.92);
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 14px;
      box-shadow: 0 8px 30px rgba(0, 0, 0, 0.45);
      color: #f3f4f6;
      padding: 12px 14px;
      display: grid;
      grid-template-columns: 1fr auto;
      grid-template-rows: auto 1fr auto;
      gap: 8px 12px;
      align-items: center;
    }
    .rec-dot {
      display: inline-block;
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #ef4444;
      margin-right: 6px;
      animation: blink 1.4s infinite;
      vertical-align: middle;
    }
    @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.25; } }
    .head { grid-column: 1 / 2; font-size: 0.8rem; color: #cbd5e1; }
    .name {
      max-width: 150px;
      display: inline-block;
      vertical-align: middle;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .time {
      grid-column: 1 / 2;
      font-variant-numeric: tabular-nums;
      font-size: 1.5rem;
      font-weight: 700;
      letter-spacing: 0.04em;
    }
    .count { font-size: 0.8rem; color: #9ca3af; margin-left: 8px; font-weight: 400; }
    .preview {
      grid-column: 2 / 3;
      grid-row: 1 / 3;
      -webkit-app-region: no-drag;
      width: 96px;
      height: 60px;
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.12);
      object-fit: cover;
      display: block;
    }
    .preview-empty {
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.65rem;
      color: #6b7280;
    }
    .stop {
      -webkit-app-region: no-drag;
      grid-column: 1 / 3;
      grid-row: 3 / 4;
      cursor: pointer;
      border: none;
      border-radius: 9px;
      padding: 8px 10px;
      font: inherit;
      font-weight: 700;
      color: #fff;
      background: #ef4444;
      transition: background 0.15s;
    }
    .stop:hover { background: #dc2626; }
    /* 失敗・権限拒否などの警告。撮影できていないことに気づかせる。 */
    .warn {
      -webkit-app-region: no-drag;
      grid-column: 1 / 3;
      grid-row: 4 / 5;
      margin-top: 2px;
      padding: 6px 8px;
      border-radius: 8px;
      background: rgba(239, 68, 68, 0.16);
      border: 1px solid rgba(239, 68, 68, 0.55);
      color: #fca5a5;
      font-size: 0.72rem;
      line-height: 1.3;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="head">
      <span class="rec-dot"></span>録画中
      <span class="name" id="name" title=""></span>
    </div>
    <div class="time"><span id="time">00:00</span><span class="count" id="count">0 枚</span></div>
    <img class="preview" id="preview" alt="" hidden />
    <div class="preview preview-empty" id="preview-empty">プレビュー</div>
    <button class="stop" id="stop">■ 録画停止</button>
    <div class="warn" id="warn" hidden></div>
  </div>

  <script>
    (function () {
      'use strict';
      const elName = document.getElementById('name');
      const elTime = document.getElementById('time');
      const elCount = document.getElementById('count');
      const elPreview = document.getElementById('preview');
      const elPreviewEmpty = document.getElementById('preview-empty');
      const elWarn = document.getElementById('warn');
      const btnStop = document.getElementById('stop');

      let startTime = Date.now();

      function fmt(ms) {
        const total = Math.floor(ms / 1000);
        const h = Math.floor(total / 3600);
        const m = Math.floor((total % 3600) / 60);
        const s = total % 60;
        const p = (n) => String(n).padStart(2, '0');
        return h > 0 ? `${h}:${p(m)}:${p(s)}` : `${p(m)}:${p(s)}`;
      }
      setInterval(() => {
        elTime.textContent = fmt(Date.now() - startTime);
      }, 250);

      const api = window.recorderAPI;
      if (api) {
        api.onGadgetInit((d) => {
          if (d && typeof d.startTime === 'number') startTime = d.startTime;
          if (d && d.name) {
            elName.textContent = d.name;
            elName.title = d.name;
          }
        });
        api.onGadgetUpdate((d) => {
          if (!d) return;
          elCount.textContent = `${d.count} 枚`;
          if (d.preview) {
            elPreview.src = d.preview;
            elPreview.hidden = false;
            elPreviewEmpty.hidden = true;
          }
        });
        if (api.onGadgetWarn) {
          api.onGadgetWarn((d) => {
            if (!d || !d.message) return;
            elWarn.textContent = '⚠ ' + d.message;
            elWarn.hidden = false;
          });
        }
        btnStop.addEventListener('click', () => api.stopRecording());
      }
    })();
  </script>
</body>
</html>
