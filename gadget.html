<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>録画ガジェット</title>
  <style>
    :root { color-scheme: dark; }
    html, body {
      margin: 0;
      padding: 0;
      background: transparent;
      overflow: hidden;
      font-family: system-ui, -apple-system, "Segoe UI", "Hiragino Kaku Gothic ProN", "Noto Sans JP", sans-serif;
      -webkit-user-select: none;
      user-select: none;
    }
    /* タイトルバーの代わりにカード全体をドラッグ可能にする。
       ボタンやプレビューは drag を無効化してクリックできるようにする。 */
    .card {
      -webkit-app-region: drag;
      box-sizing: border-box;
      width: 100%;
      height: 100vh;
      background: rgba(20, 22, 28, 0.92);
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 14px;
      box-shadow: 0 8px 30px rgba(0, 0, 0, 0.45);
      color: #f3f4f6;
      padding: 12px 14px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .rec-dot {
      display: inline-block;
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #ef4444;
      margin-right: 6px;
      animation: blink 1.4s infinite;
      vertical-align: middle;
    }
    @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.25; } }
    /* ready（録画前）では点滅ドットを出さず、タイマーも 00:00 のまま */
    .card[data-mode='ready'] .rec-dot { display: none; }
    .card[data-mode='ready'] .time { color: #9ca3af; }
    .head { font-size: 0.8rem; color: #cbd5e1; }
    .close {
      -webkit-app-region: no-drag;
      float: right;
      border: none;
      background: transparent;
      color: #9ca3af;
      font: inherit;
      font-size: 0.9rem;
      cursor: pointer;
      padding: 0 2px;
      line-height: 1;
    }
    .close:hover { color: #f3f4f6; }
    .name {
      max-width: 150px;
      display: inline-block;
      vertical-align: middle;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .time {
      font-variant-numeric: tabular-nums;
      font-size: 1.5rem;
      font-weight: 700;
      letter-spacing: 0.04em;
    }
    .count { font-size: 0.8rem; color: #9ca3af; margin-left: 8px; font-weight: 400; }
    /* 直近6枚のプレビュー（3列×2行、新しい順）。クリックで保存フォルダを開く。 */
    .grid {
      -webkit-app-region: no-drag;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 4px;
      cursor: pointer;
    }
    .cell {
      aspect-ratio: 16 / 10;
      border-radius: 6px;
      overflow: hidden;
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.12);
    }
    .cell img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .opt {
      -webkit-app-region: no-drag;
      font-size: 0.75rem;
      color: #cbd5e1;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .opt input { accent-color: #ef4444; }
    .toggle {
      -webkit-app-region: no-drag;
      cursor: pointer;
      border: none;
      border-radius: 9px;
      padding: 8px 10px;
      font: inherit;
      font-weight: 700;
      color: #fff;
      background: #ef4444;
      transition: background 0.15s;
    }
    .toggle:hover { background: #dc2626; }
    /* ready では緑の「録画開始」ボタンにする */
    .card[data-mode='ready'] .toggle { background: #16a34a; }
    .card[data-mode='ready'] .toggle:hover { background: #15803d; }
    /* 失敗・権限拒否などの警告。撮影できていないことに気づかせる。 */
    .warn {
      -webkit-app-region: no-drag;
      margin-top: 2px;
      padding: 6px 8px;
      border-radius: 8px;
      background: rgba(239, 68, 68, 0.16);
      border: 1px solid rgba(239, 68, 68, 0.55);
      color: #fca5a5;
      font-size: 0.72rem;
      line-height: 1.3;
    }
  </style>
</head>
<body>
  <div class="card" id="card" data-mode="ready">
    <div class="head">
      <span class="rec-dot"></span><span id="label">録画準備</span>
      <span class="name" id="name" title=""></span>
      <button class="close" id="close" title="閉じる（録画中なら停止）">✕</button>
    </div>
    <div class="time"><span id="time">00:00</span><span class="count" id="count">0 枚</span></div>
    <div class="grid" id="grid" title="クリックで保存フォルダを開く">
      <div class="cell"><img alt="" hidden /></div>
      <div class="cell"><img alt="" hidden /></div>
      <div class="cell"><img alt="" hidden /></div>
      <div class="cell"><img alt="" hidden /></div>
      <div class="cell"><img alt="" hidden /></div>
      <div class="cell"><img alt="" hidden /></div>
    </div>
    <label class="opt"><input type="checkbox" id="marker" checked />クリック位置に赤丸を付ける</label>
    <button class="toggle" id="toggle">● 録画開始</button>
    <div class="warn" id="warn" hidden></div>
  </div>

  <script>
    (function () {
      'use strict';
      const elCard = document.getElementById('card');
      const elLabel = document.getElementById('label');
      const elName = document.getElementById('name');
      const elTime = document.getElementById('time');
      const elCount = document.getElementById('count');
      const elGrid = document.getElementById('grid');
      const gridImgs = [...elGrid.querySelectorAll('img')];
      const elMarker = document.getElementById('marker');
      const elWarn = document.getElementById('warn');
      const btnToggle = document.getElementById('toggle');
      const btnClose = document.getElementById('close');

      // 直近のプレビュー（新しい順・最大6枚）。7枚目以降は最古を押し出す。
      const previews = [];
      function renderGrid() {
        gridImgs.forEach((img, i) => {
          if (previews[i]) { img.src = previews[i]; img.hidden = false; }
          else { img.removeAttribute('src'); img.hidden = true; }
        });
      }

      // ready = 表示直後（撮影しない） / recording = 録画中
      let mode = 'ready';
      let startTime = Date.now();

      function refreshUI() {
        elCard.dataset.mode = mode;
        elLabel.textContent = mode === 'recording' ? '録画中' : '録画準備';
        btnToggle.textContent = mode === 'recording' ? '■ 録画停止' : '● 録画開始';
        if (mode !== 'recording') elTime.textContent = '00:00';
      }

      function fmt(ms) {
        const total = Math.floor(ms / 1000);
        const h = Math.floor(total / 3600);
        const m = Math.floor((total % 3600) / 60);
        const s = total % 60;
        const p = (n) => String(n).padStart(2, '0');
        return h > 0 ? `${h}:${p(m)}:${p(s)}` : `${p(m)}:${p(s)}`;
      }
      setInterval(() => {
        if (mode === 'recording') elTime.textContent = fmt(Date.now() - startTime);
      }, 250);

      const api = window.recorderAPI;
      if (api) {
        api.onGadgetInit((d) => {
          if (d && typeof d.startTime === 'number') startTime = d.startTime;
          if (d && d.mode) mode = d.mode;
          if (d && d.name) {
            elName.textContent = d.name;
            elName.title = d.name;
          }
          if (d && typeof d.markerOn === 'boolean') elMarker.checked = d.markerOn;
          refreshUI();
        });
        api.onGadgetUpdate((d) => {
          if (!d) return;
          elCount.textContent = `${d.count} 枚`;
          if (d.preview) {
            previews.unshift(d.preview);
            if (previews.length > 6) previews.pop();
            renderGrid();
          }
        });
        if (api.onGadgetWarn) {
          api.onGadgetWarn((d) => {
            if (!d || !d.message) return;
            elWarn.textContent = '⚠ ' + d.message;
            elWarn.hidden = false;
          });
        }
        // 録画開始 ⇔ 録画停止のトグル。停止以降の挙動（ガジェットを閉じて
        // 保存フォルダを開く）はメインプロセス側の stopRecording に委ねる。
        btnToggle.addEventListener('click', async () => {
          if (mode === 'recording') { api.stopRecording(); return; }
          const r = await api.beginCapture();
          if (r && r.ok) {
            if (typeof r.startTime === 'number') startTime = r.startTime;
            mode = 'recording';
            refreshUI();
          }
        });
        // プレビュー（グリッド）クリックで保存フォルダをエクスプローラーで開く
        elGrid.addEventListener('click', () => api.openShotsDir());
        // クリック位置の赤丸 ON/OFF
        elMarker.addEventListener('change', () => api.setMarker(elMarker.checked));
      }
      // ✕: ウインドウを閉じる。録画中ならメイン側の closed ハンドラが停止処理を行う。
      btnClose.addEventListener('click', () => window.close());
      refreshUI();
    })();
  </script>
</body>
</html>
