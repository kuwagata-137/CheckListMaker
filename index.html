              <div class="ce-grp">
                <div class="ce-lbl">差し色（アクセントカラー）</div>
                <div class="ce-swatches">
                  ${SWATCHES.map(([hex, name]) => `<span class="ce-swatch" data-color="${hex}" title="${name}" style="background:${hex}"></span>`).join('')}
                  <label class="ce-swatch ce-swatch-custom" title="任意の色"><input type="color" data-ce="custom-color" /></label>
                </div>
              </div>
              <div class="ce-grp">
                <div class="ce-lbl">ロゴ画像 <span class="hint">（任意）</span></div>
                <div class="ce-logo-row">
                  <div class="ce-logo-box" data-ce="logo-box"></div>
                  <button class="btn" data-ce="logo-pick">画像を選択 / 差し替え</button>
                  <button class="btn" data-ce="logo-del">削除</button>
                </div>
              </div>
              <div class="ce-grp">
                <div class="ce-lbl">テキスト</div>
                <div class="ce-fields">
                  <label class="ce-field col2">タイトル（大見出し）<input data-ce-field="title" /></label>
                  <label class="ce-field col2">サブタイトル・説明<input data-ce-field="subtitle" /></label>
                  <label class="ce-field">作成者・組織名<input data-ce-field="author" /></label>
                  <label class="ce-field">日付<input data-ce-field="date" /></label>
                  <label class="ce-field">バージョン / 版数<input data-ce-field="version" /></label>
                  <label class="ce-field">文書番号（任意）<input data-ce-field="docNumber" /></label>
                </div>
              </div>
              <div class="ce-grp">
                <div class="ce-lbl">改訂履歴 <span class="hint">（行の追加/削除）</span></div>
                <table class="ce-rev"><thead><tr><th style="width:64px">版</th><th style="width:104px">日付</th><th style="width:80px">作成者</th><th>内容</th><th style="width:26px"></th></tr></thead>
                  <tbody data-ce="rev-body"></tbody></table>
                <button class="ce-addrow" data-ce="rev-add">＋ 行を追加</button>
              </div>
            </div>
            <div class="ce-preview">
              <div class="ce-plbl">プレビュー</div>
              <div class="cover-stage" data-ce="preview"></div>
              <div class="ce-note" data-ce="note"></div>
            </div>
          </div>
          <div class="modal-actions"><button class="btn primary" data-close>完了</button></div>
        </div>`;
      document.body.appendChild(overlay);

      const $ = (sel) => overlay.querySelector(sel);
      const presetGrid = $('[data-ce="presets"]');
      const previewStage = $('[data-ce="preview"]');
      const revBody = $('[data-ce="rev-body"]');

      function persist() {
        store.commit((s) => {
          const c = M.findChecklist(s, checklistId);
          c.coverPage = JSON.parse(JSON.stringify(draft));
          c.updatedAt = Date.now();
        });
      }
      function renderRevRows() {
        revBody.innerHTML = (draft.revisions || []).map((r) => `
          <tr data-id="${r.id}">
            <td><input data-rev="version" value="${escapeHtml(r.version || '')}" /></td>
            <td><input data-rev="date" value="${escapeHtml(r.date || '')}" /></td>
            <td><input data-rev="author" value="${escapeHtml(r.author || '')}" /></td>
            <td><input data-rev="note" value="${escapeHtml(r.note || '')}" /></td>
            <td><button class="ce-rev-del" data-rev-del title="削除">🗑</button></td>
          </tr>`).join('');
      }
      function refresh() {
        previewStage.innerHTML = renderCoverHtml(draft, fallbackTitle);
        presetGrid.innerHTML = COVER_PRESETS.map((id) => {
          const d = Object.assign({}, draft, { preset: id });
          return `<div class="ce-preset ${id === draft.preset ? 'sel' : ''}" data-preset="${id}">
            <div class="cover-stage">${renderCoverHtml(d, fallbackTitle)}</div>
            <div class="pname">${COVER_PRESET_NAMES[id]}</div></div>`;
        }).join('');
        overlay.querySelectorAll('.ce-swatch[data-color]').forEach((sw) =>
          sw.classList.toggle('sel', sw.dataset.color.toLowerCase() === (draft.accent || '').toLowerCase()));
        $('[data-ce="logo-box"]').innerHTML = draft.logo ? `<img src="${draft.logo}" alt="" />` : 'なし';
        const tg = $('[data-ce="toggle"]');
        tg.classList.toggle('on', !!draft.enabled);
        tg.style.setProperty('--cover-accent', draft.accent || '#3b6ea5');
        $('[data-ce="note"]').innerHTML = `選択中: <b>${COVER_PRESET_NAMES[draft.preset] || ''}</b><br>印刷/PDF では、この表紙が先頭ページになります。`;
        scaleCoverStages(overlay);
      }

      overlay.querySelectorAll('[data-ce-field]').forEach((inp) => { inp.value = draft[inp.dataset.ceField] || ''; });
      renderRevRows();
      refresh();

      const onResize = () => scaleCoverStages(overlay);
      function close() { window.removeEventListener('resize', onResize); closeModal(overlay); }

      overlay.addEventListener('click', (e) => {
        if (e.target === overlay || e.target.closest('[data-close]')) return close();
        const presetEl = e.target.closest('[data-preset]');
        if (presetEl) { draft.preset = presetEl.dataset.preset; persist(); refresh(); return; }
        const sw = e.target.closest('.ce-swatch[data-color]');
        if (sw) { draft.accent = sw.dataset.color; persist(); refresh(); return; }
        if (e.target.closest('[data-ce="toggle"]')) { draft.enabled = !draft.enabled; persist(); refresh(); return; }
        if (e.target.closest('[data-ce="logo-pick"]')) { pickCoverLogo(); return; }
        if (e.target.closest('[data-ce="logo-del"]')) { draft.logo = ''; persist(); refresh(); return; }
        if (e.target.closest('[data-ce="rev-add"]')) {
          if (!draft.revisions) draft.revisions = [];
          draft.revisions.push(M.createRevision());
          persist(); renderRevRows(); refresh(); return;
        }
        const del = e.target.closest('[data-rev-del]');
        if (del) {
          const tr = del.closest('tr');
          draft.revisions = (draft.revisions || []).filter((r) => r.id !== tr.dataset.id);
          persist(); renderRevRows(); refresh(); return;
        }
      });
      // 入力中はプレビュー即時更新（commit は change で）
      overlay.addEventListener('input', (e) => {
        const f = e.target.closest('[data-ce-field]');
        if (f) { draft[f.dataset.ceField] = e.target.value; refresh(); return; }
        if (e.target.matches('[data-ce="custom-color"]')) { draft.accent = e.target.value; refresh(); return; }
        const rev = e.target.closest('[data-rev]');
        if (rev) {
          const tr = rev.closest('tr');
          const r = (draft.revisions || []).find((x) => x.id === tr.dataset.id);
          if (r) { r[rev.dataset.rev] = e.target.value; refresh(); }
        }
      });
      overlay.addEventListener('change', (e) => {
        if (e.target.closest('[data-ce-field]') || e.target.matches('[data-ce="custom-color"]') || e.target.closest('[data-rev]')) persist();
      });

      function pickCoverLogo() {
        const inp = document.createElement('input');
        inp.type = 'file'; inp.accept = 'image/*';
        inp.addEventListener('change', async () => {
          const f = inp.files && inp.files[0];
          if (!f) return;
          try {
            draft.logo = await compressImage(await blobToDataUrl(f), 400, 0.85);
            persist(); refresh();
          } catch (err) { alert(err.message || '画像の追加に失敗しました'); }
        });
        inp.click();
      }

      window.addEventListener('resize', onResize);
    }

    // =========================================================================
    // images — スクリーンショットの貼り付け・圧縮保存・ペイント編集
    // =========================================================================
    const IMG_MAX_EDGE = 1600; // 長辺の上限(px)。これを超える画像は縮小する
    const IMG_QUALITY = 0.85;  // JPEG 品質

    function blobToDataUrl(blob) {
      return new Promise((res, rej) => {
        const r = new FileReader();
        r.onload = () => res(r.result);
        r.onerror = () => rej(new Error('画像の読み込みに失敗しました'));
        r.readAsDataURL(blob);
      });
    }
    // 長辺 IMG_MAX_EDGE までリサイズし JPEG 圧縮した dataURL を返す。
    function compressImage(srcDataUrl, maxEdge = IMG_MAX_EDGE, quality = IMG_QUALITY) {
      return new Promise((res, rej) => {
        const img = new Image();
        img.onload = () => {
          let w = img.naturalWidth, h = img.naturalHeight;
          const scale = Math.min(1, maxEdge / Math.max(w, h));
          w = Math.max(1, Math.round(w * scale));
          h = Math.max(1, Math.round(h * scale));
          const cv = document.createElement('canvas');
          cv.width = w; cv.height = h;
          cv.getContext('2d').drawImage(img, 0, 0, w, h);
          res(cv.toDataURL('image/jpeg', quality));
        };
        img.onerror = () => rej(new Error('画像の解析に失敗しました'));
        img.src = srcDataUrl;
      });
    }
    function findItemLive(checklistId, sectionId, itemId) {
      const cc = M.findChecklist(store.state, checklistId);
      const sec = cc && cc.sections.find((x) => x.id === sectionId);
      return sec ? sec.items.find((x) => x.id === itemId) : null;
    }
    // 保存に失敗（localStorage 上限）したら取り消して false を返す。
    function commitImage(mutator) {
      store.commit(mutator);
      if (store.lastSaveOk === false) {
        store.undo();
        alert('保存容量の上限に達したため保存できませんでした。\n不要な画像やリストを減らすか、JSON エクスポートで退避してください。');
        return false;
      }
      return true;
    }
    async function addImageFromBlob(c, sectionId, itemId, blob, openEditor) {
      try {
        const compressed = await compressImage(await blobToDataUrl(blob));
        const ok = commitImage((s) =>
          M.addItemImage(M.findChecklist(s, c.id), sectionId, itemId, compressed)
        );
        if (ok && openEditor) {
          const item = findItemLive(c.id, sectionId, itemId);
          const idx = item ? item.images.length - 1 : -1;
          if (idx >= 0) openImageEditor(c, sectionId, itemId, idx);
        }
      } catch (err) {
        alert(err.message || '画像の追加に失敗しました');
      }
    }
    function pickAndAddImage(c, sectionId, itemId) {
      const inp = document.createElement('input');
      inp.type = 'file';
      inp.accept = 'image/*';
      inp.addEventListener('change', () => {
        const f = inp.files && inp.files[0];
        if (f) addImageFromBlob(c, sectionId, itemId, f, true);
      });
      inp.click();
    }

    // クリップボードからの画像貼り付け。フォーカス中の手順/項目に添付する。
    document.addEventListener('paste', (e) => {
      const c = currentChecklist();
      if (!c) return;
      const dt = e.clipboardData;
      if (!dt) return;
      let blob = null;
      for (const it of dt.items || []) {
        if (it.kind === 'file' && it.type && it.type.startsWith('image/')) {
          blob = it.getAsFile();
          break;
        }
      }
      if (!blob) return;
      const host = document.activeElement && document.activeElement.closest
        ? document.activeElement.closest('.item')
        : null;
      if (!host) return; // 貼り付け先の手順が不明な場合は何もしない
      e.preventDefault();
      addImageFromBlob(c, host.dataset.section, host.dataset.item, blob, true);
    });

    // エクスプローラ等からの画像ドラッグ＆ドロップ。ドロップ先の手順（.item）へ添付する。
    // 外部ファイル（dataTransfer.files 有り）のときだけ扱い、アイテム並び替えの内部 DnD とは干渉しない。
    function dropTargetItem(e) {
      const el = e.target && e.target.closest ? e.target.closest('.item') : null;
      return el && el.dataset && el.dataset.section && el.dataset.item ? el : null;
    }
    function hasFiles(dt) {
      if (!dt) return false;
      if (dt.types && Array.prototype.indexOf.call(dt.types, 'Files') !== -1) return true;
      return !!(dt.files && dt.files.length);
    }
    let dropHi = null; // ドロップ先ハイライト中の要素
    function clearDropHi() { if (dropHi) { dropHi.classList.remove('drop-target'); dropHi = null; } }
    document.addEventListener('dragover', (e) => {
      if (!currentChecklist() || !hasFiles(e.dataTransfer)) return;
      const host = dropTargetItem(e);
      if (!host) { clearDropHi(); return; }
      e.preventDefault(); // ドロップを許可
      try { e.dataTransfer.dropEffect = 'copy'; } catch (_) {}
      if (dropHi !== host) { clearDropHi(); dropHi = host; host.classList.add('drop-target'); }
    });
    document.addEventListener('dragleave', (e) => {
      // ウィンドウ外/対象外へ抜けたらハイライト解除。
      if (!e.relatedTarget) clearDropHi();
    });
    document.addEventListener('drop', (e) => {
      const c = currentChecklist();
      if (!c || !hasFiles(e.dataTransfer)) return;
      const host = dropTargetItem(e);
      clearDropHi();
      if (!host) return;
      const files = Array.from(e.dataTransfer.files || []).filter((f) => f.type && f.type.startsWith('image/'));
      if (!files.length) return;
      e.preventDefault();
      // 1 枚なら編集モーダルを開く（paste と同挙動）。複数は順に挿入のみ。
      files.forEach((f, i) => addImageFromBlob(c, host.dataset.section, host.dataset.item, f, files.length === 1 && i === 0));
    });

    // ペイント編集モーダル。矢印/四角/丸・ペン・ハイライト・テキスト・モザイク・
    // トリミングに対応。Undo は標準搭載。保存時に JPEG 圧縮して item に書き戻す。
    function openImageEditor(c, sectionId, itemId, index) {
      const item = findItemLive(c.id, sectionId, itemId);
      if (!item || !Array.isArray(item.images) || item.images[index] === undefined) return;
      const srcUrl = item.images[index];

      const overlay = document.createElement('div');
      overlay.className = 'modal-overlay';
      overlay.innerHTML = `
        <div class="modal img-editor" role="dialog" aria-modal="true">
          <div class="ie-toolbar">
            <div class="ie-tools">
              <button class="ie-tool" data-tool="hand" title="ハンド（画像を移動）">✋</button>
              <button class="ie-tool" data-tool="arrow" title="矢印">↗</button>
              <button class="ie-tool" data-tool="rect" title="四角">▢</button>
              <button class="ie-tool" data-tool="ellipse" title="丸">◯</button>
              <button class="ie-tool" data-tool="callout" title="吹き出し（コメント）">💬</button>
              <button class="ie-tool" data-tool="pen" title="フリーハンドペン">✏</button>
              <button class="ie-tool" data-tool="marker" title="ハイライト">🖍</button>
              <button class="ie-tool" data-tool="eraser" title="消しゴム（描いた注釈だけ消す）">⌫</button>
              <button class="ie-tool" data-tool="text" title="テキスト">T</button>
              <button class="ie-tool" data-tool="mosaic" title="モザイク/ぼかし">▦</button>
              <button class="ie-tool" data-tool="crop" title="トリミング">⛶</button>
            </div>
            <span class="ie-crop-actions" hidden>
              <button type="button" class="btn primary ie-crop-apply">トリミング適用</button>
              <button type="button" class="btn ie-crop-cancel">取消</button>
            </span>
            <label class="ie-color" title="色"><input type="color" value="#ff3b30" /></label>
            <label class="ie-size" title="線の太さ"><input type="range" min="1" max="40" value="6" /></label>
            <span class="ie-zoom" title="編集中の表示倍率（拡大縮小しても保存される画像の仕上がりは変わりません）">
              🔍
              <input type="range" class="ie-zoom-range" min="10" max="400" step="5" value="100" aria-label="表示倍率" />
              <input type="number" class="ie-zoom-num" min="10" max="400" step="5" value="100" aria-label="表示倍率（％）" />%
              <button type="button" class="ie-zoom-fit" title="画面に収まる倍率に合わせる">フィット</button>
            </span>
            <button class="btn ie-undo" title="元に戻す">↶ 元に戻す</button>
          </div>
          <div class="ie-canvas-wrap"><canvas class="ie-canvas"></canvas></div>
          <p class="ie-hint">ドラッグで描画。テキストはクリック位置に入力（Enterで確定）。吹き出しはクリックで挿入（既定文「ここをクリック」）→文字数で自動リサイズ、尻尾の先に近づくと出るハンドルで向きを変えられます。消しゴムは描いた注釈だけを消します（スクショは残る）。トリミングは四隅・各辺のハンドルで範囲を決めて「トリミング適用」。ハンドで画像を移動できます。</p>
          <div class="ie-actions">
            <button class="btn primary ie-save">保存</button>
            <button class="btn ie-cancel">キャンセル</button>
          </div>
        </div>`;
      document.body.appendChild(overlay);

      const canvas = overlay.querySelector('.ie-canvas');
      const canvasWrap = overlay.querySelector('.ie-canvas-wrap');
      const ctx = canvas.getContext('2d');
      const colorInput = overlay.querySelector('.ie-color input');
      const sizeInput = overlay.querySelector('.ie-size input');
      const toolBtns = overlay.querySelectorAll('.ie-tool');
      let tool = 'arrow';
      const undoStack = [];

      // ---- 編集中だけの表示ズーム ----
      // canvas のピクセル数（＝保存される実体）は一切変えず、CSS の表示サイズだけを
      // 拡大縮小する。よって「編集のしやすさ（見た目の大きさ）」と「仕上がり（保存内容）」は
      // 完全に独立している。
      const zoomRange = overlay.querySelector('.ie-zoom-range');
      const zoomNum = overlay.querySelector('.ie-zoom-num');
      const zoomFit = overlay.querySelector('.ie-zoom-fit');
      const ZOOM_MIN = 10, ZOOM_MAX = 400;
      let zoom = 100;
      // 100% ＝ ウインドウ（キャンバス枠）にちょうど収まる倍率（フィット）と定義する。
      // これにより 100% では画像全体が見えてスクロール不要。100% を超えたときだけ
      // 内部スクロールが出る。ウインドウ自体の大きさはズームで変わらない（CSSで固定）。
      function fitScale() {
        const availW = Math.max(20, canvasWrap.clientWidth - 24);
        const availH = Math.max(20, canvasWrap.clientHeight - 24);
        if (!canvas.width || !canvas.height) return 1;
        // 小さい画像を拡大しすぎないよう上限は等倍（1.0）。大きい画像は枠に合わせて縮小。
        return Math.min(availW / canvas.width, availH / canvas.height, 1);
      }
      function applyZoom() {
        canvas.style.maxWidth = 'none';
        const scale = fitScale() * (zoom / 100);
        canvas.style.width = (canvas.width * scale) + 'px';
        canvas.style.height = 'auto';
      }
      function setZoom(p) {
        zoom = Math.max(ZOOM_MIN, Math.min(ZOOM_MAX, Math.round(Number(p) || 100)));
        zoomRange.value = zoom;
        zoomNum.value = zoom;
        applyZoom();
      }
      // 「フィット」＝全体表示＝100%。
      function fitZoom() { setZoom(100); }
      zoomRange.addEventListener('input', () => setZoom(zoomRange.value));
      zoomNum.addEventListener('change', () => setZoom(zoomNum.value));
      zoomFit.addEventListener('click', fitZoom);
      // ウインドウのリサイズでフィット基準が変わるため、開いている間は追従させる。
      const onResize = () => applyZoom();
      window.addEventListener('resize', onResize);

      // ---- 2レイヤー構成（非破壊の注釈） ----
      // base = スクショ本体（モザイク・トリミングはこちらに適用）。
      // anno = 透明の注釈層（矢印/図形/ペン/マーカー/テキスト/吹き出し）。消しゴムは anno だけ消す。
      // 表示用 canvas は base→anno を合成（recomposite）して見せ、保存も合成結果を書き出す。
      const baseCanvas = document.createElement('canvas');
      const annoCanvas = document.createElement('canvas');
      const baseCtx = baseCanvas.getContext('2d');
      const annoCtx = annoCanvas.getContext('2d');
      function setLayerSize(w, h) {
        canvas.width = w; canvas.height = h;
        baseCanvas.width = w; baseCanvas.height = h;
        annoCanvas.width = w; annoCanvas.height = h;
      }
      // 表示 canvas に base→anno を重ね描き。crop 中は選択オーバーレイも重ねる。
      function recomposite() {
        ctx.setTransform(1, 0, 0, 1, 0, 0);
        ctx.globalAlpha = 1;
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.drawImage(baseCanvas, 0, 0);
        ctx.drawImage(annoCanvas, 0, 0);
        if (cropMode && cropRect) drawCropOverlay();
      }
      // 表示 px / canvas px の比率（ハンドルや点線を画面上一定サイズに保つのに使う）。
      function dispScale() { return canvas.offsetWidth ? canvas.width / canvas.offsetWidth : 1; }

      function selectTool(t) {
        commitCallout(); // 別ツールへ移るときは編集中の吹き出しを確定
        if (t !== 'crop') exitCropMode(); // crop 以外へ移ると選択枠を破棄
        tool = t;
        toolBtns.forEach((b) => b.classList.toggle('active', b.dataset.tool === t));
        canvas.classList.toggle('tool-hand', t === 'hand');
        canvas.classList.toggle('tool-crop', t === 'crop');
        if (t === 'crop') enterCropMode();
      }
      toolBtns.forEach((b) => b.addEventListener('click', () => selectTool(b.dataset.tool)));

      const baseImg = new Image();
      baseImg.onload = () => {
        setLayerSize(baseImg.naturalWidth, baseImg.naturalHeight);
        baseCtx.drawImage(baseImg, 0, 0);
        recomposite();
        // 枠のレイアウト確定後にフィット（=100%=全体表示）。以後ユーザーが自由に拡大可。
        requestAnimationFrame(fitZoom);
      };
      baseImg.src = srcUrl;

      // ---- Undo（base+anno を両方スナップショット） ----
      function pushUndo() {
        try {
          undoStack.push({
            w: canvas.width, h: canvas.height,
            base: baseCanvas.toDataURL('image/png'),
            anno: annoCanvas.toDataURL('image/png'),
          });
        } catch (_) {}
        if (undoStack.length > 20) undoStack.shift();
      }
      function restore(snap) {
        let pending = 2;
        const done = () => { if (--pending === 0) { applyZoom(); recomposite(); } };
        setLayerSize(snap.w, snap.h);
        const bi = new Image();
        bi.onload = () => { baseCtx.clearRect(0, 0, snap.w, snap.h); baseCtx.drawImage(bi, 0, 0); done(); };
        bi.onerror = done;
        bi.src = snap.base;
        const ai = new Image();
        ai.onload = () => { annoCtx.clearRect(0, 0, snap.w, snap.h); annoCtx.drawImage(ai, 0, 0); done(); };
        ai.onerror = done;
        ai.src = snap.anno;
      }
      overlay.querySelector('.ie-undo').addEventListener('click', () => {
        exitCropMode();
        if (undoStack.length) restore(undoStack.pop());
      });

      function xy(e) {
        const r = canvas.getBoundingClientRect();
        return {
          x: (e.clientX - r.left) * (canvas.width / r.width),
          y: (e.clientY - r.top) * (canvas.height / r.height),
        };
      }
      // 指定 ctx（プレビュー時は表示 ctx、確定時は annoCtx）へ描く。
      function setupStroke(g, alpha) {
        g.strokeStyle = colorInput.value;
        g.fillStyle = colorInput.value;
        g.lineWidth = Number(sizeInput.value);
        g.lineCap = 'round';
        g.lineJoin = 'round';
        g.globalAlpha = alpha;
      }
      // 矢印：三角を大きめにし、線は矢先まで引かず三角の底辺で止める（太線の丸端が
      // 矢先からはみ出さない）。三角の頂点は (x2,y2)。
      function drawArrow(g, x1, y1, x2, y2) {
        const w = Number(sizeInput.value);
        const ang = Math.atan2(y2 - y1, x2 - x1);
        const head = Math.max(18, w * 4);
        // 線の終点は三角の「底辺」まで伸ばして三角と密着させる。底辺の2角は頂点から
        // 距離 head・角度 ±π/7 にあり、その軸方向への投影＝ head*cos(π/7) が底辺の位置。
        // head をそのまま使うと底辺より奥で線が止まり隙間になるため、cos(π/7) を掛ける。
        const backset = head * Math.cos(Math.PI / 7);
        const bx = x2 - backset * Math.cos(ang); // 三角の底辺中央（＝線の終点）
        const by = y2 - backset * Math.sin(ang);
        g.save();
        setupStroke(g, 1);
        g.lineCap = 'butt';
        g.beginPath(); g.moveTo(x1, y1); g.lineTo(bx, by); g.stroke();
        g.beginPath();
        g.moveTo(x2, y2);
        g.lineTo(x2 - head * Math.cos(ang - Math.PI / 7), y2 - head * Math.sin(ang - Math.PI / 7));
        g.lineTo(x2 - head * Math.cos(ang + Math.PI / 7), y2 - head * Math.sin(ang + Math.PI / 7));
        g.closePath(); g.fill();
        g.restore();
      }
      function drawRect(g, a, b) {
        g.save(); setupStroke(g, 1);
        g.strokeRect(a.x, a.y, b.x - a.x, b.y - a.y);
        g.restore();
      }
      function drawEllipse(g, a, b) {
        g.save(); setupStroke(g, 1);
        g.beginPath();
        g.ellipse((a.x + b.x) / 2, (a.y + b.y) / 2, Math.abs(b.x - a.x) / 2, Math.abs(b.y - a.y) / 2, 0, 0, Math.PI * 2);
        g.stroke(); g.restore();
      }
      // ── 吹き出し（クリック挿入・文字で自動リサイズ・尻尾を好きな向きへ）──────
      // calloutBox: 文字から本体（尻尾を除く）の寸法を測る。
      function calloutBox(text, fs) {
        annoCtx.save();
        annoCtx.font = `bold ${fs}px sans-serif`;
        const lines = (text.length ? text : ' ').split('\n');
        const lh = Math.round(fs * 1.3);
        let tw = 0;
        for (const l of lines) tw = Math.max(tw, annoCtx.measureText(l.length ? l : ' ').width);
        annoCtx.restore();
        const P = Math.round(fs * 0.55);
        return { lines, lh, P, w: Math.ceil(tw) + P * 2, h: lines.length * lh + P * 2 };
      }
      // calloutPath: 角丸本体＋「tip（先端）が向く辺」に尻尾を差し込んだ一筆書きパス。
      // 本体中心から tip への方向で上下左右いずれの辺から尻尾を出すか決めるので、
      // tip をどこへ動かしても（360°）自然に向く。
      function calloutPath(g, x, y, w, h, r, tip, tW) {
        const cx = x + w / 2, cy = y + h / 2;
        const dx = tip.x - cx, dy = tip.y - cy;
        let edge;
        if (Math.abs(dy) / h >= Math.abs(dx) / w) edge = dy < 0 ? 'top' : 'bottom';
        else edge = dx < 0 ? 'left' : 'right';
        const cl = (v, a, b) => Math.max(a, Math.min(b, v));
        const tWx = Math.max(4, Math.min(tW, (w - 2 * r) / 2 - 1));
        const tWy = Math.max(4, Math.min(tW, (h - 2 * r) / 2 - 1));
        g.beginPath();
        g.moveTo(x + r, y);
        if (edge === 'top') { const bc = cl(tip.x, x + r + tWx, x + w - r - tWx); g.lineTo(bc - tWx, y); g.lineTo(tip.x, tip.y); g.lineTo(bc + tWx, y); }
        g.lineTo(x + w - r, y);
        g.arcTo(x + w, y, x + w, y + r, r);
        if (edge === 'right') { const bc = cl(tip.y, y + r + tWy, y + h - r - tWy); g.lineTo(x + w, bc - tWy); g.lineTo(tip.x, tip.y); g.lineTo(x + w, bc + tWy); }
        g.lineTo(x + w, y + h - r);
        g.arcTo(x + w, y + h, x + w - r, y + h, r);
        if (edge === 'bottom') { const bc = cl(tip.x, x + r + tWx, x + w - r - tWx); g.lineTo(bc + tWx, y + h); g.lineTo(tip.x, tip.y); g.lineTo(bc - tWx, y + h); }
        g.lineTo(x + r, y + h);
        g.arcTo(x, y + h, x, y + h - r, r);
        if (edge === 'left') { const bc = cl(tip.y, y + r + tWy, y + h - r - tWy); g.lineTo(x, bc + tWy); g.lineTo(tip.x, tip.y); g.lineTo(x, bc - tWy); }
        g.lineTo(x, y + r);
        g.arcTo(x, y, x + r, y, r);
        g.closePath();
      }
      // 本体＋尻尾を描く（drawText=false は文字を描かない＝編集中プレビュー用）。
      function drawCalloutShape(g, x, y, box, tip, drawText, fs) {
        const r = Math.min(16, box.w / 2, box.h / 2);
        const tW = Math.max(10, Math.round(fs * 0.6));
        g.save();
        calloutPath(g, x, y, box.w, box.h, r, tip, tW);
        g.strokeStyle = colorInput.value;
        g.fillStyle = 'rgba(255,255,255,0.92)';
        g.lineWidth = Math.max(2, Number(sizeInput.value));
        g.lineJoin = 'round';
        g.globalAlpha = 1;
        g.fill(); g.stroke();
        if (drawText) {
          g.fillStyle = colorInput.value;
          g.font = `bold ${fs}px sans-serif`;
          g.textBaseline = 'top';
          box.lines.forEach((l, i) => g.fillText(l, x + box.P, y + box.P + i * box.lh));
        }
        g.restore();
      }
      // モザイク：base 層（スクショ）を対象にブロック平均で塗り潰す。
      function applyMosaic(g, rx, ry, rw, rh) {
        rx = Math.max(0, Math.round(rx)); ry = Math.max(0, Math.round(ry));
        rw = Math.min(canvas.width - rx, Math.round(rw));
        rh = Math.min(canvas.height - ry, Math.round(rh));
        if (rw <= 0 || rh <= 0) return;
        const block = Math.max(8, Number(sizeInput.value) * 2);
        const data = g.getImageData(rx, ry, rw, rh).data;
        g.globalAlpha = 1;
        for (let by = 0; by < rh; by += block) {
          for (let bx = 0; bx < rw; bx += block) {
            const xmax = Math.min(bx + block, rw), ymax = Math.min(by + block, rh);
            let r = 0, gg = 0, b = 0, n = 0;
            for (let y = by; y < ymax; y++) for (let x = bx; x < xmax; x++) {
              const i = (y * rw + x) * 4;
              r += data[i]; gg += data[i + 1]; b += data[i + 2]; n++;
            }
            g.fillStyle = `rgb(${(r / n) | 0},${(gg / n) | 0},${(b / n) | 0})`;
            g.fillRect(rx + bx, ry + by, xmax - bx, ymax - by);
          }
        }
      }

      // ---- テキスト（Electron の prompt 不可対策：その場編集の入力欄を出す）----
      function beginText(p) {
        const scale = canvas.offsetWidth ? canvas.offsetWidth / canvas.width : 1;
        const fs = Math.max(16, Number(sizeInput.value) * 4); // canvas px でのフォントサイズ
        const ta = document.createElement('textarea');
        ta.className = 'ie-text-input';
        ta.rows = 1;
        ta.style.left = (canvas.offsetLeft + p.x * scale) + 'px';
        ta.style.top = (canvas.offsetTop + p.y * scale) + 'px';
        ta.style.color = colorInput.value;
        ta.style.font = `bold ${fs * scale}px sans-serif`;
        canvasWrap.appendChild(ta);
        ta.focus();
        let done = false;
        const commit = () => {
          if (done) return; done = true;
          const text = ta.value;
          ta.remove();
          if (text.trim() === '') { recomposite(); return; }
          pushUndo();
          annoCtx.save();
          annoCtx.globalAlpha = 1;
          annoCtx.fillStyle = colorInput.value;
          annoCtx.font = `bold ${fs}px sans-serif`;
          annoCtx.textBaseline = 'top';
          const lh = fs * 1.2;
          text.split('\n').forEach((line, i) => annoCtx.fillText(line, p.x, p.y + i * lh));
          annoCtx.restore();
          recomposite();
        };
        const cancel = () => { if (done) return; done = true; ta.remove(); recomposite(); };
        ta.addEventListener('keydown', (ev) => {
          ev.stopPropagation(); // 編集中は全体の Esc 閉じや他ショートカットを止める
          if (ev.key === 'Enter' && !ev.shiftKey) { ev.preventDefault(); commit(); }
          else if (ev.key === 'Escape') { ev.preventDefault(); cancel(); }
        });
        ta.addEventListener('blur', commit);
        ta.addEventListener('input', () => {
          ta.style.height = 'auto'; ta.style.height = ta.scrollHeight + 'px';
          ta.style.width = 'auto';
          ta.style.width = Math.min(ta.scrollWidth + 24, canvas.offsetWidth) + 'px';
        });
      }

      // ---- 吹き出し（クリックで挿入 → その場編集。未確定の間だけ尻尾の向きを調整）----
      // activeCallout がある間、canvas のポインタ操作は「尻尾先端ハンドル」に使う。
      // ハンドルは通常非表示で、先端付近にカーソルを近づけた時だけ表示する。
      let activeCallout = null; // { x, y, tip, fs, ta, done, dragTip, hoverTip, render }
      const CALLOUT_HIT = 14;   // 尻尾先端の掴み判定（画面px相当）
      function nearCalloutTip(p) {
        if (!activeCallout || !activeCallout.tip) return false;
        const t = activeCallout.tip;
        return Math.hypot(p.x - t.x, p.y - t.y) <= CALLOUT_HIT * dispScale();
      }
      function beginCallout(p) {
        commitCallout(); // 直前の未確定があれば確定してから
        const fs = Math.max(16, Number(sizeInput.value) * 4);
        const ta = document.createElement('textarea');
        ta.className = 'ie-callout-input';
        ta.value = 'ここをクリック';
        ta.rows = 1;
        canvasWrap.appendChild(ta);
        const box0 = calloutBox(ta.value, fs);
        const ac = {
          x: p.x, y: p.y, fs, ta, done: false, dragTip: false, hoverTip: false,
          // 初期の尻尾先端＝本体の下・少し左（下向き）。以後ドラッグで自由に。
          tip: { x: p.x + Math.min(box0.w * 0.25, 40), y: p.y + box0.h + Math.round(fs * 1.6) },
        };
        activeCallout = ac;

        ac.render = () => {
          if (activeCallout !== ac) return;
          const box = calloutBox(ta.value, fs);
          recomposite();
          drawCalloutShape(ctx, ac.x, ac.y, box, ac.tip, false, fs); // 本体だけ（文字は textarea 側）
          if (ac.dragTip || ac.hoverTip) {
            ctx.save();
            ctx.fillStyle = colorInput.value; ctx.strokeStyle = '#fff';
            ctx.lineWidth = 2 * dispScale();
            ctx.beginPath(); ctx.arc(ac.tip.x, ac.tip.y, 7 * dispScale(), 0, Math.PI * 2);
            ctx.fill(); ctx.stroke();
            ctx.restore();
          }
          // textarea を本文位置へ重ねる（透明背景）。
          const s = canvas.offsetWidth ? canvas.offsetWidth / canvas.width : 1;
          ta.style.left = (canvas.offsetLeft + (ac.x + box.P) * s) + 'px';
          ta.style.top = (canvas.offsetTop + (ac.y + box.P) * s) + 'px';
          // 右側の内側パディング分を余白として使い、キャレットが隠れないようにする。
          ta.style.width = ((box.w - box.P) * s) + 'px';
          ta.style.height = ((box.h - box.P * 2) * s) + 'px';
          ta.style.font = `bold ${fs * s}px sans-serif`;
          ta.style.lineHeight = (box.lh * s) + 'px';
          ta.style.color = colorInput.value;
        };

        ta.addEventListener('keydown', (ev) => {
          ev.stopPropagation();
          if (ev.key === 'Enter' && !ev.shiftKey) { ev.preventDefault(); commitCallout(); }
          else if (ev.key === 'Escape') { ev.preventDefault(); cancelCallout(); }
        });
        ta.addEventListener('input', ac.render);
        // フォーカスが離れたら確定。ただし尻尾ドラッグ中は確定しない。
        ta.addEventListener('blur', () => {
          setTimeout(() => { if (activeCallout === ac && !ac.dragTip) commitCallout(); }, 0);
        });

        ac.render();
        ta.focus();
        ta.select();
      }
      function commitCallout() {
        const ac = activeCallout;
        if (!ac || ac.done) return;
        ac.done = true;
        activeCallout = null;
        const text = ac.ta.value;
        ac.ta.remove();
        if (text.trim() === '') { recomposite(); return; }
        pushUndo();
        const box = calloutBox(text, ac.fs);
        drawCalloutShape(annoCtx, ac.x, ac.y, box, ac.tip, true, ac.fs);
        recomposite();
      }
      function cancelCallout() {
        const ac = activeCallout;
        if (!ac || ac.done) return;
        ac.done = true;
        activeCallout = null;
        ac.ta.remove();
        recomposite();
      }

      // ---- ハンドツール（パン） ----
      let panning = null;
      function startPan(e) {
        panning = { x: e.clientX, y: e.clientY, sl: canvasWrap.scrollLeft, st: canvasWrap.scrollTop };
        canvas.classList.add('panning');
        canvas.setPointerCapture(e.pointerId);
      }
      function doPan(e) {
        if (!panning) return;
        canvasWrap.scrollLeft = panning.sl - (e.clientX - panning.x);
        canvasWrap.scrollTop = panning.st - (e.clientY - panning.y);
      }
      function endPan() { panning = null; canvas.classList.remove('panning'); }

      // ---- トリミング（Excel 式：8ハンドルで領域を調整→適用） ----
      let cropMode = false;
      let cropRect = null;  // {x,y,w,h} canvas px
      let cropDrag = null;  // {mode, sx, sy, rect}
      const cropActions = overlay.querySelector('.ie-crop-actions');
      function enterCropMode() {
        if (canvas.width < 10 || canvas.height < 10) return;
        cropMode = true;
        const m = Math.round(Math.min(canvas.width, canvas.height) * 0.1);
        cropRect = { x: m, y: m, w: canvas.width - m * 2, h: canvas.height - m * 2 };
        if (cropRect.w < 10 || cropRect.h < 10) cropRect = { x: 0, y: 0, w: canvas.width, h: canvas.height };
        if (cropActions) cropActions.hidden = false;
        recomposite();
      }
      function exitCropMode() {
        if (!cropMode) return;
        cropMode = false; cropRect = null; cropDrag = null;
        if (cropActions) cropActions.hidden = true;
        recomposite();
      }
      function handlePoints() {
        const { x, y, w, h } = cropRect;
        return {
          nw: [x, y], n: [x + w / 2, y], ne: [x + w, y],
          e: [x + w, y + h / 2], se: [x + w, y + h], s: [x + w / 2, y + h],
          sw: [x, y + h], w: [x, y + h / 2],
        };
      }
      function hitHandle(p) {
        const tol = 11 * dispScale();
        const pts = handlePoints();
        for (const k in pts) {
          if (Math.abs(p.x - pts[k][0]) <= tol && Math.abs(p.y - pts[k][1]) <= tol) return k;
        }
        if (p.x > cropRect.x && p.x < cropRect.x + cropRect.w &&
            p.y > cropRect.y && p.y < cropRect.y + cropRect.h) return 'move';
        return null;
      }
      function drawCropOverlay() {
        const g = ctx, s = dispScale();
        g.save();
        g.setTransform(1, 0, 0, 1, 0, 0);
        g.globalAlpha = 1;
        g.fillStyle = 'rgba(0,0,0,0.45)'; // 選択外を暗く（evenodd で内側を抜く）
        g.beginPath();
        g.rect(0, 0, canvas.width, canvas.height);
        g.rect(cropRect.x, cropRect.y, cropRect.w, cropRect.h);
        g.fill('evenodd');
        g.strokeStyle = '#1a73e8';
        g.setLineDash([]);
        g.lineWidth = 2 * s;
        g.strokeRect(cropRect.x, cropRect.y, cropRect.w, cropRect.h);
        const hs = 9 * s;
        g.fillStyle = '#1a73e8';
        const pts = handlePoints();
        for (const k in pts) g.fillRect(pts[k][0] - hs / 2, pts[k][1] - hs / 2, hs, hs);
        g.restore();
      }
      function updateCrop(p) {
        const d = cropDrag, r = { ...d.rect };
        const dx = p.x - d.sx, dy = p.y - d.sy, MIN = 10;
        if (d.mode === 'move') {
          r.x = Math.max(0, Math.min(canvas.width - r.w, r.x + dx));
          r.y = Math.max(0, Math.min(canvas.height - r.h, r.y + dy));
        } else {
          let x1 = r.x, y1 = r.y, x2 = r.x + r.w, y2 = r.y + r.h;
          if (d.mode.includes('w')) x1 = Math.max(0, Math.min(x2 - MIN, x1 + dx));
          if (d.mode.includes('e')) x2 = Math.min(canvas.width, Math.max(x1 + MIN, x2 + dx));
          if (d.mode.includes('n')) y1 = Math.max(0, Math.min(y2 - MIN, y1 + dy));
          if (d.mode.includes('s')) y2 = Math.min(canvas.height, Math.max(y1 + MIN, y2 + dy));
          r.x = x1; r.y = y1; r.w = x2 - x1; r.h = y2 - y1;
        }
        cropRect = r;
        recomposite();
      }
      function applyCrop() {
        if (!cropRect) return;
        const rx = Math.round(cropRect.x), ry = Math.round(cropRect.y);
        const rw = Math.round(cropRect.w), rh = Math.round(cropRect.h);
        if (rw < 4 || rh < 4) return;
        pushUndo();
        const tb = document.createElement('canvas'); tb.width = rw; tb.height = rh;
        tb.getContext('2d').drawImage(baseCanvas, rx, ry, rw, rh, 0, 0, rw, rh);
        const tak = document.createElement('canvas'); tak.width = rw; tak.height = rh;
        tak.getContext('2d').drawImage(annoCanvas, rx, ry, rw, rh, 0, 0, rw, rh);
        setLayerSize(rw, rh);
        baseCtx.drawImage(tb, 0, 0);
        annoCtx.drawImage(tak, 0, 0);
        cropMode = false; cropRect = null; cropDrag = null;
        if (cropActions) cropActions.hidden = true;
        selectTool('arrow');
        applyZoom();
        recomposite();
      }
      if (cropActions) {
        overlay.querySelector('.ie-crop-apply').addEventListener('click', applyCrop);
        overlay.querySelector('.ie-crop-cancel').addEventListener('click', () => selectTool('arrow'));
      }
      selectTool('arrow'); // 初期ツール（crop 系関数の定義後に呼ぶ）

      // ---- ポインタ操作 ----
      let drawing = false;
      let start = null;

      canvas.addEventListener('pointerdown', (e) => {
        e.preventDefault();
        const p = xy(e);
        // 吹き出し編集中：先端付近を掴めば尻尾ドラッグ、それ以外を押したら確定して続行。
        if (activeCallout) {
          if (nearCalloutTip(p)) {
            activeCallout.dragTip = true;
            canvas.setPointerCapture(e.pointerId);
            activeCallout.render();
            return;
          }
          commitCallout();
        }
        if (tool === 'hand') { startPan(e); return; }
        if (tool === 'crop') {
          if (!cropRect) return;
          const h = hitHandle(p);
          if (h) { cropDrag = { mode: h, sx: p.x, sy: p.y, rect: { ...cropRect } }; canvas.setPointerCapture(e.pointerId); }
          return;
        }
        if (tool === 'text') { beginText(p); return; }
        if (tool === 'callout') { beginCallout(p); return; }
        drawing = true;
        start = p;
        if (tool === 'pen' || tool === 'marker' || tool === 'eraser') {
          pushUndo();
          annoCtx.save();
          if (tool === 'eraser') {
            annoCtx.globalCompositeOperation = 'destination-out';
            annoCtx.globalAlpha = 1;
            annoCtx.lineWidth = Math.max(4, Number(sizeInput.value) * 2);
          } else {
            setupStroke(annoCtx, tool === 'marker' ? 0.35 : 1);
            if (tool === 'marker') annoCtx.lineWidth = Number(sizeInput.value) * 3;
          }
          annoCtx.lineCap = 'round'; annoCtx.lineJoin = 'round';
          annoCtx.beginPath(); annoCtx.moveTo(p.x, p.y);
          annoCtx.lineTo(p.x + 0.01, p.y + 0.01); annoCtx.stroke(); // 点クリックでも痕を残す
          recomposite();
        }
        canvas.setPointerCapture(e.pointerId);
      });

      canvas.addEventListener('pointermove', (e) => {
        // 吹き出し編集中：尻尾ドラッグ、または先端付近ホバーでハンドルを表示。
        if (activeCallout) {
          const p = xy(e);
          if (activeCallout.dragTip) { activeCallout.tip = p; activeCallout.render(); return; }
          const hov = nearCalloutTip(p);
          if (hov !== activeCallout.hoverTip) { activeCallout.hoverTip = hov; activeCallout.render(); }
          canvas.style.cursor = hov ? 'grab' : (tool === 'callout' ? 'crosshair' : '');
          return;
        }
        if (tool === 'hand') { doPan(e); return; }
        if (tool === 'crop') { if (cropDrag) updateCrop(xy(e)); return; }
        if (!drawing) return;
        const p = xy(e);
        if (tool === 'pen' || tool === 'marker' || tool === 'eraser') {
          annoCtx.lineTo(p.x, p.y); annoCtx.stroke(); recomposite(); return;
        }
        // 図形はプレビューを表示 ctx に上描き（annoCanvas は確定時のみ更新）。
        recomposite();
        if (tool === 'arrow') drawArrow(ctx, start.x, start.y, p.x, p.y);
        else if (tool === 'rect') drawRect(ctx, start, p);
        else if (tool === 'ellipse') drawEllipse(ctx, start, p);
        else if (tool === 'mosaic') {
          ctx.save();
          ctx.globalAlpha = 1;
          ctx.strokeStyle = '#1a73e8';
          ctx.setLineDash([6, 4]);
          ctx.lineWidth = 2 * dispScale();
          ctx.strokeRect(start.x, start.y, p.x - start.x, p.y - start.y);
          ctx.restore();
        }
      });

      function finish(e) {
        // 吹き出しの尻尾ドラッグ終了（編集は継続。本文入力へ戻せるよう再フォーカス）。
        if (activeCallout) {
          if (activeCallout.dragTip) {
            activeCallout.dragTip = false;
            activeCallout.render();
            try { activeCallout.ta.focus(); } catch (_) {}
          }
          return;
        }
        if (tool === 'hand') { endPan(); return; }
        if (tool === 'crop') { cropDrag = null; return; }
        if (!drawing) return;
        drawing = false;
        const p = xy(e);
        if (tool === 'pen' || tool === 'marker' || tool === 'eraser') {
          try { annoCtx.restore(); } catch (_) {}
          recomposite();
          return;
        }
        pushUndo();
        if (tool === 'arrow') drawArrow(annoCtx, start.x, start.y, p.x, p.y);
        else if (tool === 'rect') drawRect(annoCtx, start, p);
        else if (tool === 'ellipse') drawEllipse(annoCtx, start, p);
        else if (tool === 'mosaic') {
          applyMosaic(baseCtx, Math.min(start.x, p.x), Math.min(start.y, p.y),
            Math.abs(p.x - start.x), Math.abs(p.y - start.y));
        }
        recomposite();
      }
      canvas.addEventListener('pointerup', finish);
      canvas.addEventListener('pointercancel', () => {
        if (activeCallout && activeCallout.dragTip) { activeCallout.dragTip = false; activeCallout.render(); return; }
        if (tool === 'pen' || tool === 'marker' || tool === 'eraser') { try { annoCtx.restore(); } catch (_) {} }
        drawing = false; cropDrag = null; endPan(); recomposite();
      });

      function close() {
        cancelCallout(); // 編集中の吹き出しは破棄
        window.removeEventListener('resize', onResize);
        document.removeEventListener('keydown', onKey);
        overlay.remove();
      }
      function onKey(ev) { if (ev.key === 'Escape') close(); }
      document.addEventListener('keydown', onKey);
      overlay.querySelector('.ie-cancel').addEventListener('click', close);
      overlay.querySelector('.ie-save').addEventListener('click', () => {
        commitCallout(); // 未確定の吹き出しを確定してから書き出す
        exitCropMode();
        // 合成結果（crop オーバーレイ無し）を別 canvas に作って書き出す。
        const out = document.createElement('canvas');
        out.width = canvas.width; out.height = canvas.height;
        const og = out.getContext('2d');
        og.drawImage(baseCanvas, 0, 0);
        og.drawImage(annoCanvas, 0, 0);
        const data = out.toDataURL('image/jpeg', IMG_QUALITY);
        const ok = commitImage((s) =>
          M.replaceItemImage(M.findChecklist(s, c.id), sectionId, itemId, index, data)
        );
        if (ok) close();
      });
    }

    // ---- 入力欄の編集中でも確実に押せるボタン群（pointerdown 処理）----
    // click だと、入力欄の blur→change による再描画でボタンが消えてクリックが
    // 失われるため、pointerdown で「編集中の入力を確定 → 実行」する。
    document.addEventListener('pointerdown', (e) => {
      const btn = e.target.closest('[data-action]');
      if (!btn) return;
      const action = btn.dataset.action;
      if (!['insert-item-after', 'add-image', 'edit-image', 'delete-image'].includes(action)) return;
      e.preventDefault();
      const c = currentChecklist();
      if (!c) return;
      const sectionId = btn.dataset.section;
      const itemId = btn.dataset.item;
      const index = btn.dataset.index !== undefined ? Number(btn.dataset.index) : -1;
      // 編集中の入力内容を先に確定（change を発火）させる
      const active = document.activeElement;
      if (active && active !== btn && typeof active.blur === 'function'
          && active.matches('input, textarea')) {
        active.blur();
      }
      if (action === 'insert-item-after') {
        const blank = M.createItem(''); // 対象項目の直後に挿入し、追加後にフォーカス
        pendingFocusItem = blank.id;
        store.commit((s) => {
          const cc = M.findChecklist(s, c.id);
          const sec = cc.sections.find((x) => x.id === sectionId);
          if (!sec) return;
          const idx = sec.items.findIndex((x) => x.id === itemId);
          sec.items.splice(idx < 0 ? sec.items.length : idx + 1, 0, blank);
          cc.updatedAt = Date.now();
        });
      } else if (action === 'add-image') {
        pickAndAddImage(c, sectionId, itemId);
      } else if (action === 'edit-image') {
        openImageEditor(c, sectionId, itemId, index);
      } else if (action === 'delete-image') {
        if (confirm('この画像を削除しますか？')) {
          store.commit((s) =>
            M.removeItemImage(M.findChecklist(s, c.id), sectionId, itemId, index)
          );
        }
      }
    });

    // ---- イベント委譲 ----
    document.addEventListener('click', (e) => {
      const btn = e.target.closest('[data-action]');
      if (!btn) return;
      const action = btn.dataset.action;
      const id = btn.dataset.id;
      const sectionId = btn.dataset.section;
      const itemId = btn.dataset.item;
      const c = currentChecklist();
      switch (action) {
        case 'undo': return store.undo();
        case 'redo': return store.redo();
        case 'record': return toggleRecording();
        case 'theme': return cycleTheme();
        case 'home': return goHome();
        case 'new': return openNewDialog();
        case 'open': return goEditor(id);
        case 'import': return fileInput.click();
        case 'export': return exportStateToFile(store.state);
        case 'duplicate':
          return store.commit((s) => M.duplicateChecklist(s, id));
        case 'rename': {
          const cur = M.findChecklist(store.state, id);
          const title = prompt('新しい名前', cur ? cur.title : '');
          if (title != null) store.commit((s) => M.renameChecklist(M.findChecklist(s, id), title));
          return;
        }
        case 'delete': {
          const cur = M.findChecklist(store.state, id);
          if (confirm(`「${cur ? cur.title : ''}」を削除しますか？`))
            store.commit((s) => M.removeChecklist(s, id));
          return;
        }
        case 'add-section':
          return c && store.commit((s) => M.addSection(M.findChecklist(s, c.id)));
        case 'add-item-btn': {
          if (!c) return;
          const blank = M.createItem(''); // IDを先に確定して追加後にフォーカス
          pendingFocusItem = blank.id;
          store.commit((s) => {
            const cc = M.findChecklist(s, c.id);
            const sec = cc.sections.find((x) => x.id === sectionId);
            if (sec) { sec.items.push(blank); cc.updatedAt = Date.now(); }
          });
          return;
        }
        // insert-item-after は pointerdown で処理する（下の専用リスナー参照）。
        // click だと、メモ等の入力欄からの blur→change による再描画でボタンが
        // 消え、クリックが確定せず挿入が発火しないため。
        case 'delete-section':
          return c && store.commit((s) => M.removeSection(M.findChecklist(s, c.id), sectionId));
        case 'delete-item':
          return c && store.commit((s) => M.removeItem(M.findChecklist(s, c.id), sectionId, itemId));
        case 'reset':
          if (c && confirm('すべての項目を未完了に戻します。よろしいですか？'))
            store.commit((s) => M.resetChecklist(M.findChecklist(s, c.id)));
          return;
        case 'clear-completed':
          return c && store.commit((s) => M.clearCompleted(M.findChecklist(s, c.id)));
        case 'share':
          return c && openShareDialog(c);
        case 'print':
          return c && printChecklist(c);
        case 'cover':
          return c && openCoverDialog(c.id);
        case 'save-html':
          return c && saveAsHtml(c);
        case 'save-docx':
          return c && saveDocxViaElectron(c);
      }
    });

    document.addEventListener('change', (e) => {
      const el = e.target;
      const c = currentChecklist();
      if (el.matches('[data-action="toggle"]') && c) {
        store.commit((s) =>
          M.toggleItem(M.findChecklist(s, c.id), el.dataset.section, el.dataset.item)
        );
      }
    });

    document.addEventListener('change', (e) => {
      const el = e.target;
      const c = currentChecklist();
      if (!c) return;
      if (el.matches('[data-action="edit-title"]')) {
        store.commit((s) => M.renameChecklist(M.findChecklist(s, c.id), el.value));
      } else if (el.matches('[data-action="edit-section"]')) {
        store.commit((s) => M.renameSection(M.findChecklist(s, c.id), el.dataset.section, el.value));
      } else if (el.matches('[data-action="edit-item"]')) {
        store.commit((s) =>
          M.editItem(M.findChecklist(s, c.id), el.dataset.section, el.dataset.item, el.value)
        );
      } else if (el.matches('[data-action="edit-note"]')) {
        store.commit((s) =>
          M.setItemField(M.findChecklist(s, c.id), el.dataset.section, el.dataset.item, 'note', el.value)
        );
      } else if (el.matches('[data-action="edit-time"]')) {
        store.commit((s) =>
          M.setItemField(M.findChecklist(s, c.id), el.dataset.section, el.dataset.item, 'time', el.value)
        );
      }
    });

    // セクションバーの「＋」で追加した項目に、再描画後フォーカスする
    let pendingFocusItem = null;
    function restoreFocus() {
      if (!pendingFocusItem) return;
      const input = app.querySelector(`[data-item="${pendingFocusItem}"] .item-text`);
      pendingFocusItem = null;
      if (input) input.focus();
    }

    function readFileText(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => resolve(reader.result);
        reader.onerror = () => reject(new Error('ファイルの読み込みに失敗しました'));
        reader.readAsText(file);
      });
    }

    fileInput.addEventListener('change', async () => {
      const file = fileInput.files[0];
      fileInput.value = '';
      if (!file) return;
      try {
        const text = await readFileText(file);
        const isHtml = /\.html?$/i.test(file.name) || /id=["']clm-data["']/.test(text);
        if (isHtml) {
          // 本アプリ出力の HTML を取り込む。同一IDなら更新、無ければ新規追加。
          const checklist = parseChecklistFromHtml(text);
          const existing = M.findChecklist(store.state, checklist.id);
          store.commit((s) => {
            const idx = s.checklists.findIndex((c) => c.id === checklist.id);
            if (idx >= 0) s.checklists[idx] = checklist;
            else s.checklists.push(checklist);
          });
          alert(
            existing
              ? `「${checklist.title}」を更新しました。`
              : `「${checklist.title}」を追加しました。`
          );
          goEditor(checklist.id);
          return;
        }
        // JSON: 従来どおり全state置換。
        const data = JSON.parse(text);
        if (!data || !Array.isArray(data.checklists)) {
          throw new Error('JSON に checklists 配列が見つかりません');
        }
        if (confirm('現在のデータを、読み込んだ内容で置き換えます。よろしいですか？')) {
          store.replaceState(data);
          goHome();
        }
      } catch (err) {
        alert(err.message);
      }
    });

    // ---- 起動 ----
    store.subscribe(() => {
      render();
      restoreFocus();
    });
    rbInit();
    applyTheme(store.state.settings.theme || 'auto');
    // Electron 版なら録画状態の変化を受け取りボタン表示へ反映する。
    if (window.recorderAPI && window.recorderAPI.onState) {
      window.recorderAPI.onState((d) => {
        isRecording = !!(d && d.recording);
        updateRecordButton();
      });
    }
    updateRecordButton();
    if (IS_STANDALONE) {
      // 単体文書モード: 一覧を隠し、埋め込み1件の editor を直接開く。
      document.body.classList.add('clm-standalone');
      const only = store.state.checklists[0];
      if (only) location.hash = '#/c/' + only.id;
    }
    startRouter(() => {
      if (maybeImportShare()) return;
      render();
    });
  })();
  </script>
</body>
</html>
