    // 表/TSV の貼り付けをセルに取り込む
    function rbTsvToTable(text) {
      const rows = text.replace(/\r/g, '').replace(/\n+$/, '').split('\n').map((line) => line.split('\t'));
      if (!rows.length) return '';
      const cols = Math.max.apply(null, rows.map((r) => r.length));
      const cell = (tag, v) => `<${tag}>${escapeHtml(v || '')}<br></${tag}>`;
      const head = '<tr>' + Array.from({ length: cols }, (_, i) => cell('th', rows[0][i])).join('') + '</tr>';
      const body = rows.slice(1).map((r) => '<tr>' + Array.from({ length: cols }, (_, i) => cell('td', r[i])).join('') + '</tr>').join('');
      return `<table class="rb-table"><thead>${head}</thead><tbody>${body}</tbody></table><p><br></p>`;

    // すべての配線を一度だけ行う

      let rbSizeRange = null;

          let cur = editor ? rbSelectionFontSizePt(editor) : null;
          if (cur === null) cur = parseFloat(input && input.value) || 10.5;
          const v = stepBtn.dataset.rbSizeStep === 'up'
            ? nextFontSize(RB_FONT_SIZES_PT, cur)
            : prevFontSize(RB_FONT_SIZES_PT, cur);
          if (editor) rbApplyFontSize(editor, v, rbSizeRange);
          if (input) input.value = String(v);
        }
      });
      // input への直接入力（Enter/フォーカスアウトで確定）
      document.addEventListener('change', (e) => {
        const sizeIn = e.target.closest && e.target.closest('.rb-size-in');
        if (!sizeIn || !sizeIn.hasAttribute('data-rb-size')) return; // 画像編集側は個別配線
        const rb = sizeIn.closest('.rb');
        const editor = rb && rb.querySelector('[data-rb-edit]');
        const pt = parseFloat(sizeIn.value);
        if (!pt || pt <= 0) { sizeIn.value = ''; return; }
        const v = Math.max(1, Math.min(200, pt));
        sizeIn.value = String(v);
        if (editor) rbApplyFontSize(editor, v, rbSizeRange);
        rbSizeRange = null;
      });
      // 選択が動いたらコンボへ現在の文字サイズを表示（Word と同じ実効値表示。
      // selectionchange は高頻度なので rb 内のときだけ・rAF で間引く）
      let rbSizeSyncReq = 0;
      document.addEventListener('selectionchange', () => {
        if (rbSizeSyncReq) return;
        rbSizeSyncReq = requestAnimationFrame(() => {
          rbSizeSyncReq = 0;
          const sel = window.getSelection();
          let n = sel && sel.rangeCount ? sel.getRangeAt(0).commonAncestorContainer : null;
          if (n && n.nodeType === 3) n = n.parentElement;
          const editor = n && n.closest ? n.closest('[data-rb-edit]') : null;
          if (!editor) return;
          const rb = editor.closest('.rb');
          const input = rb && rb.querySelector('.rb-size-in');
          if (!input || document.activeElement === input) return;
          const v = rbSelectionFontSizePt(editor);
          input.value = v === null ? '' : String(v);
        });
      });
      // Alt+Enter でセル内/段落内改行
      document.addEventListener('keydown', (e) => {
        const ed = e.target.closest && e.target.closest('[data-rb-edit]');
        if (!ed) return;
        if (e.altKey && e.key === 'Enter') { e.preventDefault(); document.execCommand('insertHTML', false, '<br>'); }
      });
      // 貼り付け（表/TSV を取り込み、それ以外は素のテキスト/サニタイズHTML）
      document.addEventListener('paste', (e) => {
        const ed = e.target.closest && e.target.closest('[data-rb-edit]');
        if (!ed) return;
        const cd = e.clipboardData; if (!cd) return;
        const html = cd.getData('text/html');
        const text = cd.getData('text/plain');
        if (html && /<table/i.test(html)) { e.preventDefault(); document.execCommand('insertHTML', false, sanitizeBodyHtml(html)); rbCommitEditor(ed); }
        else if (text && /\t/.test(text) && /\n/.test(text)) { e.preventDefault(); document.execCommand('insertHTML', false, rbTsvToTable(text)); rbCommitEditor(ed); }
        else if (text) { e.preventDefault(); document.execCommand('insertText', false, text); }
      }, true);
      // フォーカスアウトで保存（パレット/コントロールへの移動は除く）
      document.addEventListener('focusout', (e) => {
        const ed = e.target.closest && e.target.closest('[data-rb-edit]');
        if (!ed) return;
        const to = e.relatedTarget;
        if (to && to.closest && (to.closest('.rb-palette') || to.closest('#rb-tctl'))) return;
        rbCommitEditor(ed);
      });
      // 表セルへの近接で行列コントロールを表示。境界付近ではリサイズカーソルに切替。
      document.addEventListener('mousemove', (e) => {
        if (rbResizeDrag) return; // リサイズドラッグ中はコントロールを出さない
        if (rbTctlEl && e.target.closest && e.target.closest('#rb-tctl')) { clearTimeout(rbHideTimer); return; }
        const cell = e.target.closest && e.target.closest('.rb-body td, .rb-body th');
        const ed = cell && cell.closest('[data-rb-edit]');
        if (rbCursorEd && rbCursorEd !== ed) { rbCursorEd.style.cursor = ''; rbCursorEd = null; }
        if (cell) {
          const zone = rbResizeZone(e);
          if (ed) { ed.style.cursor = zone ? (zone.kind === 'col' ? 'col-resize' : 'row-resize') : ''; rbCursorEd = ed; }
          rbCtx = { editor: ed, table: cell.closest('table'), cell };
          clearTimeout(rbHideTimer); rbPositionTctl(e);
        } else {
          clearTimeout(rbHideTimer); rbHideTimer = setTimeout(rbHideTctl, 160);
        }
      });
      window.addEventListener('scroll', rbHideTctl, true);
    }

    // 表紙（カバーページ）の HTML を組み立てる。画面プレビュー・印刷で共用。
    // cover: coverPage オブジェクト（または編集中ドラフト）。fallbackTitle: タイトル未入力時の代替。
    const COVER_PRESETS = ['centered','left-top','top-band','side-band','framed','hero','logo-top','split','minimal','doc-header'];
    const COVER_PRESET_NAMES = {
      centered:'1. 中央', 'left-top':'2. 左上', 'top-band':'3. 上帯', 'side-band':'4. 左帯',
      framed:'5. 枠', hero:'6. 特大', 'logo-top':'7. ロゴ上', split:'8. 分割', minimal:'9. 余白', 'doc-header':'10. 文書',
    };
    function renderCoverHtml(cover, fallbackTitle = '') {
      const c = cover || {};
      const preset = COVER_PRESETS.includes(c.preset) ? c.preset : 'centered';
      const accent = /^#[0-9a-fA-F]{3,8}$/.test(c.accent || '') ? c.accent : '#3b6ea5';
      const t = escapeHtml(c.title || fallbackTitle || '');
      const author = escapeHtml(c.author || ''), date = escapeHtml(c.date || '');
      const ver = escapeHtml(c.version || ''), docn = escapeHtml(c.docNumber || '');
      const title = `<h1 class="title">${t}</h1>`;
      const subtitle = c.subtitle ? `<p class="subtitle">${escapeHtml(c.subtitle)}</p>` : '';
      const logo = c.logo ? `<div class="logo"><img src="${c.logo}" alt="" /></div>` : '';
      const metaInlineParts = [author, date, ver].filter(Boolean);
      const metaInline = metaInlineParts.length ? `<div class="meta">${metaInlineParts.join('　｜　')}</div>` : '';
      const metaRows = [['作成者', author], ['日付', date], ['版数', ver]].filter(([, v]) => v);
      const metaList = metaRows.length
        ? `<div class="meta" style="display:grid;gap:8px">${metaRows.map(([k, v]) => `<div class="meta-row"><b>${k}</b><span>${v}</span></div>`).join('')}</div>` : '';
      const revs = (Array.isArray(c.revisions) ? c.revisions : []).filter((r) => r.version || r.date || r.author || r.note);
      const revTable = revs.length
        ? `<table class="rev"><caption>改訂履歴</caption><thead><tr><th>版</th><th>日付</th><th>作成者</th><th>内容</th></tr></thead><tbody>${revs.map((r) => `<tr><td>${escapeHtml(r.version || '')}</td><td>${escapeHtml(r.date || '')}</td><td>${escapeHtml(r.author || '')}</td><td>${escapeHtml(r.note || '')}</td></tr>`).join('')}</tbody></table>` : '';
      const infoRows = [['文書番号', docn], ['版数', ver], ['作成者', author], ['発行日', date]].filter(([, v]) => v);
      const infobox = infoRows.length
        ? `<div class="infobox">${infoRows.map(([k, v]) => `<div><b>${k}</b><span>${v}</span></div>`).join('')}</div>` : '';
      const inner = {
        centered: `${logo}${title}<div class="rule"></div>${subtitle}<div class="footer">${metaInline}</div>`,
        'left-top': `${logo}${title}${subtitle}<div class="divider"></div>${metaList}<div class="spacer"></div>${revTable}`,
        'top-band': `<div class="band">${title}</div><div class="body">${subtitle}${metaList}${revTable}</div>`,
        'side-band': `<div class="strip"></div><div class="body">${logo}${title}${subtitle}<div class="spacer"></div>${metaList}</div>`,
        framed: `<div class="inner"><div>${logo}</div><div style="align-self:center">${title}${subtitle}</div><div class="footer">${metaInline}</div></div>`,
        hero: `${logo}<div class="accentbar"></div>${title}${subtitle}${metaInline}`,
        'logo-top': `${logo}${title}${subtitle}<div class="footer">${metaInline}</div>`,
        split: `<div class="top">${title}${subtitle}${metaInline}</div><div class="bottom">${revTable}</div>`,
        minimal: `${title}${subtitle}<div class="spacer"></div>${metaInline}`,
        'doc-header': `<div class="head">${title}${infobox}</div>${subtitle}${revTable}<div class="spacer"></div>`,
      }[preset];
      return `<div class="cover cover--${preset}" style="--cover-accent:${accent}">${inner}</div>`;
    }
    // .cover-stage 内の .cover を枠幅にあわせて transform: scale() で縮小表示する。
    function scaleCoverStages(root) {
      if (!root) return;
      root.querySelectorAll('.cover-stage').forEach((st) => {
        const w = st.clientWidth;
        if (!w) return;
        st.style.height = (w * 1123 / 794) + 'px';
        const cv = st.querySelector('.cover');
        if (cv) cv.style.transform = 'scale(' + (w / 794) + ')';
      });
    }

    // 表紙(.cover 794x1123)を SVG foreignObject 経由で PNG(dataURL) にラスタライズする。
    // Word 出力の 1 ページ目に、アプリの表紙作成機能のデザインをそのまま画像として
    // 埋め込むために使う（依存追加・IPC 不要。Chromium/Electron のレンダリング前提）。
    // 失敗時は reject し、呼び出し側でエラー表示・出力中止する。
    function rasterizeCoverToPng(cover, fallbackTitle = '') {
      return new Promise((resolve, reject) => {
        try {
          const W = 794, H = 1123, SCALE = 2; // 2倍(1588x2246)で描く。本文幅160mmで約250dpi相当
          const coverHtml = renderCoverHtml(cover, fallbackTitle);
          // アプリの <style> 全文を同梱して .cover 系 CSS（プリセット・差し色）を効かせる。
          // ただし foreignObject を包む SVG は XML として解析されるため、CSS コメントは除去する
          // （このスタイルシートのコメントに含まれる "<input>" 等の '<' が XML を壊すため）。
          const styleEl = document.querySelector('style');
          const styleText = (styleEl ? styleEl.textContent : '').replace(/\/\*[\s\S]*?\*\//g, '');
          // foreignObject 内は XHTML。ルート div を 794x1123・白背景で固定する。
          const svg =
            `<svg xmlns="http://www.w3.org/2000/svg" width="${W}" height="${H}">` +
            `<foreignObject x="0" y="0" width="${W}" height="${H}">` +
            `<div xmlns="http://www.w3.org/1999/xhtml" style="width:${W}px;height:${H}px;background:#fff">` +
            `<style>${styleText}</style>${coverHtml}` +
            `</div></foreignObject></svg>`;
          const url = 'data:image/svg+xml;charset=utf-8,' + encodeURIComponent(svg);
          const img = new Image();
          img.width = W; img.height = H;
          const paint = () => {
            try {
              const canvas = document.createElement('canvas');
              canvas.width = W * SCALE;
              canvas.height = H * SCALE;
              const ctx = canvas.getContext('2d');
              ctx.fillStyle = '#fff';
              ctx.fillRect(0, 0, canvas.width, canvas.height);
              ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
              resolve(canvas.toDataURL('image/png'));
            } catch (e) { reject(e); }
          };
          img.onload = () => {
            // フォント・画像の反映を待ってから描く（未反映だと白紙・崩れになる）。
            if (img.decode) img.decode().then(paint).catch(paint);
            else paint();
          };
          img.onerror = () => reject(new Error('表紙画像の生成に失敗しました'));
          img.src = url;
        } catch (e) { reject(e); }
      });
    }

    // 印刷（ブラウザの印刷→PDF保存を想定）用の読み取り専用ビューを組み立てる。
    // 入力欄は印刷でテキストが折り返せないため、span/li のプレーンな表現で描く。
    function renderPrintView(checklist) {
      const p = progress(checklist);
      const isTemplate = checklist.type === MODES.TEMPLATE;
      const dateStr = new Date().toLocaleDateString('ja-JP');
      const totalMin = isTemplate
        ? checklist.sections.reduce((a, s) => a + sumMinutes(s.items), 0)
        : 0;
      let stepNo = 0;
      const sections = checklist.sections
        .map((s) => {
          const itemsHtml = s.items
            .map((it) => {
              const box = it.done ? '☑' : '☐';
              const imgs = (Array.isArray(it.images) ? it.images : [])
                .map((src) => `<img class="print-img" src="${src}" alt="" />`)
                .join('');
              const imgsHtml = imgs ? `<div class="print-imgs">${imgs}</div>` : '';
              if (isTemplate) {
                stepNo += 1;
                const time = it.time
                  ? `<span class="print-step-time">⏱${escapeHtml(String(it.time))}分</span>`
                  : '';
                const note = it.note
                  ? `<div class="print-note">${escapeHtml(it.note)}</div>`
                  : '';
                const bodyClean = sanitizeBodyHtml(it.body || '');
                const bodyHtml = bodyClean ? `<div class="print-body">${bodyClean}</div>` : '';
                return `<li class="print-item ${it.done ? 'done' : ''}">
                  <span class="print-no">${stepNo}</span>
                  <span class="print-box">${box}</span>
                  <span class="print-text">${escapeHtml(it.text)}</span>
                  ${time}${bodyHtml}${note}${imgsHtml}
                </li>`;
              }
              return `<li class="print-item ${it.done ? 'done' : ''}">
                <span class="print-box">${box}</span>
                <span class="print-text">${escapeHtml(it.text)}</span>
                ${imgsHtml}
              </li>`;
            })
            .join('');
          const mins = isTemplate ? sumMinutes(s.items) : 0;
          const meta = mins ? `<span class="print-section-meta">（⏱${mins}分）</span>` : '';
          const titleText = escapeHtml(s.title);
          const titleHtml =
            titleText || meta
              ? `<h2 class="print-section-title">${titleText}${meta}</h2>`
              : '';
          return `<section class="print-section">${titleHtml}<ul class="print-items">${itemsHtml}</ul></section>`;
        })
        .join('');
      const coverOn = isTemplate && checklist.coverPage && checklist.coverPage.enabled;
      const coverHtml = coverOn
        ? `<div class="print-cover">${renderCoverHtml(checklist.coverPage, checklist.title)}</div>`
        : '';
      // 目次ページ: 表紙が有効かつ「目次を含める」ON のときだけ、表紙の直後に置く。
      // セクション名（⏱分付き）＋配下の手順名（連番・インデント）。ページ番号は出さない。
      let tocHtml = '';
      if (coverOn && checklist.coverPage.includeToc !== false) {
        let tocNo = 0;
        const tocItems = checklist.sections
          .map((s) => {
            const mins = sumMinutes(s.items);
            const secMeta = mins ? `<span class="print-toc-meta">（⏱${mins}分）</span>` : '';
            const secTitle = escapeHtml(s.title) || '（無題のセクション）';
            const steps = s.items
              .map((it) => {
                tocNo += 1;
                return `<li class="print-toc-step">${tocNo}. ${escapeHtml(it.text)}</li>`;
              })
              .join('');
            const stepsHtml = steps ? `<ol class="print-toc-steps">${steps}</ol>` : '';
            return `<li class="print-toc-sec">${secTitle}${secMeta}${stepsHtml}</li>`;
          })
          .join('');
        tocHtml = `<div class="print-toc"><h2 class="print-toc-title">目次</h2><ol class="print-toc-list">${tocItems}</ol></div>`;
      }
      return `
        ${coverHtml}
        ${tocHtml}
        <div class="print-header">
          <h1>${escapeHtml(checklist.title)}</h1>
          <div class="print-meta">
            <span>${modeLabel(checklist.type)}</span>
            <span>${p.done} / ${p.total} 完了（${p.percent}%）${
              totalMin ? ` ・ 総所要 約${totalMin}分` : ''
            }</span>
            <span>${dateStr}</span>
          </div>
        </div>
        ${sections}`;
    }

    // =========================================================================
    // dragdrop — セクション/項目のドラッグ&ドロップ並べ替え
    // =========================================================================
    // ドロップ先を示す横破線インジケーター（挿入される境界の位置に出す）。
    let dragIndicatorEl = null;
    function dragIndicator() {
      if (!dragIndicatorEl) {
        dragIndicatorEl = document.createElement('div');
        dragIndicatorEl.id = 'drag-indicator';
        document.body.appendChild(dragIndicatorEl);
      }
      return dragIndicatorEl;
    }
    function showDragIndicator(x, y, w) {
      const el = dragIndicator();
      el.style.left = x + 'px';
      el.style.top = (y - 1) + 'px';
      el.style.width = w + 'px';
      el.style.display = 'block';
    }
    function hideDragIndicator() { if (dragIndicatorEl) dragIndicatorEl.style.display = 'none'; }

    function attachDragAndDrop(container, onMove) {
      // render() のたびに呼ばれるが、リスナーはすべて委譲なので初回だけ配線する
      //（毎回追加すると drop 1回で onMove が複数回走り、undo 履歴も汚れる）。
      if (container.__dndWired) return;
      container.__dndWired = true;
      let dragging = null;
      let armed = null; // グリップ押下で一時的に draggable にした要素
      // ドラッグはハンドル（⠿グリップ／手順の番号レール）を掴んだときだけ開始する。
      // 行全体を常時 draggable にすると、テキスト入力欄・リッチ本文・画像の上での
      // 操作（文字選択など）がドラッグ判定に食われてしまうため。
      container.addEventListener('mousedown', (e) => {
        const grip = e.target.closest && e.target.closest('.grip, .step-rail');
        const src = grip && grip.closest('[data-drag]');
        if (src) { src.setAttribute('draggable', 'true'); armed = src; }
      });
      const disarm = () => { if (armed) { armed.removeAttribute('draggable'); armed = null; } };
      document.addEventListener('mouseup', disarm);
      container.addEventListener('dragstart', (e) => {
        const el = e.target.closest('[data-drag]');
        if (!el || el.getAttribute('draggable') !== 'true') return;
        const kind = el.dataset.drag;
        if (kind === 'item') {
          const li = el.closest('.item');
          dragging = { kind, id: li.dataset.item, fromSection: li.dataset.section };
        } else if (kind === 'section') {
          const sec = el.closest('.section');
          dragging = { kind, id: sec.dataset.section, fromSection: null };
        }
        e.dataTransfer.effectAllowed = 'move';
        e.dataTransfer.setData('text/plain', dragging ? dragging.id : '');
        requestAnimationFrame(() => el.closest('.item, .section')?.classList.add('dragging'));
      });
      container.addEventListener('dragend', () => {
        container.querySelectorAll('.dragging, .drop-target')
          .forEach((n) => n.classList.remove('dragging', 'drop-target'));
        dragging = null;
        hideDragIndicator();
        disarm();
      });
      // 挿入位置（どの行とどの行の間に入るか）を drop と同じ中点判定で求める。
      // dragover での表示と drop での確定が必ず一致するよう、判定を共通化する。
      function itemDropAt(e) {
        const overItem = e.target.closest('.item');
        const overList = e.target.closest('.items');
        if (overItem) {
          const siblings = [...overItem.parentElement.querySelectorAll('.item')];
          let toIndex = siblings.indexOf(overItem);
          const rect = overItem.getBoundingClientRect();
          const after = e.clientY > rect.top + rect.height / 2;
          if (after) toIndex += 1;
          return { toSection: overItem.dataset.section, toIndex, lineY: after ? rect.bottom : rect.top, rect };
        }
        if (overList) {
          const items = overList.querySelectorAll('.item');
          const rect = overList.getBoundingClientRect();
          const last = items[items.length - 1];
          return {
            toSection: overList.dataset.section,
            toIndex: items.length,
            lineY: last ? last.getBoundingClientRect().bottom : rect.top,
            rect,
          };
        }
        return null;
      }
      function sectionDropAt(e) {
        const overSection = e.target.closest('.section');
        if (!overSection) return null;
        const sections = [...container.querySelectorAll('.section')];
        let toIndex = sections.indexOf(overSection);
        const rect = overSection.getBoundingClientRect();
        const after = e.clientY > rect.top + rect.height / 2;
        if (after) toIndex += 1;
        return { id: overSection.dataset.section, toIndex, lineY: after ? rect.bottom : rect.top, rect };
      }
      container.addEventListener('dragover', (e) => {
        if (!dragging) return;
        e.preventDefault();
        e.dataTransfer.dropEffect = 'move';
        const at = dragging.kind === 'item' ? itemDropAt(e) : sectionDropAt(e);
        if (at) showDragIndicator(at.rect.left, at.lineY, at.rect.width);
        else hideDragIndicator();
      });
      container.addEventListener('dragleave', (e) => {
        // コンテナ外へ出たときだけ消す（子要素間の移動では消さない）
        if (!container.contains(e.relatedTarget)) hideDragIndicator();
      });
      container.addEventListener('drop', (e) => {
        if (!dragging) return;
        e.preventDefault();
        hideDragIndicator();
        if (dragging.kind === 'item') {
          const at = itemDropAt(e);
          if (!at) return;
          onMove({
            kind: 'item',
            itemId: dragging.id,
            fromSection: dragging.fromSection,
            toSection: at.toSection,
            toIndex: at.toIndex,
          });
        } else if (dragging.kind === 'section') {
          const at = sectionDropAt(e);
          if (!at || at.id === dragging.id) return;
          onMove({ kind: 'section', sectionId: dragging.id, toIndex: at.toIndex });
        }
      });
    }

    // =========================================================================
    // router — ハッシュベースの簡易ルーター
    //   #/ → ホーム / #/c/<id> → エディタ / #share=... → 共有データ
    // =========================================================================
    function parseHash(hash = location.hash) {
      if (hash.startsWith('#share=')) return { name: 'share', raw: hash };
      const m = hash.match(/^#\/c\/(.+)$/);
      if (m) return { name: 'editor', id: m[1] };
      return { name: 'home' };
    }
    function goHome() { location.hash = '#/'; }
    function goEditor(id) { location.hash = '#/c/' + id; }
    function startRouter(onChange) {
      const handler = () => onChange(parseHash());
      window.addEventListener('hashchange', handler);
      handler();
      return () => window.removeEventListener('hashchange', handler);
    }

    // =========================================================================
    // app — ストア・ルーター・描画・イベントの結線（エントリポイント）
    // =========================================================================
    // 単体文書モード: 出力した .html を単体で開いたとき。埋め込み #clm-data を種にした
    // MemoryAdapter でストアを作り（localStorage を汚さない）、その1件の editor を表示する。
    const IS_STANDALONE = !!window.__CLM_STANDALONE__;
    function readEmbeddedState() {
      const node = document.getElementById('clm-data');
      if (!node) return null;
      try {
        const data = JSON.parse(node.textContent);
        if (data && Array.isArray(data.checklists)) return data;
      } catch (e) {
        console.warn('埋め込みデータの解析に失敗しました:', e);
      }
      return null;
    }
    // アダプタの自動選択: Electron → FileAdapter（ファイル保存）／
    // ブラウザ単体 → LocalStorageAdapter／単体HTML → MemoryAdapter（従来どおり）。
    // Electron 初回起動時は localStorage の既存データをファイルへ移行する
    // （移行手順は docs/spec-file-storage-migration.md）。
    const MIGRATED_KEY = STORAGE_KEY + '.migratedToFile';
    async function createAppStore() {
      if (IS_STANDALONE) return new Store(new MemoryAdapter(readEmbeddedState()));
      if (!window.storageAPI) return new Store(new LocalStorageAdapter());
      try {
        const res = await window.storageAPI.load();
        if (!res || !res.ok) throw new Error((res && res.error) || 'storage:load に失敗しました');
        if (res.json != null) return new Store(new FileAdapter(JSON.parse(res.json)));
        // ファイル未作成（初回）。localStorage に旧データがあれば一括移行する。
        let legacy = null;
        try {
          if (!localStorage.getItem(MIGRATED_KEY)) legacy = localStorage.getItem(STORAGE_KEY);
        } catch (_) { /* localStorage 不可の環境は新規開始 */ }
        if (legacy) {
          const state = JSON.parse(legacy);
          for (const c of state.checklists || []) await absorbChecklistImages(c);
          const adapter = new FileAdapter(state);
          adapter.save(state);
          await adapter.queue; // 書き込み完了を待って成否を確認
          if (adapter.lastError) throw adapter.lastError;
          // 完了マーカーを書く。元の localStorage データは切り戻し用に消さない。
          try { localStorage.setItem(MIGRATED_KEY, new Date().toISOString()); } catch (_) { /* noop */ }
          return new Store(adapter);
        }
        return new Store(new FileAdapter(null));
      } catch (e) {
        // ファイル保存を初期化できない場合は従来の localStorage で続行
        //（移行マーカーは書いていないので、次回起動時に再試行される）。
        console.error('ファイル保存を初期化できないため localStorage で続行します:', e);
        return new Store(new LocalStorageAdapter());
      }
    }
    const store = await createAppStore();
    const app = document.getElementById('app');
    const fileInput = document.getElementById('file-input');

    // 入力欄の編集内容を保存するとき、画面全体を再描画しない（DOM は既に最新のため）。
    // 全再描画すると、blur→change→commit の途中で「次にクリックした入力欄やボタン」が
    // DOM ごと作り直されてフォーカス移動が空振りし、文字が入力できなくなる。
    let suppressRender = false;
    function commitInPlace(mutator, opts) {
      suppressRender = true;
      try { store.commit(mutator, opts); } finally { suppressRender = false; }
    }

    // ---- 録画（クリック連動スクリーンショット） ----
    // 実体は Electron メインプロセス側（main.js）。preload が公開する
    // window.recorderAPI が無い＝素のブラウザでは、ボタンは無効表示にする。
    let isRecording = false;
    function updateRecordButton() {
      const btn = document.querySelector('[data-action="record"]');
      if (!btn) return;
      if (!window.recorderAPI) {
        btn.disabled = true;
        btn.title = '録画はデスクトップ版（Electron）でのみ利用できます';
        return;
      }
      btn.classList.toggle('recording', isRecording);
      btn.title = isRecording
        ? '録画停止'
        : '録画ガジェットを開く（ガジェットの「録画開始」で撮影開始）';
    }
    function toggleRecording() {
      if (!window.recorderAPI) {
        alert('録画機能はデスクトップ版（Electron）でのみ利用できます。\n「npm start」で起動してください。');
        return;
      }
      if (isRecording) {
        window.recorderAPI.stopRecording();
      } else {
        const c = currentChecklist();
        const name = c && c.title ? c.title : '記録';
        recordChecklistId = c ? c.id : null; // 取り込み先の既定として覚えておく
        window.recorderAPI.startRecording(name);
      }
    }

    // ---- 録画取り込みウィザード（2-R4） ----
    // 録画セッション（セッションフォルダの素材: 全景・拡大・生成文）をステップ一覧
    // として編集し、チェックリストの新セクションへ取り込む。
    // 仕様は docs/spec-2-R4-import-wizard.md 参照。
    let recordChecklistId = null; // 録画開始時に開いていたリスト（取り込み先の既定）

    // -- 純関数（テスト対象。window.__test__ に公開） --
    // 既定の添付画像: 要素矩形が採用できたステップは拡大、それ以外は全景
    //（フォールバック文「図の位置をクリック」は赤丸の写った全景とセットで読む文言のため）。
    function wizardDefaultChoice(step) {
      return step.zoomImage && step.zoomSource === 'element' ? 'zoom' : 'full';
    }
    // readSession の結果 → ウィザードのステップモデル。
    // 「統合」で複数ショットが1ステップに束ねられるため shots は配列で持つ。
    function wizardStepsFrom(sessionData) {
      const src = sessionData && Array.isArray(sessionData.steps) ? sessionData.steps : [];
      return src.map((s) => ({
        text: s.text || '',
        shots: [{ seq: s.seq, image: s.image, zoomImage: s.zoomImage || null, choice: wizardDefaultChoice(s) }],
      }));
    }
    // index のステップを直前のステップへ統合（文は「、」連結・ショットは結合）。
    function wizardMergeUp(steps, index) {
      if (index <= 0 || index >= steps.length) return steps;
      const prev = steps[index - 1];
      const cur = steps[index];
      prev.text = prev.text && cur.text ? `${prev.text}、${cur.text}` : prev.text || cur.text;
      prev.shots = prev.shots.concat(cur.shots);
      steps.splice(index, 1);
      return steps;
    }
    // 全ステップの文へ一括置換（単純文字列置換）。置換した箇所数を返す。
    function wizardBulkReplace(steps, find, replace) {
      if (!find) return 0;
      let count = 0;
      for (const st of steps) {
        const parts = String(st.text || '').split(find);
        if (parts.length > 1) { count += parts.length - 1; st.text = parts.join(replace); }
      }
      return count;
    }
    // ショットの選択（拡大/全景/両方）→ 添付するファイル名の列（全景→拡大の読み順）。
    function wizardShotFiles(shot) {
      if (shot.choice === 'zoom' && shot.zoomImage) return [shot.zoomImage];
      if (shot.choice === 'both' && shot.zoomImage) return [shot.image, shot.zoomImage];
      return [shot.image];
    }
    // ステップモデル → 取り込むセクション。imagesByStep[i] は i 番目のステップに
    // 添付する画像（storeImage 済みの参照 or dataURL）の配列。
    function buildImportSection(title, steps, imagesByStep = []) {
      const section = M.createSection(title);
      steps.forEach((st, i) => {
        const item = M.createItem(String(st.text || '').trim());
        for (const img of imagesByStep[i] || []) item.images.push(img);
        section.items.push(item);
      });
      return section;
    }

    // -- UI --
    function fmtSessionDate(iso) {
      const d = iso ? new Date(iso) : null;
      if (!d || isNaN(d)) return '';
      const p = (n) => String(n).padStart(2, '0');
      return `${d.getFullYear()}/${p(d.getMonth() + 1)}/${p(d.getDate())} ${p(d.getHours())}:${p(d.getMinutes())}`;
    }

    // 過去セッションの一覧から選んでウィザードを開く（📥「録画を取り込む」）。
    async function openImportPicker() {
      if (!window.recorderAPI) return;
      let sessions = [];
      try { sessions = (await window.recorderAPI.listSessions()) || []; } catch (_) { /* 下の0件表示へ */ }
      if (!sessions.length) {
        showToast('取り込める録画セッションがありません。まず録画してください。');
        return;
      }
      const rows = sessions
        .map((s, i) => {
          const badges =
            (s.endedAt ? '' : '<span class="iw-badge warn">未完了</span>') +
            (s.importedAt ? '<span class="iw-badge">取り込み済み</span>' : '');
          return `<button class="iw-session" data-i="${i}" type="button">
            <strong>${escapeHtml(s.name || '')}</strong>
            <span>${fmtSessionDate(s.startedAt)}</span>
            <span>${Number(s.shots) || 0}枚</span>${badges}
          </button>`;
        })
        .join('');
      const overlay = buildModal(`
        <h3>録画を取り込む</h3>
        <p>取り込むセッションを選んでください（新しい順）。</p>
        <div class="iw-sessions">${rows}</div>
        <div class="modal-actions"><button class="btn" data-close>閉じる</button></div>
      `);
      overlay.querySelectorAll('.iw-session').forEach((btn) => {
        btn.addEventListener('click', () => {
          const s = sessions[Number(btn.dataset.i)];
          closeModal(overlay);
          openImportWizard(s.dir);
        });
      });
    }

    // 取り込みウィザード本体。dir はセッションフォルダ（メイン側で検証される）。
    async function openImportWizard(dir) {
      if (!window.recorderAPI) return;
      let data = null;
      try { data = await window.recorderAPI.loadSession(dir); } catch (_) { /* 下の失敗表示へ */ }
      if (!data || !Array.isArray(data.steps) || data.steps.length === 0) {
        showToast('録画セッションを読み込めませんでした。', { type: 'error' });
        return;
      }
      const steps = wizardStepsFrom(data);
      const defaultTitle = `録画 ${fmtSessionDate(data.info.startedAt)}`.trim();

      // 取り込み先の既定: 録画開始時のリスト → 現在開いているリスト → 先頭のリスト
      const route = parseHash();
      const destDefault =
        [recordChecklistId, route.name === 'editor' ? route.id : null, (store.state.checklists[0] || {}).id]
          .find((id) => id && M.findChecklist(store.state, id)) || '__new__';
      const destOptions =
        store.state.checklists
          .map((c) => `<option value="${escapeHtml(c.id)}"${c.id === destDefault ? ' selected' : ''}>${escapeHtml(c.title)}</option>`)
          .join('') +
        `<option value="__new__"${destDefault === '__new__' ? ' selected' : ''}>（新しいリストを作成）</option>`;

      const badges =
        (data.info.endedAt ? '' : '<span class="iw-badge warn">未完了（異常終了の記録）</span>') +
        (data.info.importedAt ? '<span class="iw-badge">取り込み済み</span>' : '');
      const overlay = buildModal(`
        <h3>録画の取り込み</h3>
        <p class="iw-meta">
          <strong>${escapeHtml(data.info.name || '')}</strong>
          <span>${fmtSessionDate(data.info.startedAt)}</span>
          ${badges}
          <button class="btn" data-iw-open-dir type="button">📂 フォルダを開く</button>
        </p>
        <div class="iw-bulk">
          <input class="iw-find" placeholder="検索する文字列" />→
          <input class="iw-repl" placeholder="置換後" />
          <button class="btn" data-iw-replace type="button">一括置換</button>
        </div>
        <div class="iw-list"></div>
        <div class="iw-dest">
          取り込み先
          <select class="iw-dest-select">${destOptions}</select>
          セクション名
          <input class="iw-title" value="${escapeHtml(defaultTitle)}" />
        </div>
        <div class="modal-actions">
          <button class="btn" data-close type="button">キャンセル</button>
          <button class="btn primary" data-iw-import type="button">取り込む</button>
        </div>
      `);
      overlay.querySelector('.modal').classList.add('import-wiz');
      const listEl = overlay.querySelector('.iw-list');

      // サムネイル: 元PNGは大きいため 320px に縮小した dataURL をキャッシュする
      //（一覧のメモリを抑える。添付用の原寸は取り込み時に読み直す）。
      const thumbCache = new Map();
      function thumbFor(file) {
        if (!thumbCache.has(file)) {
          thumbCache.set(file, (async () => {
            const raw = await window.recorderAPI.readImage(dir, file);
            if (!raw) return null;
            try { return await compressImage(raw, 320, 0.7); } catch (_) { return raw; }
          })());
        }
        return thumbCache.get(file);
      }

      function renderList() {
        listEl.innerHTML = steps
          .map((st, i) => {
            const shot = st.shots[0];
            const canZoom = st.shots.some((sh) => sh.zoomImage);
            const seg = [['zoom', '拡大'], ['full', '全景'], ['both', '両方']]
              .map(([val, label]) => {
                const dis = val !== 'full' && !canZoom ? ' disabled' : '';
                const act = shot.choice === val ? ' class="active"' : '';
                return `<button type="button" data-choice="${val}"${act}${dis}>${label}</button>`;
              })
              .join('');
            return `<div class="iw-row" data-i="${i}">
              <div class="iw-thumb">読込中…</div>
              <div class="iw-main">
                <div class="iw-row-head">
                  <span class="iw-seq">${i + 1}</span>
                  <span class="iw-seg">${seg}</span>
                  <span class="iw-tools">
                    <button type="button" data-iw="up" ${i === 0 ? 'disabled' : ''} title="上へ">↑</button>
                    <button type="button" data-iw="down" ${i === steps.length - 1 ? 'disabled' : ''} title="下へ">↓</button>
                    <button type="button" data-iw="merge" ${i === 0 ? 'disabled' : ''} title="上のステップと統合">⇧統合</button>
                    <button type="button" data-iw="del" title="このステップを取り込まない">✕</button>
                  </span>
                </div>
                <textarea class="iw-text" rows="2" placeholder="手順の文">${escapeHtml(st.text)}</textarea>
              </div>
            </div>`;
          })
          .join('');
        // サムネイルを非同期で流し込む（選択中の画像の先頭）
        listEl.querySelectorAll('.iw-row').forEach((row) => {
          const st = steps[Number(row.dataset.i)];
          if (!st) return;
          const file = wizardShotFiles(st.shots[0])[0];
          thumbFor(file).then((url) => {
            const box = row.querySelector('.iw-thumb');
            if (!box || !box.isConnected) return;
            box.innerHTML = url ? `<img alt="" src="${url}" />` : '（画像なし）';
          });
        });
      }
      renderList();

      // 行内の操作（クリック委譲: 画像切替・↑↓・統合・削除）
      listEl.addEventListener('click', (e) => {
        const row = e.target.closest('.iw-row');
        if (!row) return;
        const i = Number(row.dataset.i);
        const choiceBtn = e.target.closest('[data-choice]');
        if (choiceBtn && !choiceBtn.disabled) {
          steps[i].shots.forEach((sh) => { sh.choice = choiceBtn.dataset.choice; });
          renderList();
          return;
        }
        const op = e.target.closest('[data-iw]');
        if (!op || op.disabled) return;
        const kind = op.dataset.iw;
        if (kind === 'up' && i > 0) { const [x] = steps.splice(i, 1); steps.splice(i - 1, 0, x); }
        if (kind === 'down' && i < steps.length - 1) { const [x] = steps.splice(i, 1); steps.splice(i + 1, 0, x); }
        if (kind === 'merge') wizardMergeUp(steps, i);
        if (kind === 'del') steps.splice(i, 1);
        renderList();
      });
      // 文の編集は再描画せずモデルへ反映（入力中のフォーカスを奪わない）
      listEl.addEventListener('input', (e) => {
        if (!e.target.classList.contains('iw-text')) return;
        const row = e.target.closest('.iw-row');
        if (row && steps[Number(row.dataset.i)]) steps[Number(row.dataset.i)].text = e.target.value;
      });

      overlay.querySelector('[data-iw-open-dir]').addEventListener('click', () => {
        window.recorderAPI.openShotsDir(dir);
      });
      overlay.querySelector('[data-iw-replace]').addEventListener('click', () => {
        const find = overlay.querySelector('.iw-find').value;
        const repl = overlay.querySelector('.iw-repl').value;
        const n = wizardBulkReplace(steps, find, repl);
        showToast(n ? `${n}箇所を置換しました。` : '置換対象が見つかりませんでした。');
        if (n) renderList();
      });

      const importBtn = overlay.querySelector('[data-iw-import]');
      importBtn.addEventListener('click', async () => {
        if (!steps.length) { showToast('取り込むステップがありません。', { type: 'error' }); return; }
        importBtn.disabled = true;
        try {
          // 画像を原寸で読み直し → 既存パイプラインで圧縮 → （Electronでは）参照化。
          // 1枚の失敗はそのステップの画像だけ諦めて続行する（文は取り込む）。
          const imagesByStep = [];
          for (const st of steps) {
            const imgs = [];
            for (const shot of st.shots) {
              for (const f of wizardShotFiles(shot)) {
                try {
                  const raw = await window.recorderAPI.readImage(dir, f);
                  if (raw) imgs.push(await storeImage(await compressImage(raw)));
                } catch (err) {
                  console.error('画像の取り込みに失敗しました（文のみ取り込みます）:', f, err);
                }
              }
            }
            imagesByStep.push(imgs);
            importBtn.textContent = `取り込み中… ${imagesByStep.length}/${steps.length}`;
          }
          const title = overlay.querySelector('.iw-title').value.trim() || defaultTitle;
          const destSel = overlay.querySelector('.iw-dest-select').value;
          const section = buildImportSection(title, steps, imagesByStep);
          let destId = destSel;
          // 1回の commit = Undo 1回で丸ごと取り消せる
          store.commit((s) => {
            let c = destSel === '__new__' ? null : M.findChecklist(s, destSel);
            if (!c) {
              c = M.createChecklist(M.MODES.TEMPLATE, data.info.name || '録画の取り込み');
              c.sections = []; // createChecklist が作る空セクションは使わない
              M.addChecklist(s, c);
              destId = c.id;
            }
            c.sections.push(section);
            c.updatedAt = Date.now();
          });
          if (store.lastSaveOk === false) {
            store.undo();
            notifySaveError('保存容量の上限に達したため、取り込めませんでした（変更は取り消しました）。', { force: true });
            return;
          }
          // 取り込み済みマークは結果に影響させない（失敗しても console のみ）
          window.recorderAPI.markImported(dir).catch(() => {});
          closeModal(overlay);
          goEditor(destId);
          showToast(`${steps.length}件の手順を取り込みました（Ctrl+Z で取り消せます）。`);
        } finally {
          importBtn.disabled = false;
          importBtn.textContent = '取り込む';
        }
      });
    }

    // 📥ボタンの表示制御（ブラウザ単体では非表示・録画中は無効）。
    function updateImportButton() {
      const btn = document.querySelector('[data-action="import-rec"]');
      if (!btn) return;
      if (!window.recorderAPI) { btn.style.display = 'none'; return; }
      btn.disabled = isRecording;
    }

    function render() {
      const route = parseHash();
      if (route.name === 'editor') {
        const checklist = M.findChecklist(store.state, route.id);
        if (!checklist) { goHome(); return; }
        app.innerHTML = renderEditor(checklist);
        attachDragAndDrop(app, handleMove);
        scaleCoverStages(app);
      } else {
        app.innerHTML = renderHome(store.state);
      }
      updateTopbar();
    }
    function updateTopbar() {
      document.querySelector('[data-action="undo"]').disabled = !store.canUndo();
      document.querySelector('[data-action="redo"]').disabled = !store.canRedo();
      updateRecordButton();
      updateImportButton();
    }
    // 所要時間の表示（ヘッダの総所要・セクション別の⏱分）だけを部分更新する。
    // 時間入力の保存は commitInPlace（再描画なし）のため、派生表示はここで追随させる。
    function refreshTimeLabels() {
      const c = currentChecklist();
      if (!c || c.type !== MODES.TEMPLATE) return;
      const p = progress(c);
      const totalMin = c.sections.reduce((a, s) => a + sumMinutes(s.items), 0);
      const head = app.querySelector('.editor-progress small');
      if (head) {
        head.textContent =
          `${p.done} / ${p.total} 完了（${p.percent}%）${totalMin ? ` ・ 総所要 約${totalMin}分` : ''}`;
      }
      c.sections.forEach((s, idx) => {
        const el = app.querySelector(`.section[data-section="${s.id}"] .section-progress`);
        if (!el) return;
        const prog = p.sections[idx];
        const mins = sumMinutes(s.items);
        el.textContent = `${prog.done}/${prog.total}${mins ? ` ・⏱${mins}分` : ''}`;
      });
    }
    function currentChecklist() {
      const route = parseHash();
      return route.name === 'editor' ? M.findChecklist(store.state, route.id) : null;
    }

    function handleMove(move) {
      const c = currentChecklist();
      if (!c) return;
      if (move.kind === 'item') {
        store.commit((s) => {
          const cc = M.findChecklist(s, c.id);
          M.moveItem(cc, move.fromSection, move.itemId, move.toSection, move.toIndex);
        });
      } else if (move.kind === 'section') {
        store.commit((s) => {
          const cc = M.findChecklist(s, c.id);
          M.moveSection(cc, move.sectionId, move.toIndex);
        });
      }
    }

    function openNewDialog() {
      const overlay = buildModal(`
        <h3>新しいチェックリスト</h3>
        <p>使い方に合わせて種類を選んでください。</p>
        <div class="mode-choices">
          <button class="mode-card" data-mode="template">
            <strong>テンプレート型</strong>
            <span>点検表・持ち物・手順など、繰り返し使う。チェック後に一括リセットして再利用。</span>
          </button>
          <button class="mode-card" data-mode="todo">
            <strong>ToDo型</strong>
            <span>その都度追加して消化する使い捨てのリスト。</span>
          </button>
        </div>
        <label class="field">タイトル
          <input class="new-title" placeholder="（後で変更できます）" />
        </label>
        <div class="modal-actions">
          <button class="btn" data-close>キャンセル</button>
        </div>
      `);
      overlay.querySelectorAll('.mode-card').forEach((btn) => {
        btn.addEventListener('click', () => {
          const mode = btn.dataset.mode;
          const title = overlay.querySelector('.new-title').value.trim();
          const checklist = M.createChecklist(mode, title);
          store.commit((s) => M.addChecklist(s, checklist));
          closeModal(overlay);
          goEditor(checklist.id);
        });
      });
    }

    function openShareDialog(checklist) {
      const { url, length, hadImages } = encodeShareLink(checklist);
      const warn =
        length > 2000
          ? `<p class="warn">⚠ リンクが長い（${length}文字）ため一部の環境で開けない場合があります。大きなリストはエクスポート(JSON)での共有を推奨します。</p>`
          : '';
      const imgNote = hadImages
        ? `<p class="warn">※ 画像は共有リンクには含まれません（容量のため）。画像も渡す場合はエクスポート(JSON)をご利用ください。</p>`
        : '';
      const overlay = buildModal(`
        <h3>共有リンク</h3>
        <p>このリンクを開くと、相手の端末にこのチェックリストを取り込めます（サーバー不要）。</p>
        <textarea class="share-url" readonly rows="4">${url}</textarea>
        ${warn}${imgNote}
        <div class="modal-actions">
          <button class="btn primary" data-copy>コピー</button>
          <button class="btn" data-close>閉じる</button>
        </div>
      `);
      const ta = overlay.querySelector('.share-url');
      overlay.querySelector('[data-copy]').addEventListener('click', async () => {
        try {
          await navigator.clipboard.writeText(url);
        } catch {
          ta.select();
          document.execCommand('copy');
        }
        overlay.querySelector('[data-copy]').textContent = 'コピーしました ✓';
      });
    }

    function maybeImportShare() {
      const route = parseHash();
      if (route.name !== 'share') return false;
      const checklist = readShareFromHash();
      if (!checklist) { goHome(); return true; }
      const ok = confirm(`「${checklist.title}」を取り込みますか？`);
      if (ok) {
        const copy = JSON.parse(JSON.stringify(checklist));
        copy.id = M.createChecklist().id;
        copy.createdAt = copy.updatedAt = Date.now();
        store.commit((s) => M.addChecklist(s, copy));
        goEditor(copy.id);
      } else {
        goHome();
      }
      return true;
    }

    // ---- 印刷ビューの画像レイアウト（'1col'=全幅1枚ずつ / '2col'=横2枚） ----
    // プレビュー画面で選択し、設定として記憶する（undo履歴には積まない）。
    function printImgLayout() {
      const s = store.state.settings;
      return (s && s.printImgLayout) === '1col' ? '1col' : '2col';
    }
    function setPrintImgLayout(v) {
      commitInPlace((s) => {
        s.settings = s.settings || {};
        s.settings.printImgLayout = v === '1col' ? '1col' : '2col';
      }, { history: false });
    }
    function printColsClass() {
      return printImgLayout() === '1col' ? 'print-cols-1' : 'print-cols-2';
    }

    // #print-root に印刷ビューを流し込む（window.print / printToPDF の直前に呼ぶ）。
    function fillPrintRoot(checklist) {
      let root = document.getElementById('print-root');
      if (!root) {
        root = document.createElement('div');
        root.id = 'print-root';
        document.body.appendChild(root);
      }
      root.className = printColsClass();
      root.innerHTML = renderPrintView(checklist);
      return root;
    }
    function clearPrintRoot() {
      const root = document.getElementById('print-root');
      if (root) { root.innerHTML = ''; root.className = ''; }
    }

    // 印刷ビューを差し込んでブラウザの印刷ダイアログを開く。
    // 印刷後（またはキャンセル後）は中身を空にして画面に残らないようにする。
    function printChecklist(checklist) {
      fillPrintRoot(checklist);
      const cleanup = () => {
        clearPrintRoot();
        window.removeEventListener('afterprint', cleanup);
      };
      window.addEventListener('afterprint', cleanup);
      window.print();
    }

    // 印刷プレビュー。紙面の見た目を画面内で確認してから 印刷 / PDF保存 する。
    // Electron の window.print() は OS のダイアログだけでプレビューが無いため、
    // アプリ内でプレビューを出す（@media print で .modal-overlay は紙面から除外済み）。
    async function openPrintPreview(checklist) {
      // 画像参照を dataURL に戻した複製で印刷/PDF ビューを組む
      checklist = await materializeChecklist(checklist);
      const overlay = buildModal(`
        <h3>印刷プレビュー</h3>
        <div class="print-preview-bar">
          <span class="pp-label">画像の配置:</span>
          <span class="pp-seg">
            <button type="button" data-pp-cols="1col">1列（大きく）</button>
            <button type="button" data-pp-cols="2col">2列</button>
          </span>
          <span class="pp-spacer"></span>
          <button type="button" class="btn primary" data-pp-print>🖨 印刷</button>
          ${window.printAPI ? '<button type="button" class="btn" data-pp-pdf>📄 PDFに保存</button>' : ''}
          <button type="button" class="btn" data-close>閉じる</button>
        </div>
        <div class="print-preview-body"><div class="print-preview-page"></div></div>
      `);
      overlay.querySelector('.modal').classList.add('print-preview');
      const page = overlay.querySelector('.print-preview-page');
      const renderPreview = () => {
        page.className = 'print-preview-page ' + printColsClass();
        page.innerHTML = renderPrintView(checklist);
        overlay.querySelectorAll('[data-pp-cols]').forEach((b) =>
          b.classList.toggle('active', b.dataset.ppCols === printImgLayout())
        );
      };
      renderPreview();
      overlay.querySelectorAll('[data-pp-cols]').forEach((b) =>
        b.addEventListener('click', () => { setPrintImgLayout(b.dataset.ppCols); renderPreview(); })
      );
      overlay.querySelector('[data-pp-print]').addEventListener('click', () => printChecklist(checklist));
      const pdfBtn = overlay.querySelector('[data-pp-pdf]');
      if (pdfBtn) {
        pdfBtn.addEventListener('click', async () => {
          pdfBtn.disabled = true;
          try {
            fillPrintRoot(checklist); // printToPDF は @media print の見た目で現ページを描画する
            const res = await window.printAPI.savePdf({
              title: sanitizeFilename(checklist.title || 'checklist'),
            });
            if (res && res.error) alert('PDF の保存に失敗しました: ' + res.error);
          } catch (e) {
            alert('PDF の保存に失敗しました: ' + e.message);
          } finally {
            clearPrintRoot();
            pdfBtn.disabled = false;
          }
        });
      }
    }

    function buildModal(innerHtml) {
      const overlay = document.createElement('div');
      overlay.className = 'modal-overlay';
      overlay.innerHTML = `<div class="modal" role="dialog" aria-modal="true">${innerHtml}</div>`;
      document.body.appendChild(overlay);
      overlay.addEventListener('click', (e) => {
        if (e.target === overlay || e.target.hasAttribute('data-close')) closeModal(overlay);
      });
      return overlay;
    }
    function closeModal(overlay) { overlay.remove(); }

    // 表紙編集モーダル。左=設定フォーム / 右=ライブプレビュー。
    // 変更はドラフトに反映 → プレビュー即時更新、確定（クリック/blur）でストアへ commit。
    function openCoverDialog(checklistId) {
      const cl0 = M.findChecklist(store.state, checklistId);
      if (!cl0) return;
      // 表紙が無ければ初回作成（有効状態）
      if (!cl0.coverPage) {
        store.commit((s) => {
          const c = M.findChecklist(s, checklistId);
          c.coverPage = M.createCoverPage();
          c.updatedAt = Date.now();
        });
      }
      const fallbackTitle = M.findChecklist(store.state, checklistId).title;
      let draft = JSON.parse(JSON.stringify(M.findChecklist(store.state, checklistId).coverPage));
      const SWATCHES = [['#3b6ea5', '青'], ['#2f8f6b', '緑'], ['#2b3a67', '紺'], ['#5b6470', 'グレー'], ['#9b3b4a', '臙脂']];

      const overlay = document.createElement('div');
      overlay.className = 'modal-overlay';
      overlay.innerHTML = `
        <div class="modal cover-editor" role="dialog" aria-modal="true">
          <div class="ce-head"><h3>🪧 表紙を編集</h3><button class="ce-x" data-close title="閉じる">✕</button></div>
          <div class="ce-enable">
            <span class="ce-switch" data-ce="toggle"></span>
            <span>この手順書に表紙を付ける</span>
            <small>— オフにすると印刷・プレビューに出ません</small>
          </div>
          <div class="ce-enable">
            <span class="ce-switch" data-ce="toc-toggle"></span>
            <span>目次を含める</span>
            <small>— 印刷/PDF に目次ページ、Word 出力に目次（Word で開き更新すると生成）を入れます。表紙がオフだと出ません</small>
          </div>
          <div class="ce-body">
            <div class="ce-form">
              <div class="ce-grp">
                <div class="ce-lbl">レイアウト <span class="hint">（10種から選択）</span></div>
                <div class="ce-preset-grid" data-ce="presets"></div>
              </div>
              <div class="ce-grp">
                <div class="ce-lbl">差し色（アクセントカラー）</div>
                <div class="ce-swatches">
                  ${SWATCHES.map(([hex, name]) => `<span class="ce-swatch" data-color="${hex}" title="${name}" style="background:${hex}"></span>`).join('')}
                  <label class="ce-swatch ce-swatch-custom" title="任意の色"><input type="color" data-ce="custom-color" /></label>
                </div>
              </div>
              <div class="ce-grp">
                <div class="ce-lbl">ロゴ画像 <span class="hint">（任意）</span></div>
                <div class="ce-logo-row">
                  <div class="ce-logo-box" data-ce="logo-box"></div>
                  <button class="btn" data-ce="logo-pick">画像を選択 / 差し替え</button>
                  <button class="btn" data-ce="logo-del">削除</button>
                </div>
              </div>
              <div class="ce-grp">
                <div class="ce-lbl">テキスト</div>
                <div class="ce-fields">
                  <label class="ce-field col2">タイトル（大見出し）<input data-ce-field="title" /></label>
                  <label class="ce-field col2">サブタイトル・説明<input data-ce-field="subtitle" /></label>
                  <label class="ce-field">作成者・組織名<input data-ce-field="author" /></label>
                  <label class="ce-field">日付<input data-ce-field="date" /></label>
                  <label class="ce-field">バージョン / 版数<input data-ce-field="version" /></label>
                  <label class="ce-field">文書番号（任意）<input data-ce-field="docNumber" /></label>
                </div>
              </div>
              <div class="ce-grp">
                <div class="ce-lbl">改訂履歴 <span class="hint">（行の追加/削除）</span></div>
                <table class="ce-rev"><thead><tr><th style="width:64px">版</th><th style="width:104px">日付</th><th style="width:80px">作成者</th><th>内容</th><th style="width:26px"></th></tr></thead>
                  <tbody data-ce="rev-body"></tbody></table>
                <button class="ce-addrow" data-ce="rev-add">＋ 行を追加</button>
              </div>
            </div>
            <div class="ce-preview">
              <div class="ce-plbl">プレビュー</div>
              <div class="cover-stage" data-ce="preview"></div>
              <div class="ce-note" data-ce="note"></div>
            </div>
          </div>
          <div class="modal-actions"><button class="btn primary" data-close>完了</button></div>
        </div>`;
      document.body.appendChild(overlay);

      const $ = (sel) => overlay.querySelector(sel);
      const presetGrid = $('[data-ce="presets"]');
      const previewStage = $('[data-ce="preview"]');
      const revBody = $('[data-ce="rev-body"]');

      function persist() {
        store.commit((s) => {
          const c = M.findChecklist(s, checklistId);
          c.coverPage = JSON.parse(JSON.stringify(draft));
          c.updatedAt = Date.now();
        });
      }
      function renderRevRows() {
        revBody.innerHTML = (draft.revisions || []).map((r) => `
          <tr data-id="${r.id}">
            <td><input data-rev="version" value="${escapeHtml(r.version || '')}" /></td>
            <td><input data-rev="date" value="${escapeHtml(r.date || '')}" /></td>
            <td><input data-rev="author" value="${escapeHtml(r.author || '')}" /></td>
            <td><input data-rev="note" value="${escapeHtml(r.note || '')}" /></td>
            <td><button class="ce-rev-del" data-rev-del title="削除">🗑</button></td>
          </tr>`).join('');
      }
      function refresh() {
        previewStage.innerHTML = renderCoverHtml(draft, fallbackTitle);
        presetGrid.innerHTML = COVER_PRESETS.map((id) => {
          const d = Object.assign({}, draft, { preset: id });
          return `<div class="ce-preset ${id === draft.preset ? 'sel' : ''}" data-preset="${id}">
            <div class="cover-stage">${renderCoverHtml(d, fallbackTitle)}</div>
            <div class="pname">${COVER_PRESET_NAMES[id]}</div></div>`;
        }).join('');
        overlay.querySelectorAll('.ce-swatch[data-color]').forEach((sw) =>
          sw.classList.toggle('sel', sw.dataset.color.toLowerCase() === (draft.accent || '').toLowerCase()));
        $('[data-ce="logo-box"]').innerHTML = draft.logo ? `<img src="${draft.logo}" alt="" />` : 'なし';
        const tg = $('[data-ce="toggle"]');
        tg.classList.toggle('on', !!draft.enabled);
        tg.style.setProperty('--cover-accent', draft.accent || '#3b6ea5');
        const tgToc = $('[data-ce="toc-toggle"]');
        tgToc.classList.toggle('on', draft.includeToc !== false);
        tgToc.style.setProperty('--cover-accent', draft.accent || '#3b6ea5');
        $('[data-ce="note"]').innerHTML = `選択中: <b>${COVER_PRESET_NAMES[draft.preset] || ''}</b><br>印刷/PDF では、この表紙が先頭ページになります。`;
        scaleCoverStages(overlay);
      }

      overlay.querySelectorAll('[data-ce-field]').forEach((inp) => { inp.value = draft[inp.dataset.ceField] || ''; });
      renderRevRows();
      refresh();

      const onResize = () => scaleCoverStages(overlay);
      function close() { window.removeEventListener('resize', onResize); closeModal(overlay); }

      overlay.addEventListener('click', (e) => {
        if (e.target === overlay || e.target.closest('[data-close]')) return close();
        const presetEl = e.target.closest('[data-preset]');
        if (presetEl) { draft.preset = presetEl.dataset.preset; persist(); refresh(); return; }
        const sw = e.target.closest('.ce-swatch[data-color]');
        if (sw) { draft.accent = sw.dataset.color; persist(); refresh(); return; }
        if (e.target.closest('[data-ce="toggle"]')) { draft.enabled = !draft.enabled; persist(); refresh(); return; }
        if (e.target.closest('[data-ce="toc-toggle"]')) { draft.includeToc = !(draft.includeToc !== false); persist(); refresh(); return; }
        if (e.target.closest('[data-ce="logo-pick"]')) { pickCoverLogo(); return; }
        if (e.target.closest('[data-ce="logo-del"]')) { draft.logo = ''; persist(); refresh(); return; }
        if (e.target.closest('[data-ce="rev-add"]')) {
          if (!draft.revisions) draft.revisions = [];
          draft.revisions.push(M.createRevision());
          persist(); renderRevRows(); refresh(); return;
        }
        const del = e.target.closest('[data-rev-del]');
        if (del) {
          const tr = del.closest('tr');
          draft.revisions = (draft.revisions || []).filter((r) => r.id !== tr.dataset.id);
          persist(); renderRevRows(); refresh(); return;
        }
      });
      // 入力中はプレビュー即時更新（commit は change で）
      overlay.addEventListener('input', (e) => {
        const f = e.target.closest('[data-ce-field]');
        if (f) { draft[f.dataset.ceField] = e.target.value; refresh(); return; }
        if (e.target.matches('[data-ce="custom-color"]')) { draft.accent = e.target.value; refresh(); return; }
        const rev = e.target.closest('[data-rev]');
        if (rev) {
          const tr = rev.closest('tr');
          const r = (draft.revisions || []).find((x) => x.id === tr.dataset.id);
          if (r) { r[rev.dataset.rev] = e.target.value; refresh(); }
        }
      });
      overlay.addEventListener('change', (e) => {
        if (e.target.closest('[data-ce-field]') || e.target.matches('[data-ce="custom-color"]') || e.target.closest('[data-rev]')) persist();
      });

      function pickCoverLogo() {
        const inp = document.createElement('input');
        inp.type = 'file'; inp.accept = 'image/*';
        inp.addEventListener('change', async () => {
          const f = inp.files && inp.files[0];
          if (!f) return;
          try {
            draft.logo = await compressImage(await blobToDataUrl(f), 400, 0.85);
            persist(); refresh();
          } catch (err) { alert(err.message || '画像の追加に失敗しました'); }
        });
        inp.click();
      }

      window.addEventListener('resize', onResize);
    }

    // =========================================================================
    // images — スクリーンショットの貼り付け・圧縮保存・ペイント編集
    // =========================================================================
    const IMG_MAX_EDGE = 1600; // 長辺の上限(px)。これを超える画像は縮小する
    const IMG_QUALITY = 0.85;  // JPEG 品質

    function blobToDataUrl(blob) {
      return new Promise((res, rej) => {
        const r = new FileReader();
        r.onload = () => res(r.result);
        r.onerror = () => rej(new Error('画像の読み込みに失敗しました'));
        r.readAsDataURL(blob);
      });
    }
    // 長辺 IMG_MAX_EDGE までリサイズし JPEG 圧縮した dataURL を返す。
    function compressImage(srcDataUrl, maxEdge = IMG_MAX_EDGE, quality = IMG_QUALITY) {
      return new Promise((res, rej) => {
        const img = new Image();
        img.onload = () => {
          let w = img.naturalWidth, h = img.naturalHeight;
          const scale = Math.min(1, maxEdge / Math.max(w, h));
          w = Math.max(1, Math.round(w * scale));
          h = Math.max(1, Math.round(h * scale));
          const cv = document.createElement('canvas');
          cv.width = w; cv.height = h;
          cv.getContext('2d').drawImage(img, 0, 0, w, h);
          res(cv.toDataURL('image/jpeg', quality));
        };
        img.onerror = () => rej(new Error('画像の解析に失敗しました'));
        img.src = srcDataUrl;
      });
    }
    function findItemLive(checklistId, sectionId, itemId) {
      const cc = M.findChecklist(store.state, checklistId);
      const sec = cc && cc.sections.find((x) => x.id === sectionId);
      return sec ? sec.items.find((x) => x.id === itemId) : null;
    }
    // 保存に失敗（localStorage 上限）したら取り消して false を返す。
    function commitImage(mutator) {
      store.commit(mutator);
      if (store.lastSaveOk === false) {
        store.undo();
        notifySaveError('保存容量の上限に達したため、この画像は保存できませんでした（変更は取り消しました）。\n不要な画像やリストを減らすか、JSON エクスポートで退避してください。', { force: true });
        return false;
      }
      return true;
    }
    async function addImageFromBlob(c, sectionId, itemId, blob, openEditor) {
      try {
        const compressed = await compressImage(await blobToDataUrl(blob));
        // Electron では個別ファイルへ保存して参照を state に持つ（ブラウザは素通し）
        const stored = await storeImage(compressed);
        const ok = commitImage((s) =>
          M.addItemImage(M.findChecklist(s, c.id), sectionId, itemId, stored)
        );
        if (ok && openEditor) {
          const item = findItemLive(c.id, sectionId, itemId);
          const idx = item ? item.images.length - 1 : -1;
          if (idx >= 0) openImageEditor(c, sectionId, itemId, idx);
        }
      } catch (err) {
        alert(err.message || '画像の追加に失敗しました');
      }
    }
    function pickAndAddImage(c, sectionId, itemId) {
      const inp = document.createElement('input');
      inp.type = 'file';
      inp.accept = 'image/*';
      inp.addEventListener('change', () => {
        const f = inp.files && inp.files[0];
        if (f) addImageFromBlob(c, sectionId, itemId, f, true);
      });
      inp.click();
    }

    // クリップボードからの画像貼り付け。フォーカス中の手順/項目に添付する。
    document.addEventListener('paste', (e) => {
      const c = currentChecklist();
      if (!c) return;
      const dt = e.clipboardData;
      if (!dt) return;
      let blob = null;
      for (const it of dt.items || []) {
        if (it.kind === 'file' && it.type && it.type.startsWith('image/')) {
          blob = it.getAsFile();
          break;
        }
      }
      if (!blob) return;
      const host = document.activeElement && document.activeElement.closest
        ? document.activeElement.closest('.item')
        : null;
      if (!host) return; // 貼り付け先の手順が不明な場合は何もしない
      e.preventDefault();
      addImageFromBlob(c, host.dataset.section, host.dataset.item, blob, true);
    });

    // エクスプローラ等からの画像ドラッグ＆ドロップ。ドロップ先の手順（.item）へ添付する。
    // 外部ファイル（dataTransfer.files 有り）のときだけ扱い、アイテム並び替えの内部 DnD とは干渉しない。
    function dropTargetItem(e) {
      const el = e.target && e.target.closest ? e.target.closest('.item') : null;
      return el && el.dataset && el.dataset.section && el.dataset.item ? el : null;
    }
    function hasFiles(dt) {
      if (!dt) return false;
      if (dt.types && Array.prototype.indexOf.call(dt.types, 'Files') !== -1) return true;
      return !!(dt.files && dt.files.length);
    }
    let dropHi = null; // ドロップ先ハイライト中の要素
    function clearDropHi() { if (dropHi) { dropHi.classList.remove('drop-target'); dropHi = null; } }
    document.addEventListener('dragover', (e) => {
      if (!currentChecklist() || !hasFiles(e.dataTransfer)) return;
      const host = dropTargetItem(e);
      if (!host) { clearDropHi(); return; }
      e.preventDefault(); // ドロップを許可
      try { e.dataTransfer.dropEffect = 'copy'; } catch (_) {}
      if (dropHi !== host) { clearDropHi(); dropHi = host; host.classList.add('drop-target'); }
    });
    document.addEventListener('dragleave', (e) => {
      // ウィンドウ外/対象外へ抜けたらハイライト解除。
      if (!e.relatedTarget) clearDropHi();
    });
    document.addEventListener('drop', (e) => {
      const c = currentChecklist();
      if (!c || !hasFiles(e.dataTransfer)) return;
      const host = dropTargetItem(e);
      clearDropHi();
      if (!host) return;
      const files = Array.from(e.dataTransfer.files || []).filter((f) => f.type && f.type.startsWith('image/'));
      if (!files.length) return;
      e.preventDefault();
      // 1 枚なら編集モーダルを開く（paste と同挙動）。複数は順に挿入のみ。

      opacityInput.addEventListener('input', () => {

        opacityVal.textContent = v + '%';

      }

      function syncTextFmtUI() {

      const clampFs = (v) => Math.max(8, Math.min(200, Math.round(Number(v) || 0)));

      shrinkBtn.addEventListener('click', () => stepFontSize(-1));
      // その場編集（textarea）中に押しても blur→確定 させないよう mousedown を殺す
      boldBtn.addEventListener('mousedown', (e) => e.preventDefault());
      italicBtn.addEventListener('mousedown', (e) => e.preventDefault());
      boldBtn.addEventListener('click', () => applyTextFmt({ bold: !boldBtn.classList.contains('active') }));
      italicBtn.addEventListener('click', () => applyTextFmt({ italic: !italicBtn.classList.contains('active') }));

      // ---- 編集中だけの表示ズーム ----
      // canvas のピクセル数（＝保存される実体）は一切変えず、CSS の表示サイズだけを

      // 完全に独立している。
      const zoomRange = overlay.querySelector('.ie-zoom-range');
      const zoomNum = overlay.querySelector('.ie-zoom-num');
      const zoomFit = overlay.querySelector('.ie-zoom-fit');
      const ZOOM_MIN = 10, ZOOM_MAX = 400;

      // 100% ＝ ウインドウ（キャンバス枠）にちょうど収まる倍率（フィット）と定義する。
      // これにより 100% では画像全体が見えてスクロール不要。100% を超えたときだけ
      // 内部スクロールが出る。ウインドウ自体の大きさはズームで変わらない（CSSで固定）。
      function fitScale() {
        const availW = Math.max(20, canvasWrap.clientWidth - 24);
        const availH = Math.max(20, canvasWrap.clientHeight - 24);
        if (!canvas.width || !canvas.height) return 1;
        // 小さい画像を拡大しすぎないよう上限は等倍（1.0）。大きい画像は枠に合わせて縮小。
        return Math.min(availW / canvas.width, availH / canvas.height, 1);

        canvas.style.height = 'auto';
      }

        zoomNum.value = zoom;
        applyZoom();
      }

      zoomNum.addEventListener('change', () => setZoom(zoomNum.value));

        const py = (e.clientY - r.top) * (canvas.height / r.height);

      // anno = 透明の注釈層（矢印/図形/ペン/マーカー/テキスト/吹き出し）。消しゴムは anno だけ消す。
      // 表示用 canvas は base→anno を合成（recomposite）して見せ、保存も合成結果を書き出す。
      const baseCanvas = document.createElement('canvas');

      const annoCtx = annoCanvas.getContext('2d');

      // ストローク全体を alpha=1 で描いておき、合成・焼き込み時にツールの透過率を
      // 一括で掛ける。こうしないと move イベントごとの重ね塗りで透過色がどんどん
      // 濃くなる（長押しで点が濃くなる・自己交差が濃くなる）。
      const strokeCanvas = document.createElement('canvas');
      const strokeCtx = strokeCanvas.getContext('2d');
      let liveStroke = null; // { pts:[{x,y}], color, width, alpha }
      function setLayerSize(w, h) {
        canvas.width = w; canvas.height = h;

        annoCanvas.width = w; annoCanvas.height = h;
        strokeCanvas.width = w; strokeCanvas.height = h;

      function renderLiveStroke() {
        strokeCtx.clearRect(0, 0, strokeCanvas.width, strokeCanvas.height);
        if (!liveStroke || !liveStroke.pts.length) return;
        const pts = liveStroke.pts;
        strokeCtx.strokeStyle = liveStroke.color;
        strokeCtx.lineWidth = liveStroke.width;
        strokeCtx.lineCap = 'round';
        strokeCtx.lineJoin = 'round';
        strokeCtx.globalAlpha = 1;
        strokeCtx.beginPath();
        strokeCtx.moveTo(pts[0].x, pts[0].y);
        if (pts.length === 1) strokeCtx.lineTo(pts[0].x + 0.01, pts[0].y + 0.01); // 点クリックでも痕を残す
        else for (let i = 1; i < pts.length; i++) strokeCtx.lineTo(pts[i].x, pts[i].y);
        strokeCtx.stroke();
      }
      // ストローク確定: annoCanvas へツールの透過率で1回だけ焼き込む。
      function bakeLiveStroke() {
        if (!liveStroke) return;
        annoCtx.save();
        annoCtx.globalAlpha = liveStroke.alpha;
        annoCtx.drawImage(strokeCanvas, 0, 0);
        annoCtx.restore();
        liveStroke = null;
        strokeCtx.clearRect(0, 0, strokeCanvas.width, strokeCanvas.height);

      // 選択枠・crop 中の選択オーバーレイはさらにその上。
      function recomposite() {
        ctx.setTransform(1, 0, 0, 1, 0, 0);

        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.drawImage(baseCanvas, 0, 0);
        ctx.drawImage(annoCanvas, 0, 0);
        if (liveStroke) { // 進行中ストロークはツールの透過率で重ねて見せる
          ctx.globalAlpha = liveStroke.alpha;
          ctx.drawImage(strokeCanvas, 0, 0);
          ctx.globalAlpha = 1;

        syncTextFmtUI(); // ツール・選択・編集状態に書式コントロールを追随させる
      }

      function dispScale() { return canvas.offsetWidth ? canvas.width / canvas.offsetWidth : 1; }

      function selectTool(t) {
