<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>チェックリストメーカー</title>
  <link rel="icon"
        href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'%3E%3Ctext y='14' font-size='14'%3E%E2%9C%93%3C/text%3E%3C/svg%3E" />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <div id="topbar">
    <span class="topbar-brand">✓ チェックリスト</span>
    <span class="topbar-spacer"></span>
    <button class="icon" data-action="undo" title="元に戻す (Undo)">↶</button>
    <button class="icon" data-action="redo" title="やり直す (Redo)">↷</button>
    <button class="icon" data-action="theme" title="テーマ切替（自動/ライト/ダーク）">🌓</button>
  </div>

  <main id="app"></main>

  <input id="file-input" type="file" accept="application/json" hidden />

  <script type="module" src="js/app.js"></script>
</body>
</html>
