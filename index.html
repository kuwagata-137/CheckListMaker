      const baseImg = new Image();
      baseImg.onload = () => {
        setLayerSize(baseImg.naturalWidth, baseImg.naturalHeight);
        baseCtx.drawImage(baseImg, 0, 0);
        // 分離保存された手描き線（ペン・ハイライト）のラスター層を復元
        if (strokesSrc) {
          const si = new Image();
          si.onload = () => { annoCtx.drawImage(si, 0, 0); recomposite(); };
          si.onerror = () => recomposite();
          si.src = strokesSrc;
        }
        recomposite();
        // 枠のレイアウト確定後にフィット（=100%=全体表示）。以後ユーザーが自由に拡大可。
        requestAnimationFrame(fitZoom);
      };
      baseImg.src = baseSrc;

      // ---- Undo（base+anno のスナップショット＋オブジェクト一覧の複製） ----
      function pushUndo() {
        try {
          undoStack.push({
            w: canvas.width, h: canvas.height,
            base: baseCanvas.toDataURL('image/png'),
            anno: annoCanvas.toDataURL('image/png'),
            objects: JSON.parse(JSON.stringify(objects)),
          });
        } catch (_) {}
        if (undoStack.length > 20) undoStack.shift();
      }
      function restore(snap) {
        objects = JSON.parse(JSON.stringify(snap.objects || []));
        selectedId = null;
        let pending = 2;
        const done = () => { if (--pending === 0) { applyZoom(); recomposite(); } };
        setLayerSize(snap.w, snap.h);
        const bi = new Image();
        bi.onload = () => { baseCtx.clearRect(0, 0, snap.w, snap.h); baseCtx.drawImage(bi, 0, 0); done(); };
        bi.onerror = done;
        bi.src = snap.base;
        const ai = new Image();
        ai.onload = () => { annoCtx.clearRect(0, 0, snap.w, snap.h); annoCtx.drawImage(ai, 0, 0); done(); };
        ai.onerror = done;
        ai.src = snap.anno;
      }
      overlay.querySelector('.ie-undo').addEventListener('click', () => {
        exitCropMode();
        if (undoStack.length) restore(undoStack.pop());
      });

      function xy(e) {
        const r = canvas.getBoundingClientRect();
        return {
          x: (e.clientX - r.left) * (canvas.width / r.width),
          y: (e.clientY - r.top) * (canvas.height / r.height),
        };
      }
      // 指定 ctx（プレビュー時は表示 ctx、確定時は annoCtx）へ描く。
      function setupStroke(g, alpha) {
        g.strokeStyle = colorInput.value;
        g.fillStyle = colorInput.value;
        g.lineWidth = Number(sizeInput.value);
        g.lineCap = 'round';
        g.lineJoin = 'round';
        g.globalAlpha = alpha;
      }
      // オブジェクト共通のスタイル設定（色・太さ・透過率はオブジェクト自身が持つ）。
      function setupObjStroke(g, o) {
        g.strokeStyle = o.color;
        g.fillStyle = o.color;
        g.lineWidth = o.size;
        g.lineCap = 'round';
        g.lineJoin = 'round';
        g.globalAlpha = o.opacity;
      }
      // 矢印：三角を大きめにし、線は矢先まで引かず三角の底辺で止める（太線の丸端が
      // 矢先からはみ出さない）。三角の頂点は (x2,y2)。
      function drawArrowObj(g, o) {
        const { x1, y1, x2, y2 } = o;
        const ang = Math.atan2(y2 - y1, x2 - x1);
        const head = Math.max(18, o.size * 4);
        // 線の終点は三角の「底辺」まで伸ばして三角と密着させる。底辺の2角は頂点から
        // 距離 head・角度 ±π/7 にあり、その軸方向への投影＝ head*cos(π/7) が底辺の位置。
        // head をそのまま使うと底辺より奥で線が止まり隙間になるため、cos(π/7) を掛ける。
        const backset = head * Math.cos(Math.PI / 7);
        const bx = x2 - backset * Math.cos(ang); // 三角の底辺中央（＝線の終点）
        const by = y2 - backset * Math.sin(ang);
        g.save();
        setupObjStroke(g, o);
        g.lineCap = 'butt';
        g.beginPath(); g.moveTo(x1, y1); g.lineTo(bx, by); g.stroke();
        g.beginPath();
        g.moveTo(x2, y2);
        g.lineTo(x2 - head * Math.cos(ang - Math.PI / 7), y2 - head * Math.sin(ang - Math.PI / 7));
        g.lineTo(x2 - head * Math.cos(ang + Math.PI / 7), y2 - head * Math.sin(ang + Math.PI / 7));
        g.closePath(); g.fill();
        g.restore();
      }
      function drawLineObj(g, o) {
        g.save(); setupObjStroke(g, o);
        g.beginPath(); g.moveTo(o.x1, o.y1); g.lineTo(o.x2, o.y2); g.stroke();
        g.restore();
      }
      function drawRectObj(g, o) {
        g.save(); setupObjStroke(g, o);
        g.strokeRect(o.x, o.y, o.w, o.h);
        g.restore();
      }
      function drawEllipseObj(g, o) {
        g.save(); setupObjStroke(g, o);
        g.beginPath();
        g.ellipse(o.x + o.w / 2, o.y + o.h / 2, o.w / 2, o.h / 2, 0, 0, Math.PI * 2);
        g.stroke(); g.restore();
      }
      function drawTextObj(g, o) {
        g.save();
        g.globalAlpha = o.opacity;
        g.fillStyle = o.color;
        g.font = objFont(o);
        g.textBaseline = 'top';
        const lh = o.fs * 1.2;
        o.text.split('\n').forEach((line, i) => g.fillText(line, o.x, o.y + i * lh));
        g.restore();
      }
      function drawObject(g, o) {
        if (o.hidden) return; // 入力欄で再編集中は canvas 側を消しておく
        if (o.type === 'arrow') drawArrowObj(g, o);
        else if (o.type === 'line') drawLineObj(g, o);
        else if (o.type === 'rect') drawRectObj(g, o);
        else if (o.type === 'ellipse') drawEllipseObj(g, o);
        else if (o.type === 'text') drawTextObj(g, o);
        else if (o.type === 'callout') drawCalloutObj(g, o, true);
      }
      function drawObjects(g) { objects.forEach((o) => drawObject(g, o)); }
      // ドラッグ中の始点・終点から図形オブジェクトを組み立てる（プレビューと確定で共用）。
      function shapeFromDrag(t, a, b, shift) {
        const common = { color: colorInput.value, size: Number(sizeInput.value), opacity: toolAlpha(t) };
        let bb = b;
        if (t === 'line' && shift) { // Shift で 45° 刻みにスナップ
          const d = Math.hypot(b.x - a.x, b.y - a.y);
          const ang = Math.round(Math.atan2(b.y - a.y, b.x - a.x) / (Math.PI / 4)) * (Math.PI / 4);
          bb = { x: a.x + d * Math.cos(ang), y: a.y + d * Math.sin(ang) };
        }
        if (t === 'arrow' || t === 'line') return { ...common, type: t, x1: a.x, y1: a.y, x2: bb.x, y2: bb.y };
        return {
          ...common, type: t,
          x: Math.min(a.x, b.x), y: Math.min(a.y, b.y),
          w: Math.abs(b.x - a.x), h: Math.abs(b.y - a.y),
        };
      }
      // オブジェクトの外接矩形（選択枠・ヒットテスト用）
      function objBounds(o) {
        if (o.type === 'arrow' || o.type === 'line') {
          return { x: Math.min(o.x1, o.x2), y: Math.min(o.y1, o.y2), w: Math.abs(o.x2 - o.x1), h: Math.abs(o.y2 - o.y1) };
        }
        if (o.type === 'rect' || o.type === 'ellipse') return { x: o.x, y: o.y, w: o.w, h: o.h };
        if (o.type === 'text') {
          ctx.save();
          ctx.font = objFont(o);
          const lines = o.text.split('\n');
          let tw = 0;
          for (const l of lines) tw = Math.max(tw, ctx.measureText(l.length ? l : ' ').width);
          ctx.restore();
          return { x: o.x, y: o.y, w: Math.ceil(tw), h: lines.length * o.fs * 1.2 };
        }
        if (o.type === 'callout') {
          const box = calloutBox(o.text, o.fs, o);
          return { x: o.x, y: o.y, w: box.w, h: box.h };
        }
        return { x: 0, y: 0, w: 0, h: 0 };
      }
      // 選択中オブジェクトの破線枠＋ハンドル（Excel 風）。
      function drawSelection() {
        const o = selectedObj();
        if (!o) return;
        const s = dispScale();
        const g = ctx;
        g.save();
        g.setTransform(1, 0, 0, 1, 0, 0);
        g.globalAlpha = 1;
        const b = objBounds(o);
        g.strokeStyle = '#1a73e8';
        g.lineWidth = 1.5 * s;
        g.setLineDash([5 * s, 4 * s]);
        g.strokeRect(b.x - 4 * s, b.y - 4 * s, b.w + 8 * s, b.h + 8 * s);
        g.setLineDash([]);
        const hs = 9 * s;
        g.fillStyle = '#1a73e8';
        objHandles(o).forEach((h) => g.fillRect(h.x - hs / 2, h.y - hs / 2, hs, hs));
        g.restore();
      }
      // 選択オブジェクトの操作ハンドル一覧（kind はドラッグ時の役割）。
      function objHandles(o) {
        if (o.type === 'arrow' || o.type === 'line') {
          return [{ kind: 'p1', x: o.x1, y: o.y1 }, { kind: 'p2', x: o.x2, y: o.y2 }];
        }
        if (o.type === 'rect' || o.type === 'ellipse') {
          return [
            { kind: 'nw', x: o.x, y: o.y }, { kind: 'ne', x: o.x + o.w, y: o.y },
            { kind: 'sw', x: o.x, y: o.y + o.h }, { kind: 'se', x: o.x + o.w, y: o.y + o.h },
          ];
        }
        if (o.type === 'callout') return [{ kind: 'tip', x: o.tip.x, y: o.tip.y }];
        return []; // text は移動のみ
      }
      // ---- オブジェクトのヒットテスト（クリック選択・消しゴム削除用） ----
      function distSeg(p, x1, y1, x2, y2) {
        const dx = x2 - x1, dy = y2 - y1;
        const len2 = dx * dx + dy * dy;
        const t = len2 ? Math.max(0, Math.min(1, ((p.x - x1) * dx + (p.y - y1) * dy) / len2)) : 0;
        return Math.hypot(p.x - (x1 + t * dx), p.y - (y1 + t * dy));
      }
      // pad: 判定を広げる追加量（消しゴムの半径など）
      function objHit(o, p, pad) {
        const tol = Math.max((o.size || 0) / 2 + 4, 8 * dispScale()) + (pad || 0);
        if (o.type === 'arrow' || o.type === 'line') return distSeg(p, o.x1, o.y1, o.x2, o.y2) <= tol;
        if (o.type === 'rect') {
          // 枠線の近傍だけ当たり（塗り無しなので内側は素通しにして下の物を掴める）
          const inOuter = p.x >= o.x - tol && p.x <= o.x + o.w + tol && p.y >= o.y - tol && p.y <= o.y + o.h + tol;
          const inInner = p.x >= o.x + tol && p.x <= o.x + o.w - tol && p.y >= o.y + tol && p.y <= o.y + o.h - tol;
          return inOuter && !inInner;
        }
        if (o.type === 'ellipse') {
          const rx = o.w / 2, ry = o.h / 2;
          if (rx < 1 || ry < 1) return false;
          const nd = Math.hypot((p.x - (o.x + rx)) / rx, (p.y - (o.y + ry)) / ry); // 正規化距離
          return Math.abs(nd - 1) * Math.min(rx, ry) <= tol;
        }
        // text / callout はバウンディングボックス（callout は尻尾先端も）
        const b = objBounds(o);
        if (p.x >= b.x - tol && p.x <= b.x + b.w + tol && p.y >= b.y - tol && p.y <= b.y + b.h + tol) return true;
        if (o.type === 'callout') return Math.hypot(p.x - o.tip.x, p.y - o.tip.y) <= CALLOUT_HIT * dispScale();
        return false;
      }
      // 最前面（配列の後ろ）から順に当たりを探す
      function hitObject(p, pad) {
        for (let i = objects.length - 1; i >= 0; i--) {
          const o = objects[i];
          if (!o.hidden && objHit(o, p, pad)) return o;
        }
        return null;
      }
      function hitObjHandle(o, p) {
        const tol = 11 * dispScale();
        for (const h of objHandles(o)) {
          if (Math.abs(p.x - h.x) <= tol && Math.abs(p.y - h.y) <= tol) return h.kind;
        }
        return null;
      }
      // 選択オブジェクトのドラッグ（移動・端点・四隅・尻尾）を適用する。
      // d.orig（ドラッグ開始時の複製）基準で差分を足すので累積誤差が出ない。
      function applyObjDrag(d, p) {
        const dx = p.x - d.sx, dy = p.y - d.sy;
        const o = d.obj, s = d.orig;
        if (d.mode === 'move') {
          if (o.type === 'arrow' || o.type === 'line') { o.x1 = s.x1 + dx; o.y1 = s.y1 + dy; o.x2 = s.x2 + dx; o.y2 = s.y2 + dy; }
          else { o.x = s.x + dx; o.y = s.y + dy; }
          if (o.tip) { o.tip.x = s.tip.x + dx; o.tip.y = s.tip.y + dy; }
        } else if (d.mode === 'p1') { o.x1 = s.x1 + dx; o.y1 = s.y1 + dy; }
        else if (d.mode === 'p2') { o.x2 = s.x2 + dx; o.y2 = s.y2 + dy; }
        else if (d.mode === 'tip') { o.tip.x = s.tip.x + dx; o.tip.y = s.tip.y + dy; }
        else { // nw / ne / sw / se（rect・ellipse のリサイズ）
          let x1 = s.x, y1 = s.y, x2 = s.x + s.w, y2 = s.y + s.h;
          if (d.mode.includes('w')) x1 = Math.min(x2 - 4, x1 + dx);
          if (d.mode.includes('e')) x2 = Math.max(x1 + 4, x2 + dx);
          if (d.mode.includes('n')) y1 = Math.min(y2 - 4, y1 + dy);
          if (d.mode.includes('s')) y2 = Math.max(y1 + 4, y2 + dy);
          o.x = x1; o.y = y1; o.w = x2 - x1; o.h = y2 - y1;
        }
      }
      // 消しゴムが触れたオブジェクトを丸ごと削除する（要件：元画像以外はすべて消せる）
      function eraseObjectsAt(p) {
        const radius = Math.max(4, Number(sizeInput.value) * 2) / 2;
        const before = objects.length;
        objects = objects.filter((o) => {
          if (!o.hidden && objHit(o, p, radius)) { if (selectedId === o.id) selectedId = null; return false; }
          return true;
        });
        return objects.length !== before;
      }
      // ── 吹き出し（クリック挿入・文字で自動リサイズ・尻尾を好きな向きへ）──────
      // calloutBox: 文字から本体（尻尾を除く）の寸法を測る。
      function calloutBox(text, fs, style) {
        annoCtx.save();
        annoCtx.font = objFont({ fs, bold: style && style.bold, italic: style && style.italic });
        const lines = (text.length ? text : ' ').split('\n');
        const lh = Math.round(fs * 1.3);
        let tw = 0;
        for (const l of lines) tw = Math.max(tw, annoCtx.measureText(l.length ? l : ' ').width);
        annoCtx.restore();
        const P = Math.round(fs * 0.55);
        return { lines, lh, P, w: Math.ceil(tw) + P * 2, h: lines.length * lh + P * 2 };
      }
      // calloutPath: 角丸本体＋「tip（先端）が向く辺」に尻尾を差し込んだ一筆書きパス。
      // 本体中心から tip への方向で上下左右いずれの辺から尻尾を出すか決めるので、
      // tip をどこへ動かしても（360°）自然に向く。
      function calloutPath(g, x, y, w, h, r, tip, tW) {
        const cx = x + w / 2, cy = y + h / 2;
        const dx = tip.x - cx, dy = tip.y - cy;
        let edge;
        if (Math.abs(dy) / h >= Math.abs(dx) / w) edge = dy < 0 ? 'top' : 'bottom';
        else edge = dx < 0 ? 'left' : 'right';
        const cl = (v, a, b) => Math.max(a, Math.min(b, v));
        const tWx = Math.max(4, Math.min(tW, (w - 2 * r) / 2 - 1));
        const tWy = Math.max(4, Math.min(tW, (h - 2 * r) / 2 - 1));
        g.beginPath();
        g.moveTo(x + r, y);
        if (edge === 'top') { const bc = cl(tip.x, x + r + tWx, x + w - r - tWx); g.lineTo(bc - tWx, y); g.lineTo(tip.x, tip.y); g.lineTo(bc + tWx, y); }
        g.lineTo(x + w - r, y);
        g.arcTo(x + w, y, x + w, y + r, r);
        if (edge === 'right') { const bc = cl(tip.y, y + r + tWy, y + h - r - tWy); g.lineTo(x + w, bc - tWy); g.lineTo(tip.x, tip.y); g.lineTo(x + w, bc + tWy); }
        g.lineTo(x + w, y + h - r);
        g.arcTo(x + w, y + h, x + w - r, y + h, r);
        if (edge === 'bottom') { const bc = cl(tip.x, x + r + tWx, x + w - r - tWx); g.lineTo(bc + tWx, y + h); g.lineTo(tip.x, tip.y); g.lineTo(bc - tWx, y + h); }
        g.lineTo(x + r, y + h);
        g.arcTo(x, y + h, x, y + h - r, r);
        if (edge === 'left') { const bc = cl(tip.y, y + r + tWy, y + h - r - tWy); g.lineTo(x, bc + tWy); g.lineTo(tip.x, tip.y); g.lineTo(x, bc - tWy); }
        g.lineTo(x, y + r);
        g.arcTo(x, y, x + r, y, r);
        g.closePath();
      }
      // 本体＋尻尾を描く（withText=false は文字を描かない＝編集中プレビュー用）。
      // o: callout オブジェクト（{x,y,text,fs,tip,color,size,opacity}）。
      function drawCalloutObj(g, o, withText) {
        const box = calloutBox(o.text, o.fs, o);
        const r = Math.min(16, box.w / 2, box.h / 2);
        const tW = Math.max(10, Math.round(o.fs * 0.6));
        g.save();
        g.globalAlpha = o.opacity;
        calloutPath(g, o.x, o.y, box.w, box.h, r, o.tip, tW);
        g.strokeStyle = o.color;
        g.fillStyle = 'rgba(255,255,255,0.92)';
        g.lineWidth = Math.max(2, o.size);
        g.lineJoin = 'round';
        g.fill(); g.stroke();
        if (withText) {
          g.fillStyle = o.color;
          g.font = objFont(o);
          g.textBaseline = 'top';
          box.lines.forEach((l, i) => g.fillText(l, o.x + box.P, o.y + box.P + i * box.lh));
        }
        g.restore();
      }
      // モザイク：base 層（スクショ）を対象にブロック平均で塗り潰す。
      function applyMosaic(g, rx, ry, rw, rh) {
        rx = Math.max(0, Math.round(rx)); ry = Math.max(0, Math.round(ry));
        rw = Math.min(canvas.width - rx, Math.round(rw));
        rh = Math.min(canvas.height - ry, Math.round(rh));
        if (rw <= 0 || rh <= 0) return;
        const block = Math.max(8, Number(sizeInput.value) * 2);
        const data = g.getImageData(rx, ry, rw, rh).data;
        g.globalAlpha = 1;
        for (let by = 0; by < rh; by += block) {
          for (let bx = 0; bx < rw; bx += block) {
            const xmax = Math.min(bx + block, rw), ymax = Math.min(by + block, rh);
            let r = 0, gg = 0, b = 0, n = 0;
            for (let y = by; y < ymax; y++) for (let x = bx; x < xmax; x++) {
              const i = (y * rw + x) * 4;
              r += data[i]; gg += data[i + 1]; b += data[i + 2]; n++;
            }
            g.fillStyle = `rgb(${(r / n) | 0},${(gg / n) | 0},${(b / n) | 0})`;
            g.fillRect(rx + bx, ry + by, xmax - bx, ymax - by);
          }
        }
      }

      // ---- テキスト（Electron の prompt 不可対策：その場編集の入力欄を出す）----
      // existing を渡すと既存テキストオブジェクトの再編集（ダブルクリックから）。
      let editingText = false; // 入力欄が開いている間 true（Delete キー等の誤爆防止）
      function beginText(p, existing) {
        const scale = canvas.offsetWidth ? canvas.offsetWidth / canvas.width : 1;
        // 書式（サイズ・太字・斜体）: 既存の再編集はその値、新規はツールバーの既定値
        const fmt = existing
          ? { fs: existing.fs, bold: existing.bold !== false, italic: !!existing.italic }
          : { fs: textFmt.fs, bold: textFmt.bold, italic: textFmt.italic };
        const pos = existing ? { x: existing.x, y: existing.y } : p;
        const color = existing ? existing.color : colorInput.value;
        const ta = document.createElement('textarea');
        ta.className = 'ie-text-input';
        ta.rows = 1;
        ta.style.left = (canvas.offsetLeft + pos.x * scale) + 'px';
        ta.style.top = (canvas.offsetTop + pos.y * scale) + 'px';
        ta.style.color = color;
        const applyTaStyle = () => { ta.style.font = objFont(fmt, scale); };
        applyTaStyle();
        canvasWrap.appendChild(ta);
        editingText = true;
        const fit = () => {
          ta.style.height = 'auto'; ta.style.height = ta.scrollHeight + 'px';
          ta.style.width = 'auto';
          ta.style.width = Math.min(ta.scrollWidth + 24, canvas.offsetWidth) + 'px';
        };
        // 編集中はツールバーの書式変更を入力欄へ即時反映させる
        fmtTarget = {
          get: () => fmt,
          set: (changes) => { Object.assign(fmt, changes); applyTaStyle(); fit(); },
        };
        syncTextFmtUI();
        if (existing) { ta.value = existing.text; existing.hidden = true; recomposite(); fit(); }
        ta.focus();
        if (existing) ta.select();
        let done = false;
        const commit = () => {
          if (done) return; done = true;
          editingText = false;
          fmtTarget = null;
          const text = ta.value;

          ? { fs: existing.fs, bold: existing.bold !== false, italic: !!existing.italic }

        const ta = document.createElement('textarea');
        ta.className = 'ie-callout-input';
        ta.value = existing ? existing.text : 'ここをクリック';
        ta.rows = 1;
        canvasWrap.appendChild(ta);
        const box0 = calloutBox(ta.value, fmt0.fs, fmt0);
        const ac = {
          x: existing ? existing.x : p.x,
          y: existing ? existing.y : p.y,
          fs: fmt0.fs, bold: fmt0.bold, italic: fmt0.italic,
          ta, existing: existing || null,
          done: false, dragTip: false, hoverTip: false,
          // 初期の尻尾先端＝本体の下・少し左（下向き）。以後ドラッグで自由に。
          tip: existing ? { x: existing.tip.x, y: existing.tip.y }

        };

        if (existing) { existing.hidden = true; }

        ac.render = () => {
          if (activeCallout !== ac) return;
          // 編集中の見た目は本体だけ描き、文字は textarea 側に出す。
          const color = existing ? existing.color : colorInput.value;
          const size = existing ? existing.size : Number(sizeInput.value);
          const opacity = existing ? existing.opacity : toolAlpha('callout');
          const preview = { x: ac.x, y: ac.y, text: ta.value, fs: ac.fs, bold: ac.bold, italic: ac.italic, tip: ac.tip, color, size, opacity };

            ctx.fillStyle = color; ctx.strokeStyle = '#fff';
            ctx.lineWidth = 2 * dispScale();

            ctx.fill(); ctx.stroke();

        syncTextFmtUI();

        ta.addEventListener('keydown', (ev) => {
          ev.stopPropagation();
          if (ev.key === 'Enter' && !ev.shiftKey) { ev.preventDefault(); commitCallout(); }
          else if (ev.key === 'Escape') { ev.preventDefault(); cancelCallout(); }

      function commitCallout() {

        fmtTarget = null;
        const text = ac.ta.value;
        ac.ta.remove();
        if (ac.existing) {
          const ex = ac.existing;
          delete ex.hidden;
          const fmtChanged =
            ex.fs !== ac.fs || (ex.bold !== false) !== ac.bold || !!ex.italic !== ac.italic;
          if (text.trim() === '') {
            pushUndo();
            objects = objects.filter((o) => o.id !== ex.id);
            if (selectedId === ex.id) selectedId = null;
          } else if (text !== ex.text || ac.tip.x !== ex.tip.x || ac.tip.y !== ex.tip.y || fmtChanged) {
            pushUndo();
            ex.text = text;
            ex.tip = { x: ac.tip.x, y: ac.tip.y };
            ex.fs = ac.fs; ex.bold = ac.bold; ex.italic = ac.italic;
          }
          recomposite();
          return;
        }
        if (text.trim() === '') { recomposite(); return; }
        pushUndo();
        const obj = {
          id: newObjId(), type: 'callout', x: ac.x, y: ac.y, text,
          fs: ac.fs, bold: ac.bold, italic: ac.italic,
          tip: { x: ac.tip.x, y: ac.tip.y },
          color: colorInput.value, size: Number(sizeInput.value), opacity: toolAlpha('callout'),
        };
        objects.push(obj);
        selectedId = obj.id; // 確定直後も選択状態にして、書式変更を続けられるように
        recomposite();
      }
      function cancelCallout() {
        const ac = activeCallout;
        if (!ac || ac.done) return;
        ac.done = true;
        activeCallout = null;
        fmtTarget = null;
        ac.ta.remove();
        if (ac.existing) delete ac.existing.hidden;
        recomposite();
      }

      // ---- ハンドツール（パン） ----
      let panning = null;
      function startPan(e) {
        panning = { x: e.clientX, y: e.clientY, sl: canvasWrap.scrollLeft, st: canvasWrap.scrollTop };
        canvas.classList.add('panning');
        canvas.setPointerCapture(e.pointerId);
      }
      function doPan(e) {
        if (!panning) return;
        canvasWrap.scrollLeft = panning.sl - (e.clientX - panning.x);
        canvasWrap.scrollTop = panning.st - (e.clientY - panning.y);
      }
      function endPan() { panning = null; canvas.classList.remove('panning'); }

      // ---- トリミング（Excel 式：8ハンドルで領域を調整→適用） ----
      let cropMode = false;
      let cropRect = null;  // {x,y,w,h} canvas px
      let cropDrag = null;  // {mode, sx, sy, rect}
      const cropActions = overlay.querySelector('.ie-crop-actions');
      function enterCropMode() {
        if (canvas.width < 10 || canvas.height < 10) return;
        cropMode = true;
        const m = Math.round(Math.min(canvas.width, canvas.height) * 0.1);
        cropRect = { x: m, y: m, w: canvas.width - m * 2, h: canvas.height - m * 2 };
        if (cropRect.w < 10 || cropRect.h < 10) cropRect = { x: 0, y: 0, w: canvas.width, h: canvas.height };
        if (cropActions) cropActions.hidden = false;
        recomposite();
      }
      function exitCropMode() {
        if (!cropMode) return;
        cropMode = false; cropRect = null; cropDrag = null;
        if (cropActions) cropActions.hidden = true;
        recomposite();
      }
      function handlePoints() {
        const { x, y, w, h } = cropRect;
        return {
          nw: [x, y], n: [x + w / 2, y], ne: [x + w, y],
          e: [x + w, y + h / 2], se: [x + w, y + h], s: [x + w / 2, y + h],
          sw: [x, y + h], w: [x, y + h / 2],
        };
      }
      function hitHandle(p) {
        const tol = 11 * dispScale();
        const pts = handlePoints();
        for (const k in pts) {
          if (Math.abs(p.x - pts[k][0]) <= tol && Math.abs(p.y - pts[k][1]) <= tol) return k;
        }
        if (p.x > cropRect.x && p.x < cropRect.x + cropRect.w &&
            p.y > cropRect.y && p.y < cropRect.y + cropRect.h) return 'move';
        return null;
      }
      function drawCropOverlay() {
        const g = ctx, s = dispScale();
        g.save();
        g.setTransform(1, 0, 0, 1, 0, 0);
        g.globalAlpha = 1;
        g.fillStyle = 'rgba(0,0,0,0.45)'; // 選択外を暗く（evenodd で内側を抜く）
        g.beginPath();
        g.rect(0, 0, canvas.width, canvas.height);
        g.rect(cropRect.x, cropRect.y, cropRect.w, cropRect.h);
        g.fill('evenodd');
        g.strokeStyle = '#1a73e8';
        g.setLineDash([]);
        g.lineWidth = 2 * s;
        g.strokeRect(cropRect.x, cropRect.y, cropRect.w, cropRect.h);
        const hs = 9 * s;
        g.fillStyle = '#1a73e8';
        const pts = handlePoints();
        for (const k in pts) g.fillRect(pts[k][0] - hs / 2, pts[k][1] - hs / 2, hs, hs);

      }
      function updateCrop(p) {
        const d = cropDrag, r = { ...d.rect };

        if (d.mode === 'move') {
          r.x = Math.max(0, Math.min(canvas.width - r.w, r.x + dx));
          r.y = Math.max(0, Math.min(canvas.height - r.h, r.y + dy));
        } else {
          let x1 = r.x, y1 = r.y, x2 = r.x + r.w, y2 = r.y + r.h;
          if (d.mode.includes('w')) x1 = Math.max(0, Math.min(x2 - MIN, x1 + dx));
          if (d.mode.includes('e')) x2 = Math.min(canvas.width, Math.max(x1 + MIN, x2 + dx));
          if (d.mode.includes('n')) y1 = Math.max(0, Math.min(y2 - MIN, y1 + dy));
          if (d.mode.includes('s')) y2 = Math.min(canvas.height, Math.max(y1 + MIN, y2 + dy));
          r.x = x1; r.y = y1; r.w = x2 - x1; r.h = y2 - y1;
        }
        cropRect = r;
        recomposite();
      }
      function applyCrop() {
        if (!cropRect) return;

        const rw = Math.round(cropRect.w), rh = Math.round(cropRect.h);
        if (rw < 4 || rh < 4) return;
        pushUndo();
        const tb = document.createElement('canvas'); tb.width = rw; tb.height = rh;
        tb.getContext('2d').drawImage(baseCanvas, rx, ry, rw, rh, 0, 0, rw, rh);
        const tak = document.createElement('canvas'); tak.width = rw; tak.height = rh;
        tak.getContext('2d').drawImage(annoCanvas, rx, ry, rw, rh, 0, 0, rw, rh);
        setLayerSize(rw, rh);
        baseCtx.drawImage(tb, 0, 0);
        annoCtx.drawImage(tak, 0, 0);
        // オブジェクトは切り出し位置に合わせて平行移動する（範囲外に出たものも
        // 消さずに残す＝描画時にクリップされるだけで、移動で戻せる）。
        objects.forEach((o) => {
          if (o.type === 'arrow' || o.type === 'line') { o.x1 -= rx; o.y1 -= ry; o.x2 -= rx; o.y2 -= ry; }
          else { o.x -= rx; o.y -= ry; }
          if (o.tip) { o.tip.x -= rx; o.tip.y -= ry; }

        cropMode = false; cropRect = null; cropDrag = null;

        recomposite();
      }
      if (cropActions) {
        overlay.querySelector('.ie-crop-apply').addEventListener('click', applyCrop);
        overlay.querySelector('.ie-crop-cancel').addEventListener('click', () => selectTool('arrow'));
      }
      selectTool('arrow'); // 初期ツール（crop 系関数の定義後に呼ぶ）

      // ---- ポインタ操作 ----
      let drawing = false;
      let start = null;
      let objDrag = null; // 選択オブジェクトのドラッグ {mode, obj, sx, sy, orig, moved}
      let colorGestureFor = null; // 選択オブジェクトへの色変更を1操作でundoするための印
      // オブジェクトを配置する系のツール＋ハンドでは、既存オブジェクトのクリックを

        if (activeCallout) {

        if (OBJECT_TOOLS.includes(tool)) {

          if (hk) { // 選択中オブジェクトのハンドル（端点・四隅・尻尾）

          const h = hitHandle(p);
          if (h) { cropDrag = { mode: h, sx: p.x, sy: p.y, rect: { ...cropRect } }; canvas.setPointerCapture(e.pointerId); }
          return;
        }
        if (tool === 'text') { beginText(p); return; }
        if (tool === 'callout') { beginCallout(p); return; }
        drawing = true;
        start = p;
        if (tool === 'pen' || tool === 'marker' || tool === 'eraser') {
          pushUndo();
          if (tool === 'eraser') {
            annoCtx.save();
            annoCtx.globalCompositeOperation = 'destination-out';
            annoCtx.globalAlpha = 1;
            annoCtx.lineWidth = Math.max(4, Number(sizeInput.value) * 2);
            annoCtx.lineCap = 'round'; annoCtx.lineJoin = 'round';
            annoCtx.beginPath(); annoCtx.moveTo(p.x, p.y);
            annoCtx.lineTo(p.x + 0.01, p.y + 0.01); annoCtx.stroke(); // 点クリックでも痕を残す
            eraseObjectsAt(p);
          } else {
            // ペン/ハイライトは strokeCanvas に描き、確定時に透過率で一括焼き込み
            //（annoCtx へ直描きすると move ごとの重ね塗りで透過色が濃くなる）。
            liveStroke = {
              pts: [p],
              color: colorInput.value,
              width: Number(sizeInput.value) * (tool === 'marker' ? 3 : 1),
              alpha: toolAlpha(tool),
            };
            renderLiveStroke();
          }
          recomposite();
        }
        canvas.setPointerCapture(e.pointerId);
      });

      canvas.addEventListener('pointermove', (e) => {
        // 吹き出し編集中：尻尾ドラッグ、または先端付近ホバーでハンドルを表示。
        if (activeCallout) {
          const p = xy(e);
          if (activeCallout.dragTip) { activeCallout.tip = p; activeCallout.render(); return; }
          const hov = nearCalloutTip(p);
          if (hov !== activeCallout.hoverTip) { activeCallout.hoverTip = hov; activeCallout.render(); }
          canvas.style.cursor = hov ? 'grab' : (tool === 'callout' ? 'crosshair' : '');
          return;
        }
        // 選択オブジェクトのドラッグ（移動・変形）。undo は実際に動いた時だけ積む。
        if (objDrag) {
          const p = xy(e);
          if (!objDrag.moved) {
            if (Math.hypot(p.x - objDrag.sx, p.y - objDrag.sy) < 2 * dispScale()) return; // クリックの揺れは無視
            pushUndo();
            objDrag.moved = true;
          }
          applyObjDrag(objDrag, p);
          recomposite();
          return;
        }
        if (tool === 'hand') { doPan(e); return; }
        if (tool === 'crop') { if (cropDrag) updateCrop(xy(e)); return; }
        if (!drawing) {
          // ホバー中のカーソル表示（ハンドル＝grab、本体＝move）。hand はパン用カーソル優先。
          if (OBJECT_TOOLS.includes(tool) && tool !== 'hand') {
            const p2 = xy(e);
            const sel = selectedObj();
            const hk = sel && hitObjHandle(sel, p2);
            canvas.style.cursor = hk ? 'grab' : (hitObject(p2) ? 'move' : '');
          }
          return;
        }
        const p = xy(e);
        if (tool === 'pen' || tool === 'marker') {
          if (liveStroke) { liveStroke.pts.push(p); renderLiveStroke(); }
          recomposite(); return;
        }
        if (tool === 'eraser') {
          annoCtx.lineTo(p.x, p.y); annoCtx.stroke();
          eraseObjectsAt(p); // 触れたオブジェクトは丸ごと消す
          recomposite(); return;

        recomposite();

        } else if (tool === 'mosaic') {
          ctx.save();
          ctx.globalAlpha = 1;
          ctx.strokeStyle = '#1a73e8';
          ctx.setLineDash([6, 4]);
          ctx.lineWidth = 2 * dispScale();
          ctx.strokeRect(start.x, start.y, p.x - start.x, p.y - start.y);
          ctx.restore();
        }
      });

      function finish(e) {
        // 吹き出しの尻尾ドラッグ終了（編集は継続。本文入力へ戻せるよう再フォーカス）。
        if (activeCallout) {

            activeCallout.dragTip = false;
            activeCallout.render();
            try { activeCallout.ta.focus(); } catch (_) {}
          }
          return;
        }
        if (objDrag) { objDrag = null; recomposite(); return; }
        if (tool === 'hand') { endPan(); return; }
        if (tool === 'crop') { cropDrag = null; return; }
        if (!drawing) return;
        drawing = false;
        const p = xy(e);
        if (tool === 'eraser') {
          try { annoCtx.restore(); } catch (_) {}
          recomposite();
          return;
        }
        if (tool === 'pen' || tool === 'marker') {
          bakeLiveStroke();
          recomposite();
          return;
        }
        if (tool === 'arrow' || tool === 'line' || tool === 'rect' || tool === 'ellipse') {
          const o = shapeFromDrag(tool, start, p, e.shiftKey);
          const tiny = (o.type === 'rect' || o.type === 'ellipse')
            ? (o.w < 2 && o.h < 2)
            : Math.hypot(o.x2 - o.x1, o.y2 - o.y1) < 2;
          if (!tiny) { // 点クリックのゴミ図形は作らない
            pushUndo();
            o.id = newObjId();
            objects.push(o);
            selectedId = o.id; // 描いた直後は選択状態（すぐ動かせる）
          }
        } else if (tool === 'mosaic') {
          pushUndo();
          applyMosaic(baseCtx, Math.min(start.x, p.x), Math.min(start.y, p.y),
            Math.abs(p.x - start.x), Math.abs(p.y - start.y));

      }
      canvas.addEventListener('pointerup', finish);
      canvas.addEventListener('pointercancel', () => {
        if (activeCallout && activeCallout.dragTip) { activeCallout.dragTip = false; activeCallout.render(); return; }
        if (tool === 'eraser') { try { annoCtx.restore(); } catch (_) {} }
        if (tool === 'pen' || tool === 'marker') bakeLiveStroke(); // 描きかけ分は確定させる
        drawing = false; cropDrag = null; objDrag = null; endPan(); recomposite();
      });
      // ダブルクリックでテキスト・吹き出しを再編集（Excel と同じ操作感）
      canvas.addEventListener('dblclick', (e) => {
        if (activeCallout || cropMode) return;
        if (!OBJECT_TOOLS.includes(tool)) return;
        const p = xy(e);
        const hit = hitObject(p);
        if (hit && (hit.type === 'text' || hit.type === 'callout')) {
          e.preventDefault();
          selectedId = hit.id;
          objDrag = null;
          if (hit.type === 'text') beginText(p, hit);
          else beginCallout(p, hit);
        }
      });
      // 選択中オブジェクトの削除（Delete キーと右クリックメニューで共用）
      function deleteSelectedObject() {
        if (!selectedId) return;
        pushUndo();
        objects = objects.filter((o) => o.id !== selectedId);
        selectedId = null;
        recomposite();
      }
      // 右クリックでオブジェクトを削除（Office 風のミニコンテキストメニュー）。
      // 誤右クリックの即消滅を避けるため、選択枠で対象を見せてから「削除」を選ばせる。
      canvas.addEventListener('contextmenu', (e) => {
        e.preventDefault(); // 既定メニュー・選択系の既定動作を抑止（Electron では通常出ないが保険）
        if (cropMode || activeCallout) return;
        if (!OBJECT_TOOLS.includes(tool)) return; // クリック選択と同じ対象ツールに限定して一貫性を保つ
        const hit = hitObject(xy(e));
        if (!hit) return;
        selectedId = hit.id;
        recomposite(); // 何が消えるか選択枠で可視化してからメニューを出す
        ieOpenContextMenu(e.clientX, e.clientY);
      });
      // カーソル位置にミニメニューを開く。id を rb-palette にすると、パレット共通の
      // グローバル mousedown 閉じ処理と rbClosePalette() がそのまま効く。
      function ieOpenContextMenu(x, y) {
        rbClosePalette();
        const menu = document.createElement('div');
        menu.className = 'rb-palette ie-ctx';
        menu.id = 'rb-palette';
        const del = document.createElement('button');
        del.type = 'button';
        del.textContent = '🗑 削除';
        del.addEventListener('mousedown', (ev) => {
          ev.preventDefault(); // 先にグローバル閉じ処理が走ってもボタン自体は .rb-palette 内なので届く
          deleteSelectedObject();
          rbClosePalette();
        });
        menu.appendChild(del);
        document.body.appendChild(menu);
        const w = menu.offsetWidth || 120;
        const h = menu.offsetHeight || 40;
        menu.style.left = Math.max(8, Math.min(x, window.innerWidth - w - 8)) + 'px';
        menu.style.top = Math.max(8, Math.min(y, window.innerHeight - h - 8)) + 'px';
      }

      function close() {
        cancelCallout(); // 編集中の吹き出しは破棄
        rbClosePalette(); // 右クリックメニューを開いたまま閉じた場合の取り残し防止
        window.removeEventListener('resize', onResize);
        document.removeEventListener('keydown', onKey);
        overlay.remove();
      }
      function onKey(ev) {
        // テキスト・吹き出しの入力欄は自前の keydown で stopPropagation するため
        // ここへは届かない。他の入力要素上でも誤動作しないようガードする。
        const t = ev.target;
        const inField = t && (t.tagName === 'INPUT' || t.tagName === 'TEXTAREA' || t.isContentEditable);
        if (ev.key === 'Escape') {
          if (selectedId) { selectedId = null; recomposite(); return; } // まず選択解除、もう一度で閉じる
          close();
        } else if ((ev.key === 'Delete' || ev.key === 'Backspace') && selectedId && !inField) {
          ev.preventDefault();
          deleteSelectedObject();
        }
      }
      document.addEventListener('keydown', onKey);
      overlay.querySelector('.ie-cancel').addEventListener('click', close);
      // 注釈層（手描き線）が完全に透明かどうか（空なら strokes を保存しない容量対策）
      function isCanvasBlank(cv) {
        try {
          const d = cv.getContext('2d').getImageData(0, 0, cv.width, cv.height).data;
          for (let i = 3; i < d.length; i += 4) if (d[i] !== 0) return false;
          return true;
        } catch (_) { return false; }
      }
      overlay.querySelector('.ie-save').addEventListener('click', async () => {
        commitCallout(); // 未確定の吹き出しを確定してから書き出す
        exitCropMode();
        selectedId = null;
        // 合成結果（crop オーバーレイ無し）を別 canvas に作って書き出す。
        // images[index] は従来どおりこの合成 JPEG（サムネイル・印刷・Word 出力用）。
        const out = document.createElement('canvas');
        out.width = canvas.width; out.height = canvas.height;
        const og = out.getContext('2d');
        og.drawImage(baseCanvas, 0, 0);
        og.drawImage(annoCanvas, 0, 0);
        drawObjects(og); // ベクター注釈も焼き込んだ合成を書き出す
        const data = out.toDataURL('image/jpeg', IMG_QUALITY);
        // 編集ソースは焼き込まずに分離保存する。次回開いたときに手描き線は
        // 消しゴムで消せて、図形・テキスト・吹き出しは再編集できる。
        const strokesBlank = isCanvasBlank(annoCanvas);
        const cleanObjects = JSON.parse(JSON.stringify(objects));
        cleanObjects.forEach((o) => delete o.hidden);
        const edit = {
          v: 1,
          // 線もオブジェクトも無ければ base は合成と同一なので '' で節約
          //（ロード時に images[index] へフォールバックする）
          base: (strokesBlank && !cleanObjects.length) ? '' : baseCanvas.toDataURL('image/jpeg', IMG_QUALITY),
          strokes: strokesBlank ? '' : annoCanvas.toDataURL('image/png'),
          objects: cleanObjects,
        };
        try {
          // Electron では合成画像・編集ソースとも個別ファイルへ保存して参照を持つ
          const storedData = await storeImage(data);
          if (edit.base) edit.base = await storeImage(edit.base);
          if (edit.strokes) edit.strokes = await storeImage(edit.strokes);
          const ok = commitImage((s) =>
            M.replaceItemImage(M.findChecklist(s, c.id), sectionId, itemId, index, storedData, edit)
          );
          if (ok) close();
        } catch (e) {
          alert('画像の保存に失敗しました: ' + (e.message || e));
        }
      });
    }

    // ---- 入力欄の編集中でも確実に押せるボタン群（pointerdown 処理）----
    // click だと、入力欄の blur→change による再描画でボタンが消えてクリックが
    // 失われるため、pointerdown で「編集中の入力を確定 → 実行」する。
    document.addEventListener('pointerdown', (e) => {
      const btn = e.target.closest('[data-action]');
      if (!btn) return;
      const action = btn.dataset.action;
      if (!['insert-item-after', 'add-image', 'edit-image', 'delete-image', 'move-item-up', 'move-item-down'].includes(action)) return;
      e.preventDefault();
      const c = currentChecklist();
      if (!c) return;
      const sectionId = btn.dataset.section;
      const itemId = btn.dataset.item;
      const index = btn.dataset.index !== undefined ? Number(btn.dataset.index) : -1;
      // 編集中の入力内容を先に確定（change を発火）させる
      const active = document.activeElement;
      if (active && active !== btn && typeof active.blur === 'function'
          && active.matches('input, textarea')) {
        active.blur();
      }
      if (action === 'insert-item-after') {
        const blank = M.createItem(''); // 対象項目の直後に挿入し、追加後にフォーカス
        pendingFocusItem = blank.id;
        store.commit((s) => {
          const cc = M.findChecklist(s, c.id);
          const sec = cc.sections.find((x) => x.id === sectionId);
          if (!sec) return;
          const idx = sec.items.findIndex((x) => x.id === itemId);
          sec.items.splice(idx < 0 ? sec.items.length : idx + 1, 0, blank);
          cc.updatedAt = Date.now();
        });
      } else if (action === 'add-image') {
        pickAndAddImage(c, sectionId, itemId);
      } else if (action === 'edit-image') {
        openImageEditor(c, sectionId, itemId, index);
      } else if (action === 'delete-image') {
        if (confirm('この画像を削除しますか？')) {
          store.commit((s) =>
            M.removeItemImage(M.findChecklist(s, c.id), sectionId, itemId, index)
          );
        }
      } else if (action === 'move-item-up' || action === 'move-item-down') {
        // moveItem は「取り出してから挿入」なので 上=i-1 / 下=i+1 でよい
        const sec = c.sections.find((x) => x.id === sectionId);
        const i = sec ? sec.items.findIndex((x) => x.id === itemId) : -1;
        if (i < 0) return;
        const to = action === 'move-item-up' ? i - 1 : i + 1;
        if (to < 0 || to > sec.items.length - 1) return; // 先頭↑・末尾↓は何もしない
        store.commit((s) =>
          M.moveItem(M.findChecklist(s, c.id), sectionId, itemId, sectionId, to)
        );
      }
    });

    // ---- イベント委譲 ----
    document.addEventListener('click', (e) => {
      const btn = e.target.closest('[data-action]');
      if (!btn) return;
      const action = btn.dataset.action;
      const id = btn.dataset.id;
      const sectionId = btn.dataset.section;
      const itemId = btn.dataset.item;
      const c = currentChecklist();
      switch (action) {
        case 'undo': return store.undo();
        case 'redo': return store.redo();
        case 'record': return toggleRecording();
        case 'import-rec': return openImportPicker();
        case 'home': return goHome();
        case 'new': return openNewDialog();
        case 'open': return goEditor(id);
        case 'import': return fileInput.click();
        case 'export':
          // 画像参照を dataURL に戻してから書き出す（バックアップの自己完結性を守る）
          return materializeState(store.state).then(exportStateToFile);
        case 'duplicate':
          return store.commit((s) => M.duplicateChecklist(s, id));
        case 'rename': {
          const cur = M.findChecklist(store.state, id);
          const title = prompt('新しい名前', cur ? cur.title : '');
          if (title != null) store.commit((s) => M.renameChecklist(M.findChecklist(s, id), title));
          return;
        }
        case 'delete': {
          const cur = M.findChecklist(store.state, id);
          if (confirm(`「${cur ? cur.title : ''}」を削除しますか？`))
            store.commit((s) => M.removeChecklist(s, id));
          return;
        }
        case 'add-section':
          return c && store.commit((s) => M.addSection(M.findChecklist(s, c.id)));
        case 'add-item-btn': {
          if (!c) return;
          const blank = M.createItem(''); // IDを先に確定して追加後にフォーカス
          pendingFocusItem = blank.id;
          store.commit((s) => {
            const cc = M.findChecklist(s, c.id);
            const sec = cc.sections.find((x) => x.id === sectionId);
            if (sec) { sec.items.push(blank); cc.updatedAt = Date.now(); }
          });
          return;
        }
        // insert-item-after は pointerdown で処理する（下の専用リスナー参照）。
        // click だと、メモ等の入力欄からの blur→change による再描画でボタンが
        // 消え、クリックが確定せず挿入が発火しないため。
        case 'delete-section':
          return c && store.commit((s) => M.removeSection(M.findChecklist(s, c.id), sectionId));
        case 'delete-item':
          return c && store.commit((s) => M.removeItem(M.findChecklist(s, c.id), sectionId, itemId));
        case 'reset':
          if (c && confirm('すべての項目を未完了に戻します。よろしいですか？'))
            store.commit((s) => M.resetChecklist(M.findChecklist(s, c.id)));
          return;
        case 'clear-completed':
          return c && store.commit((s) => M.clearCompleted(M.findChecklist(s, c.id)));
        case 'share':
          return c && openShareDialog(c);
        case 'print':
          return c && openPrintPreview(c);
        case 'cover':
          return c && openCoverDialog(c.id);
        case 'save-html':
          return c && saveAsHtml(c);
        case 'save-docx':
          return c && saveDocxViaElectron(c);
      }
    });

    document.addEventListener('change', (e) => {
      const el = e.target;
      const c = currentChecklist();
      if (el.matches('[data-action="toggle"]') && c) {
        store.commit((s) =>
          M.toggleItem(M.findChecklist(s, c.id), el.dataset.section, el.dataset.item)
        );
      }
    });

    document.addEventListener('change', (e) => {
      const el = e.target;
      const c = currentChecklist();
      if (!c) return;
      // 入力欄の DOM は既に編集後の値なので、保存は commitInPlace（再描画なし）で行う。
      // ここで全再描画すると、次にクリックした入力欄が消えてフォーカスが失われる。
      if (el.matches('[data-action="edit-title"]')) {
        commitInPlace((s) => M.renameChecklist(M.findChecklist(s, c.id), el.value));
      } else if (el.matches('[data-action="edit-section"]')) {
        commitInPlace((s) => M.renameSection(M.findChecklist(s, c.id), el.dataset.section, el.value));
      } else if (el.matches('[data-action="edit-item"]')) {
        commitInPlace((s) =>
          M.editItem(M.findChecklist(s, c.id), el.dataset.section, el.dataset.item, el.value)
        );
      } else if (el.matches('[data-action="edit-note"]')) {
        commitInPlace((s) =>
          M.setItemField(M.findChecklist(s, c.id), el.dataset.section, el.dataset.item, 'note', el.value)
        );
      } else if (el.matches('[data-action="edit-time"]')) {
        commitInPlace((s) =>
          M.setItemField(M.findChecklist(s, c.id), el.dataset.section, el.dataset.item, 'time', el.value)
        );
        refreshTimeLabels(); // 合計（総所要・⏱分）表示だけ追随
      }
    });

    // セクションバーの「＋」で追加した項目に、再描画後フォーカスする
    let pendingFocusItem = null;
    function restoreFocus() {
      if (!pendingFocusItem) return;
      const input = app.querySelector(`[data-item="${pendingFocusItem}"] .item-text`);
      pendingFocusItem = null;
      if (input) input.focus();
    }

    function readFileText(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => resolve(reader.result);
        reader.onerror = () => reject(new Error('ファイルの読み込みに失敗しました'));
        reader.readAsText(file);
      });
    }

    fileInput.addEventListener('change', async () => {
      const file = fileInput.files[0];
      fileInput.value = '';
      if (!file) return;
      try {
        const text = await readFileText(file);
        const isHtml = /\.html?$/i.test(file.name) || /id=["']clm-data["']/.test(text);
        if (isHtml) {
          // 本アプリ出力の HTML を取り込む。同一IDなら更新、無ければ新規追加。
          const checklist = parseChecklistFromHtml(text);
          await absorbChecklistImages(checklist); // dataURL → 個別ファイル参照（Electronのみ）
          const existing = M.findChecklist(store.state, checklist.id);
          store.commit((s) => {
            const idx = s.checklists.findIndex((c) => c.id === checklist.id);
            if (idx >= 0) s.checklists[idx] = checklist;
            else s.checklists.push(checklist);
          });
          alert(
            existing
              ? `「${checklist.title}」を更新しました。`
              : `「${checklist.title}」を追加しました。`
          );
          goEditor(checklist.id);
          return;
        }
        // JSON: 従来どおり全state置換。
        const data = JSON.parse(text);
        if (!data || !Array.isArray(data.checklists)) {
          throw new Error('JSON に checklists 配列が見つかりません');
        }
        if (confirm('現在のデータを、読み込んだ内容で置き換えます。よろしいですか？')) {
          // dataURL → 個別ファイル参照（Electronのみ。ブラウザは素通し）
          for (const cl of data.checklists) await absorbChecklistImages(cl);
          store.replaceState(data);
          goHome();
        }
      } catch (err) {
        alert(err.message);
      }
    });

    // ---- 起動 ----
    store.subscribe(() => {
      if (suppressRender) { updateTopbar(); return; } // 入力内容の保存時は再描画しない
      render();
      restoreFocus();
    });
    rbInit();
    // Electron 版なら録画状態の変化を受け取りボタン表示へ反映する。
    if (window.recorderAPI && window.recorderAPI.onState) {
      window.recorderAPI.onState((d) => {
        isRecording = !!(d && d.recording);
        updateRecordButton();
        updateImportButton();
      });
    }
    // 録画停止でセッションが確定したら取り込みウィザードを開く（2-R4）。
    // 0枚（フォルダごと削除済み）はトーストのみ。
    if (window.recorderAPI && window.recorderAPI.onDone) {
      window.recorderAPI.onDone((d) => {
        if (!d || !d.dir || !d.shots) {
          showToast('撮影された画像がなかったため、取り込みは行いません。');
          return;
        }
        openImportWizard(d.dir);
      });
    }
    updateRecordButton();
    updateImportButton();
    if (IS_STANDALONE) {
      // 単体文書モード: 一覧を隠し、埋め込み1件の editor を直接開く。
      document.body.classList.add('clm-standalone');
      const only = store.state.checklists[0];
      if (only) location.hash = '#/c/' + only.id;
    }
    startRouter(() => {
      if (maybeImportShare()) return;
      render();
    });

    // ---- テスト専用フック ----
    // test/harness.js が起動前に window.__test__ = {} を用意したときだけ、
    // 内部 API を書き込む。本番・ブラウザでは __test__ が未定義のため何もしない。
    if (window.__test__) {
      Object.assign(window.__test__, {
        M, store, Store, LocalStorageAdapter, MemoryAdapter, FileAdapter,
        encodeShareLink, readShareFromHash, buildStandaloneHtml,
        materializeState, absorbChecklistImages, resolveImageSync, storeImage,
        showToast, notifySaveError,
        STORAGE_KEY, MIGRATED_KEY,
        // 録画取り込みウィザードの純関数（2-R4）
        wizardDefaultChoice, wizardStepsFrom, wizardMergeUp, wizardBulkReplace,
        wizardShotFiles, buildImportSection,
      });
    }
  })();
  </script>
</body>
</html>
