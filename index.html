<body>
  <div id="topbar">
    <span class="topbar-brand">✓ チェックリスト</span>
    <span class="topbar-spacer"></span>
    <button class="icon" data-action="undo" title="元に戻す (Undo)">↶</button>
    <button class="icon" data-action="redo" title="やり直す (Redo)">↷</button>
    <button class="icon" data-action="record" title="録画開始（クリックの度にスクショ保存）">
      <svg class="rec-ico" width="20" height="20" viewBox="0 0 20 20" aria-hidden="true">
        <rect x="1" y="1" width="18" height="18" rx="4" fill="#111827" />
        <circle cx="10" cy="10" r="5" fill="#ef4444" />
      </svg>
    </button>
    <button class="icon" data-action="theme" title="テーマ切替（自動/ライト/ダーク）">🌓</button>
  </div>

  <main id="app"></main>

  <input id="file-input" type="file" accept="application/json,.json,text/html,.html" hidden />

  <!-- アプリ全体を1ファイルに内包（ES Modules不使用 → file:// のダブルクリックで動作） -->
  <script>
  (function () {
    'use strict';

    // アプリ自身の <script> 要素を同期実行中に捕捉しておく。
    // HTML 出力（自己クローン方式）で、このスクリプト本文をそのまま再パッケージするのに使う。
    const __selfScript = document.currentScript;

    // =========================================================================
    // model — データモデルと純粋な操作関数（副作用なし。永続化やDOMには触れない）
    // =========================================================================
    const uid = () =>
      (crypto.randomUUID && crypto.randomUUID()) ||
      'id-' + Math.random().toString(36).slice(2) + Date.now().toString(36);

    const MODES = { TEMPLATE: 'template', TODO: 'todo' };

    function createItem(text = '') {
      return { id: uid(), text, done: false, note: '', time: '', images: [], body: '' };
    }
    function createSection(title = '') {
      return { id: uid(), title, items: [] };
    }
    // 改訂履歴の1行
    function createRevision(version = '', date = '', author = '', note = '') {
      return { id: uid(), version, date, author, note };
    }
    // テンプレート型の任意の表紙（カバーページ）。初回有効化時に生成する。
    function createCoverPage() {
      return {
        enabled: true,
        preset: 'centered',
        accent: '#3b6ea5',
        title: '',
        subtitle: '',
        author: '',
        date: new Date().toLocaleDateString('ja-JP'),
        version: '',
        docNumber: '',
        logo: '',
        revisions: [],
      };
    }
    function createChecklist(type = MODES.TODO, title = '') {
      const now = Date.now();
      return {
        id: uid(),
        title: title || (type === MODES.TEMPLATE ? '新しいテンプレート' : '新しいリスト'),
        type,
        sections: [createSection('')],
        createdAt: now,
        updatedAt: now,
      };
    }
    function createInitialState() {
      return { checklists: [], settings: { theme: 'auto' } };
    }

    const findChecklist = (state, id) =>
      state.checklists.find((c) => c.id === id) || null;
    const findSection = (checklist, sectionId) =>
      checklist.sections.find((s) => s.id === sectionId) || null;

    function progress(checklist) {
      let total = 0;
      let done = 0;
      const sections = checklist.sections.map((s) => {
        const t = s.items.length;
        const d = s.items.filter((i) => i.done).length;
        total += t;
        done += d;
        return { id: s.id, total: t, done: d, percent: t ? Math.round((d / t) * 100) : 0 };
      });
      return { total, done, percent: total ? Math.round((done / total) * 100) : 0, sections };
    }

    function touch(checklist) {
      checklist.updatedAt = Date.now();
      return checklist;
    }
    function addChecklist(state, checklist) {
      state.checklists.unshift(checklist);
      return state;
    }
    function removeChecklist(state, id) {
      state.checklists = state.checklists.filter((c) => c.id !== id);
      return state;
    }
    function duplicateChecklist(state, id) {
      const src = findChecklist(state, id);
      if (!src) return state;
      const copy = JSON.parse(JSON.stringify(src));
      copy.id = uid();
      copy.title = src.title + '（コピー）';
      copy.createdAt = copy.updatedAt = Date.now();
      copy.sections.forEach((s) => {
        s.id = uid();
        s.items.forEach((i) => (i.id = uid()));
      });
      const idx = state.checklists.findIndex((c) => c.id === id);
      state.checklists.splice(idx + 1, 0, copy);
      return state;
    }
    function renameChecklist(checklist, title) {
      checklist.title = title;
      return touch(checklist);
    }
    function addSection(checklist, title = '') {
      checklist.sections.push(createSection(title));
      return touch(checklist);
    }
    function renameSection(checklist, sectionId, title) {
      const s = findSection(checklist, sectionId);
      if (s) s.title = title;
      return touch(checklist);
    }
    function removeSection(checklist, sectionId) {
      checklist.sections = checklist.sections.filter((s) => s.id !== sectionId);
      if (checklist.sections.length === 0) checklist.sections.push(createSection(''));
      return touch(checklist);
    }
    function addItem(checklist, sectionId, text) {
      const s = findSection(checklist, sectionId);
      if (s && text.trim()) s.items.push(createItem(text.trim()));
      return touch(checklist);
    }
    // セクションバーの「＋」用：空の項目を末尾に追加し、その項目を返す
    function addBlankItem(checklist, sectionId) {
      const s = findSection(checklist, sectionId);
      if (!s) return null;
      const item = createItem('');
      s.items.push(item);
      touch(checklist);
      return item;
    }
    // テキスト/メモ/所要時間など任意フィールドを更新する汎用関数
    function setItemField(checklist, sectionId, itemId, field, value) {
      const s = findSection(checklist, sectionId);
      const i = s && s.items.find((x) => x.id === itemId);
      if (i) i[field] = value;
      return touch(checklist);
    }
    function editItem(checklist, sectionId, itemId, text) {
      return setItemField(checklist, sectionId, itemId, 'text', text);
    }
    // ---- 画像（スクリーンショット注釈）操作 ----
    // 画像は圧縮済み JPEG の dataURL 文字列として item.images に配列で持つ。
    function itemImages(item) {
      if (!Array.isArray(item.images)) item.images = [];
      return item.images;
    }
    function addItemImage(checklist, sectionId, itemId, dataUrl) {
      const s = findSection(checklist, sectionId);
      const i = s && s.items.find((x) => x.id === itemId);
      if (i) itemImages(i).push(dataUrl);
      return touch(checklist);
    }
    function replaceItemImage(checklist, sectionId, itemId, index, dataUrl) {
      const s = findSection(checklist, sectionId);
      const i = s && s.items.find((x) => x.id === itemId);
      if (i && itemImages(i)[index] !== undefined) i.images[index] = dataUrl;
      return touch(checklist);
    }
    function removeItemImage(checklist, sectionId, itemId, index) {
      const s = findSection(checklist, sectionId);
      const i = s && s.items.find((x) => x.id === itemId);
      if (i && Array.isArray(i.images)) i.images.splice(index, 1);
      return touch(checklist);
    }
    // 所要時間(分)の合計。数値解釈できない time は 0 とみなす
    function sumMinutes(items) {
      return items.reduce((a, i) => a + (parseInt(i.time, 10) || 0), 0);
    }
    function toggleItem(checklist, sectionId, itemId) {
      const s = findSection(checklist, sectionId);
      const i = s && s.items.find((x) => x.id === itemId);
      if (i) i.done = !i.done;
      return touch(checklist);
    }
    function removeItem(checklist, sectionId, itemId) {
      const s = findSection(checklist, sectionId);
      if (s) s.items = s.items.filter((x) => x.id !== itemId);
      return touch(checklist);
    }
    function resetChecklist(checklist) {
      checklist.sections.forEach((s) => s.items.forEach((i) => (i.done = false)));
      return touch(checklist);
    }
    function clearCompleted(checklist) {
      checklist.sections.forEach((s) => (s.items = s.items.filter((i) => !i.done)));
      return touch(checklist);
    }
    function moveItem(checklist, fromSectionId, itemId, toSectionId, toIndex) {
      const from = findSection(checklist, fromSectionId);
      const to = findSection(checklist, toSectionId);
      if (!from || !to) return checklist;
      const idx = from.items.findIndex((i) => i.id === itemId);
      if (idx < 0) return checklist;
      const [item] = from.items.splice(idx, 1);
      const insertAt = Math.max(0, Math.min(toIndex, to.items.length));
      to.items.splice(insertAt, 0, item);
      return touch(checklist);
    }
    function moveSection(checklist, sectionId, toIndex) {
      const idx = checklist.sections.findIndex((s) => s.id === sectionId);
      if (idx < 0) return checklist;
      const [sec] = checklist.sections.splice(idx, 1);
      const insertAt = Math.max(0, Math.min(toIndex, checklist.sections.length));
      checklist.sections.splice(insertAt, 0, sec);
      return touch(checklist);
    }

    // app 側から M.xxx で参照する名前空間
    const M = {
      MODES, createItem, createSection, createRevision, createCoverPage, createChecklist, createInitialState,
      findChecklist, progress, sumMinutes, addChecklist, removeChecklist, duplicateChecklist,
      renameChecklist, addSection, renameSection, removeSection, addItem, addBlankItem,
      setItemField, editItem, toggleItem, removeItem, resetChecklist, clearCompleted,
      moveItem, moveSection,
      addItemImage, replaceItemImage, removeItemImage,
    };

    // =========================================================================
    // storage — 永続化の抽象化(StorageAdapter) と Undo/Redo を備えた中央ストア(Store)
    //   将来グループウェア等で共用したくなったら、同じIFの RemoteAdapter に差し替え可能。
    // =========================================================================
    const STORAGE_KEY = 'checklistmaker.v1';
    const HISTORY_LIMIT = 50;

    class LocalStorageAdapter {
      constructor(key = STORAGE_KEY) {
        this.key = key;
      }
      load() {
        try {
          const raw = localStorage.getItem(this.key);
          return raw ? JSON.parse(raw) : null;
        } catch (e) {
          console.warn('状態の読み込みに失敗しました:', e);
          return null;
        }
      }
      save(state) {
        try {
          localStorage.setItem(this.key, JSON.stringify(state));
          return true;
        } catch (e) {
          console.warn('状態の保存に失敗しました:', e);
          return false;
        }
      }
    }

    // 単体文書モード（出力した .html を単体で開いたとき）用のアダプタ。
    // localStorage を汚さず、永続化は「保存＝新しい .html を再ダウンロード」に一本化する。
    // load は埋め込みデータで初期化した seed を返し、save は何もしない（成功扱い）。
    class MemoryAdapter {
      constructor(seed) {
        this.seed = seed || null;
      }
      load() {
        return this.seed;
      }
      save() {
        return true;
      }
    }

    const clone = (obj) => JSON.parse(JSON.stringify(obj));

    class Store {
      constructor(adapter) {
        this.adapter = adapter;
        this.state = adapter.load() || createInitialState();
        if (!this.state.settings) this.state.settings = { theme: 'auto' };
        if (!Array.isArray(this.state.checklists)) this.state.checklists = [];
        this.undoStack = [];
        this.redoStack = [];
        this.listeners = new Set();
      }
      subscribe(fn) {
        this.listeners.add(fn);
        return () => this.listeners.delete(fn);
      }
      notify() {
        this.listeners.forEach((fn) => fn(this.state));
      }
      commit(mutator, { history = true } = {}) {
        if (history) {
          this.undoStack.push(clone(this.state));
          if (this.undoStack.length > HISTORY_LIMIT) this.undoStack.shift();
          this.redoStack = [];
        }
        mutator(this.state);
        this.persist();
        this.notify();
      }
      replaceState(newState, { history = true } = {}) {
        if (history) {
          this.undoStack.push(clone(this.state));
          this.redoStack = [];
        }
        this.state = newState;
        this.persist();
        this.notify();
      }
      canUndo() { return this.undoStack.length > 0; }
      canRedo() { return this.redoStack.length > 0; }
      undo() {
        if (!this.canUndo()) return;
        this.redoStack.push(clone(this.state));
        this.state = this.undoStack.pop();
        this.persist();
        this.notify();
      }
      redo() {
        if (!this.canRedo()) return;
        this.undoStack.push(clone(this.state));
        this.state = this.redoStack.pop();
        this.persist();
        this.notify();
      }
      persist() {
        // 画像追加などで localStorage 上限に達したか呼び出し側が判定できるよう結果を保持。
        this.lastSaveOk = this.adapter.save(this.state);
        return this.lastSaveOk;
      }
    }

    // =========================================================================
    // io — JSON のエクスポート/インポートと、URLリンク共有のエンコード/デコード
    // =========================================================================
    function exportStateToFile(state) {
      const blob = new Blob([JSON.stringify(state, null, 2)], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      const stamp = new Date().toISOString().slice(0, 10);
      a.href = url;
      a.download = `checklists-${stamp}.json`;
      document.body.appendChild(a);
      a.click();
      a.remove();
      URL.revokeObjectURL(url);
    }

    // ---- HTML 出力（自己完結・フル編集可能）／HTML 取り込み ----
    // 実行中アプリの <style> と <script> をそのまま再パッケージし、単一チェックリストの
    // データを埋め込んだ独立 HTML を作る。開くと単体文書モード（window.__CLM_STANDALONE__）で
    // 起動し、本アプリと同じフル編集が使える。保存は「新しい .html を再ダウンロード」。
    function buildStandaloneHtml(checklist) {
      const state = {
        checklists: [clone(checklist)],
        settings: clone(store.state.settings || { theme: 'auto' }),
      };
      // 埋め込みJSON内の "</" を退避し、スクリプト要素が途中で閉じないようにする。
      const dataJson = JSON.stringify(state).replace(/<\//g, '<\\/');
      const styleCss = (document.querySelector('style') || {}).textContent || '';
      const appJs = (__selfScript && __selfScript.textContent) || '';
      const title = checklist.title || 'チェックリスト';
      return (
        '<!DOCTYPE html>\n' +
        '<html lang="ja">\n' +
        '<head>\n' +
        '  <meta charset="UTF-8" />\n' +
        '  <meta name="viewport" content="width=device-width, initial-scale=1.0" />\n' +
        '  <title>' + escapeHtml(title) + '</title>\n' +
        '  <style>' + styleCss + '</style>\n' +
        '</head>\n' +
        '<body>\n' +
        '  <div id="topbar">\n' +
        '    <span class="topbar-brand">✓ チェックリスト</span>\n' +
        '    <span class="topbar-spacer"></span>\n' +
        '    <button class="icon" data-action="undo" title="元に戻す (Undo)">↶</button>\n' +
        '    <button class="icon" data-action="redo" title="やり直す (Redo)">↷</button>\n' +
        '    <button class="icon" data-action="theme" title="テーマ切替（自動/ライト/ダーク）">🌓</button>\n' +
        '  </div>\n' +
        '  <main id="app"></main>\n' +
        '  <input id="file-input" type="file" accept="application/json,.json,text/html,.html" hidden />\n' +
        '  <script>window.__CLM_STANDALONE__ = true;<\/script>\n' +
        '  <script type="application/json" id="clm-data">' + dataJson + '<\/script>\n' +
        '  <script>' + appJs + '<\/script>\n' +
        '</body>\n' +
        '</html>\n'
      );
    }
    function sanitizeFilename(name) {
      return (String(name || 'checklist').trim() || 'checklist')
        .replace(/[\\/:*?"<>|]/g, '_')
        .slice(0, 120);
    }
    function downloadHtml(filename, html) {
      const blob = new Blob([html], { type: 'text/html' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = /\.html?$/i.test(filename) ? filename : filename + '.html';
      document.body.appendChild(a);
      a.click();
      a.remove();
      URL.revokeObjectURL(url);
    }
    function saveAsHtml(checklist) {
      const def = sanitizeFilename(checklist.title || 'checklist');
      const input = prompt('ファイル名（.html）', def);
      if (input == null) return; // キャンセル
      downloadHtml(sanitizeFilename(input), buildStandaloneHtml(checklist));
    }
    // 本アプリが出力した HTML から、埋め込みチェックリストを取り出す。
    function parseChecklistFromHtml(text) {
      const doc = new DOMParser().parseFromString(text, 'text/html');
      const node = doc.getElementById('clm-data');
      if (!node) {
        throw new Error('このHTMLには CheckListMaker の埋め込みデータが見つかりません。');
      }
      let data;
      try {
        data = JSON.parse(node.textContent);
      } catch (e) {
        throw new Error('埋め込みデータの解析に失敗しました: ' + e.message);
      }
      const checklist =
        data && Array.isArray(data.checklists) ? data.checklists[0] : data;
      if (!checklist || !Array.isArray(checklist.sections)) {
        throw new Error('チェックリストの形式が不正です。');
      }
      return checklist;
    }

    // ---- .docx 出力（Electron 版のみ）----
    // 既存の印刷ビュー(renderPrintView)をアプリの <style> でラップした静的HTMLを作り、
    // メインプロセス(main.js)の docx:save 経由で .docx に変換・保存する。素のブラウザでは
    // window.docxAPI が無いためボタン自体を出さない（下の renderEditor 参照）。
    function buildStaticHtmlForDocx(checklist) {
      const styleCss = (document.querySelector('style') || {}).textContent || '';
      const body = renderPrintView(checklist);
      return (
        '<!DOCTYPE html><html lang="ja"><head><meta charset="UTF-8" />' +
        '<title>' + escapeHtml(checklist.title || '') + '</title>' +
        '<style>' + styleCss + '</style></head><body>' + body + '</body></html>'
      );
    }
    async function saveDocxViaElectron(checklist) {
      if (!window.docxAPI || !window.docxAPI.save) {
        alert('.docx 出力はデスクトップ版（Electron）でのみ利用できます。');
        return;
      }
      try {
        const html = buildStaticHtmlForDocx(checklist);
        const res = await window.docxAPI.save({
          title: sanitizeFilename(checklist.title || 'checklist'),
          html,
        });
        if (res && res.error) alert('.docx の出力に失敗しました: ' + res.error);
      } catch (e) {
        alert('.docx の出力に失敗しました: ' + e.message);
      }
    }

    function utf8ToBase64(str) {
      return btoa(unescape(encodeURIComponent(str)));
    }
    function base64ToUtf8(b64) {
      return decodeURIComponent(escape(atob(b64)));
    }
    function encodeShareLink(checklist) {
      // 画像はサイズが大きく URL に載せると共有リンクが破綻するため除外する。
      // 画像も渡したい場合は JSON エクスポートを使う想定（ダイアログで案内）。
      const stripped = JSON.parse(JSON.stringify(checklist));
      let hadImages = false;
      stripped.sections.forEach((s) =>
        s.items.forEach((it) => {
          if (Array.isArray(it.images) && it.images.length) {
            hadImages = true;
            it.images = [];
          }
        })
      );
      const payload = utf8ToBase64(JSON.stringify(stripped));
      const base = location.origin + location.pathname;
      const url = `${base}#share=${payload}`;
      return { url, length: url.length, hadImages };
    }
    function readShareFromHash(hash = location.hash) {
      const m = hash.match(/[#&]share=([^&]+)/);
      if (!m) return null;
      try {
        const checklist = JSON.parse(base64ToUtf8(m[1]));
        if (!checklist || !Array.isArray(checklist.sections)) return null;
        return checklist;
      } catch (e) {
        console.warn('共有データの解析に失敗しました:', e);
        return null;
      }
    }

    // =========================================================================
    // render — 状態から HTML 文字列を組み立てる純粋な描画関数
    // =========================================================================
    function escapeHtml(str = '') {
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }
    const modeLabel = (type) => (type === MODES.TEMPLATE ? 'テンプレート' : 'ToDo');

    function renderHome(state) {
      const { checklists } = state;
      const cards = checklists.length
        ? checklists.map((c) => renderCard(c)).join('')
        : `<p class="empty">まだチェックリストがありません。「新規作成」から始めましょう。</p>`;
      return `
        <section class="home">
          <div class="home-head">
            <h1>チェックリスト</h1>
            <div class="home-actions">
              <button class="btn primary" data-action="new">＋ 新規作成</button>
              <button class="btn" data-action="import">インポート</button>
              <button class="btn" data-action="export">エクスポート</button>
            </div>
          </div>
          <div class="cards">${cards}</div>
        </section>`;
    }
    function renderCard(c) {
      const p = progress(c);
      return `
        <article class="card" data-id="${c.id}">
          <button class="card-open" data-action="open" data-id="${c.id}">
            <span class="badge ${c.type}">${modeLabel(c.type)}</span>
            <h2>${escapeHtml(c.title)}</h2>
            <div class="progress"><div class="progress-bar" style="width:${p.percent}%"></div></div>
            <small>${p.done} / ${p.total} 完了（${p.percent}%）</small>
          </button>
          <div class="card-tools">
            <button class="icon" title="複製" data-action="duplicate" data-id="${c.id}">⧉</button>
            <button class="icon" title="名前変更" data-action="rename" data-id="${c.id}">✎</button>
            <button class="icon danger" title="削除" data-action="delete" data-id="${c.id}">🗑</button>
          </div>
        </article>`;
    }
    function renderEditor(checklist) {
      const p = progress(checklist);
      const isTemplate = checklist.type === MODES.TEMPLATE;
      // テンプレート型はセクションをまたいで手順を連番(1..N)で振る
      let stepNo = 0;
      const sections = checklist.sections
        .map((s, idx) => {
          const html = renderSection(s, p.sections[idx], checklist.type, stepNo);
          stepNo += s.items.length;
          return html;
        })
        .join('');
      const totalMin = isTemplate
        ? checklist.sections.reduce((a, s) => a + sumMinutes(s.items), 0)
        : 0;
      const timeNote = isTemplate && totalMin ? ` ・ 総所要 約${totalMin}分` : '';
      return `
        <section class="editor ${isTemplate ? 'is-template' : 'is-todo'}" data-id="${checklist.id}">
          <div class="editor-head">
            <button class="btn" data-action="home">← 一覧</button>
            <input class="title-input" data-action="edit-title"
                   value="${escapeHtml(checklist.title)}" aria-label="タイトル" />
            <span class="badge ${checklist.type}">${modeLabel(checklist.type)}</span>
          </div>
          <div class="editor-progress">
            <div class="progress"><div class="progress-bar" style="width:${p.percent}%"></div></div>
            <small>${p.done} / ${p.total} 完了（${p.percent}%）${timeNote}</small>
          </div>
          <div class="editor-toolbar">
            <button class="btn" data-action="add-section">＋ ${isTemplate ? 'フェーズ' : 'セクション'}</button>
            ${
              isTemplate
                ? `<button class="btn" data-action="reset">↺ 一括リセット</button>
                   <button class="btn" data-action="cover">🪧 表紙</button>`
                : `<button class="btn" data-action="clear-completed">完了を削除</button>`
            }
            <button class="btn" data-action="share">🔗 共有リンク</button>
            <button class="btn" data-action="print">🖨 印刷 / PDF</button>
            <button class="btn" data-action="save-html">💾 ${IS_STANDALONE ? '保存（HTML）' : '名前を付けて保存 (HTML)'}</button>
            ${window.docxAPI ? '<button class="btn" data-action="save-docx">📄 Word (.docx)</button>' : ''}
          </div>
          ${
            isTemplate && checklist.coverPage && checklist.coverPage.enabled
              ? `<div class="cover-card">
                   <div class="cover-card-head"><strong>🪧 表紙</strong>
                     <button class="btn" data-action="cover">表紙を編集</button></div>
                   <div class="cover-stage cover-stage--card">${renderCoverHtml(checklist.coverPage, checklist.title)}</div>
                 </div>`
              : ''
          }
          <div class="sections">${sections}</div>
        </section>`;
    }
    // type/startNo を受け取り、テンプレート時は手順タイムライン、ToDo時は通常リストを描く
    function renderSection(section, prog, type, startNo) {
      const isTemplate = type === MODES.TEMPLATE;
      const items = isTemplate
        ? section.items.map((it, i) => renderStep(section.id, it, startNo + i + 1)).join('')
        : section.items.map((it) => renderItem(section.id, it)).join('');
      const mins = isTemplate ? sumMinutes(section.items) : 0;
      const meta = `${prog.done}/${prog.total}${mins ? ` ・⏱${mins}分` : ''}`;
      return `
        <div class="section" data-section="${section.id}" draggable="false">
          <div class="section-head" draggable="true" data-drag="section">
            <span class="grip" title="ドラッグで並べ替え">⠿</span>
            <input class="section-title" data-action="edit-section" data-section="${section.id}"
                   placeholder="${isTemplate ? 'フェーズ名（任意）' : 'セクション名（任意）'}"
                   value="${escapeHtml(section.title)}" />
            <small class="section-progress">${meta}</small>
            <button class="icon add" title="${isTemplate ? '手順を追加' : '項目を追加'}"
                    data-action="add-item-btn" data-section="${section.id}">＋</button>
            <button class="icon danger" title="削除"
                    data-action="delete-section" data-section="${section.id}">🗑</button>
          </div>
          <ul class="items ${isTemplate ? 'steps' : ''}" data-section="${section.id}">${items}</ul>
        </div>`;
    }
    // 項目に添付された画像のサムネイル列 ＋「画像を追加」ボタン。
    // サムネイルのクリックでペイント編集を開く。複数枚に対応。
    function renderImages(sectionId, item, large) {
      const imgs = Array.isArray(item.images) ? item.images : [];
      const thumbs = imgs
        .map(
          (src, idx) => `
          <span class="thumb-wrap">
            <img class="thumb" src="${src}" alt="添付画像 ${idx + 1}" draggable="false"
                 data-action="edit-image" data-section="${sectionId}"
                 data-item="${item.id}" data-index="${idx}" title="クリックで編集" />
            <button class="thumb-del" title="画像を削除" data-action="delete-image"
                    data-section="${sectionId}" data-item="${item.id}" data-index="${idx}">✕</button>
          </span>`
        )
        .join('');
      return `
        <div class="item-images${large ? ' is-large' : ''}" data-section="${sectionId}" data-item="${item.id}">
          ${thumbs}
          <button class="add-image" data-action="add-image"
                  data-section="${sectionId}" data-item="${item.id}"
                  title="画像を貼り付け／選択して追加">🖼 画像</button>
        </div>`;
    }
    // ToDo型の項目
    function renderItem(sectionId, item) {
      return `
        <li class="item ${item.done ? 'done' : ''}" data-item="${item.id}"
            data-section="${sectionId}" draggable="true" data-drag="item">
          <span class="grip" title="ドラッグで並べ替え">⠿</span>
          <input type="checkbox" ${item.done ? 'checked' : ''}
                 data-action="toggle" data-section="${sectionId}" data-item="${item.id}" />
          <input class="item-text" data-action="edit-item"
                 data-section="${sectionId}" data-item="${item.id}"
                 value="${escapeHtml(item.text)}" />
          <button class="icon danger" title="削除"
                  data-action="delete-item" data-section="${sectionId}" data-item="${item.id}">✕</button>
          ${renderImages(sectionId, item)}
          <button class="insert-after" data-action="insert-item-after"
                  data-section="${sectionId}" data-item="${item.id}"
                  title="この下に項目を追加">＋ ここに追加</button>
        </li>`;
    }
    // テンプレート型の手順ステップ（番号バッジ＋連結線＋メモ＋所要時間）
    function renderStep(sectionId, item, no) {
      const note = item.note || '';
      const time = item.time || '';
      return `
        <li class="item step ${item.done ? 'done' : ''}" data-item="${item.id}"
            data-section="${sectionId}" draggable="true" data-drag="item">
          <div class="step-rail" title="ドラッグで並べ替え">
            <span class="step-badge">${no}</span>
            <span class="step-line"></span>
          </div>
          <div class="step-body">
            <div class="step-main">
              <input type="checkbox" ${item.done ? 'checked' : ''}
                     data-action="toggle" data-section="${sectionId}" data-item="${item.id}" />
              <input class="item-text step-text" data-action="edit-item"
                     data-section="${sectionId}" data-item="${item.id}"
                     placeholder="手順の内容" value="${escapeHtml(item.text)}" />
              <span class="step-time">
                <input class="step-time-input" data-action="edit-time" inputmode="numeric"
                       data-section="${sectionId}" data-item="${item.id}"
                       placeholder="–" aria-label="所要時間（分）" value="${escapeHtml(time)}" />
                <span class="unit">分</span>
              </span>
              <button class="icon danger" title="削除"
                      data-action="delete-item" data-section="${sectionId}" data-item="${item.id}">✕</button>
            </div>
            ${renderRichBody(sectionId, item)}
            <input class="step-note-input" data-action="edit-note"
                   data-section="${sectionId}" data-item="${item.id}"
                   placeholder="メモ（任意）" value="${escapeHtml(note)}" />
            ${renderImages(sectionId, item, true)}
          </div>
          <button class="insert-after" data-action="insert-item-after"
                  data-section="${sectionId}" data-item="${item.id}"
                  title="この下に手順を追加">＋ ここに追加</button>
        </li>`;
    }
    // 手順の「リッチ本文」: 書式付きテキスト＋表を編集できる contenteditable 領域。
    // ツールバーはフォーカス時のみ表示。保存はフォーカスアウト時に sanitize して commit。
    function renderRichBody(sectionId, item) {
      const body = sanitizeBodyHtml(item.body || '');
      return `
        <div class="rb" draggable="false">
          <div class="rb-toolbar">
            <button type="button" class="rb-btn" data-rb-cmd="bold" title="太字"><b>B</b></button>
            <button type="button" class="rb-btn" data-rb-cmd="italic" title="斜体"><i>I</i></button>
            <button type="button" class="rb-btn" data-rb-cmd="underline" title="下線"><u>U</u></button>
            <button type="button" class="rb-btn" data-rb-cmd="strikeThrough" title="取消線"><s>S</s></button>
            <span class="rb-sep"></span>
            <button type="button" class="rb-btn" data-rb-cmd="foreColor" title="文字色">A<span class="rb-swatch"></span></button>
            <button type="button" class="rb-btn" data-rb-cmd="hiliteColor" title="ハイライト（文字）"><span class="rb-swatch-hl">H</span></button>
            <button type="button" class="rb-btn" data-rb-cmd="cellFill" title="セル塗りつぶし">🪣</button>
            <span class="rb-sep"></span>
            <button type="button" class="rb-btn" data-rb-cmd="insertUnorderedList" title="箇条書き">•≡</button>
            <button type="button" class="rb-btn" data-rb-cmd="insertOrderedList" title="番号付きリスト">1.≡</button>
            <button type="button" class="rb-btn rb-ins-table" data-rb-cmd="insertTable" title="表を挿入">▦ 表</button>
          </div>
          <div class="rb-body" contenteditable="true" data-rb-edit
               data-section="${sectionId}" data-item="${item.id}"
               data-placeholder="本文（任意）。書式や表を使えます">${body}</div>
        </div>`;
    }

    // =========================================================================
    // richbody — 手順本文のサニタイズ・表操作・編集ツールバー
    // =========================================================================
    const RB_ALLOWED_TAGS = new Set(['P','BR','STRONG','B','EM','I','U','S','STRIKE','SPAN','UL','OL','LI','TABLE','THEAD','TBODY','TR','TH','TD','DIV']);
    const RB_COLOR_RE = /^(#[0-9a-fA-F]{3,8}|rgb\(\s*\d{1,3}\s*,\s*\d{1,3}\s*,\s*\d{1,3}\s*\)|rgba\(\s*\d{1,3}\s*,\s*\d{1,3}\s*,\s*\d{1,3}\s*,\s*(0|1|0?\.\d+)\s*\)|transparent|[a-zA-Z]{3,20})$/;
    const RB_ALIGN_RE = /^(left|right|center|justify)$/i;
    const RB_TEXT_COLORS = ['#1f2329', '#c0392b', '#1d6fb8', '#2f8f6b', '#b8860b', '#7a3da6'];
    const RB_HL_COLORS = ['#fff3a3', '#cdeccd', '#cfe5fb', '#fad4d4', '#e7d8f5'];
    const RB_CELL_COLORS = ['#fef0c7', '#e3f3e0', '#dbeafe', '#fde2e2', '#ede9fe', '#eef1f4'];

    function rbCleanStyle(srcEl, destEl) {
      [['color'], ['background-color']].forEach(([p]) => {
        const v = (srcEl.style.getPropertyValue(p) || '').trim();
        if (v && RB_COLOR_RE.test(v)) destEl.style.setProperty(p, v);
      });
      const ta = (srcEl.style.getPropertyValue('text-align') || '').trim();
      if (ta && RB_ALIGN_RE.test(ta)) destEl.style.setProperty('text-align', ta);
    }
    function rbWalk(src, destParent) {
      src.childNodes.forEach((node) => {
        if (node.nodeType === 3) { destParent.appendChild(document.createTextNode(node.nodeValue)); return; }
        if (node.nodeType !== 1) return;
        const tag = node.tagName;
        if (tag === 'SCRIPT' || tag === 'STYLE') return;
        if (RB_ALLOWED_TAGS.has(tag)) {
          const clean = document.createElement(tag.toLowerCase());
          if (node.getAttribute && node.getAttribute('style')) rbCleanStyle(node, clean);
          if (tag === 'TABLE') clean.className = 'rb-table';
          rbWalk(node, clean);
          destParent.appendChild(clean);
        } else {
          rbWalk(node, destParent); // 非許可タグはアンラップ（中身は残す）
        }
      });
    }
    function rbCopyCellStyle(from, to) {
      const c = document.createElement('span');
      rbCleanStyle(from, c);
      if (c.style.cssText) to.style.cssText = c.style.cssText;
    }
    // 表を「先頭行＝見出し(thead/th)」に正規化する
    function rbNormalizeTable(table) {
      table.classList.add('rb-table');
      const rows = Array.from(table.querySelectorAll('tr'));
      if (!rows.length) { table.remove(); return; }
      let thead = table.querySelector('thead');
      let tbody = table.querySelector('tbody');
      if (!thead) { thead = document.createElement('thead'); table.insertBefore(thead, table.firstChild); }
      if (!tbody) { tbody = document.createElement('tbody'); table.appendChild(tbody); }
      const head = rows[0];
      Array.from(head.children).forEach((c) => {
        if (c.tagName !== 'TH') { const th = document.createElement('th'); th.innerHTML = c.innerHTML; rbCopyCellStyle(c, th); head.replaceChild(th, c); }
      });
      thead.appendChild(head);
      rows.slice(1).forEach((r) => {
        Array.from(r.children).forEach((c) => {
          if (c.tagName === 'TH') { const td = document.createElement('td'); td.innerHTML = c.innerHTML; rbCopyCellStyle(c, td); r.replaceChild(td, c); }
        });
        tbody.appendChild(r);
      });
      table.querySelectorAll('thead').forEach((h) => { if (h !== thead && !h.children.length) h.remove(); });
      table.querySelectorAll('tbody').forEach((b) => { if (b !== tbody && !b.children.length) b.remove(); });
    }
    function sanitizeBodyHtml(html) {
      if (!html) return '';
      const tpl = document.createElement('template');
      tpl.innerHTML = html;
      const out = document.createElement('div');
      rbWalk(tpl.content, out);
      out.querySelectorAll('table').forEach(rbNormalizeTable);
      return out.innerHTML;
    }

    // ---- 編集（commit / コマンド / 表操作 / 行列コントロール / 色パレット） ----
    function rbItemBody(checklistId, sectionId, itemId) {
      const cc = M.findChecklist(store.state, checklistId);
      const sec = cc && cc.sections.find((x) => x.id === sectionId);
      const it = sec && sec.items.find((x) => x.id === itemId);
      return it ? (it.body || '') : '';
    }
    function rbCommitEditor(editor) {
      const c = currentChecklist();
      if (!c || !editor) return;
      const sectionId = editor.dataset.section, itemId = editor.dataset.item;
      const clean = sanitizeBodyHtml(editor.innerHTML);
      if (sanitizeBodyHtml(rbItemBody(c.id, sectionId, itemId)) === clean) return; // 変化なしなら何もしない
      store.commit((s) => M.setItemField(M.findChecklist(s, c.id), sectionId, itemId, 'body', clean));
    }
    function rbExec(cmd, editor, btn) {
      editor.focus();
      if (cmd === 'insertTable') return rbInsertTable(editor);
      if (cmd === 'foreColor') return rbOpenPalette(btn, RB_TEXT_COLORS, false, (col) => { document.execCommand('styleWithCSS', false, true); document.execCommand('foreColor', false, col); });
      if (cmd === 'hiliteColor') return rbOpenPalette(btn, RB_HL_COLORS, true, (col) => { document.execCommand('styleWithCSS', false, true); document.execCommand('hiliteColor', false, col === 'none' ? 'transparent' : col); });
      if (cmd === 'cellFill') return rbOpenPalette(btn, RB_CELL_COLORS, true, (col) => rbApplyCellFill(editor, col));
      document.execCommand('styleWithCSS', false, false); // 太字等はタグ(<b>等)で出力させる
      document.execCommand(cmd, false, null);
    }
    function rbInsertTable(editor) {
      editor.focus();
      const cell = '<td><br></td>';
      const html =
        '<table class="rb-table"><thead><tr><th>項目</th><th>値</th><th>確認</th></tr></thead>' +
        '<tbody><tr>' + cell + cell + cell + '</tr><tr>' + cell + cell + cell + '</tr></tbody></table><p><br></p>';
      document.execCommand('insertHTML', false, html);
      rbCommitEditor(editor);
    }
    function rbCurrentCell(editor) {
      const sel = window.getSelection();
      if (!sel || !sel.rangeCount) return null;
      let n = sel.anchorNode;
      let el = n && (n.nodeType === 1 ? n : n.parentElement);
      el = el && el.closest('td, th');
      return el && editor.contains(el) ? el : null;
    }
    function rbApplyCellFill(editor, col) {
      const cell = rbCurrentCell(editor);
      if (!cell) return;
      if (col === 'none') cell.style.backgroundColor = ''; else cell.style.backgroundColor = col;
      rbCommitEditor(editor);
    }
    // 表構造操作
    // idx の位置に列を挿入（idx が列数以上なら末尾に追加）
    function rbAddColumnAt(table, idx) {
      table.querySelectorAll('tr').forEach((r) => {
        const head = r.parentElement && r.parentElement.tagName === 'THEAD';
        const c = document.createElement(head ? 'th' : 'td'); c.innerHTML = '<br>';
        r.insertBefore(c, r.children[idx] || null);
      });
    }
    // beforeTr の直前に行を挿入（null なら末尾に追加）。thead には入れない。
    function rbAddRowAt(table, beforeTr) {
      const cols = table.rows[0] ? table.rows[0].children.length : 1;
      const tbody = table.tBodies[0] || table.createTBody();
      const tr = document.createElement('tr');
      for (let i = 0; i < cols; i++) { const td = document.createElement('td'); td.innerHTML = '<br>'; tr.appendChild(td); }
      tbody.insertBefore(tr, beforeTr && beforeTr.parentElement === tbody ? beforeTr : null);
    }
    function rbDelColumn(table, idx) {
      table.querySelectorAll('tr').forEach((r) => { if (r.children.length > 1 && r.children[idx]) r.children[idx].remove(); });
    }
    function rbDelRow(table, tr) { if (table.rows.length > 1 && tr) tr.remove(); }

    // 行列コントロール（フローティング）
    let rbTctlEl = null;
    let rbCtx = null;
    let rbHideTimer = null;
    const RB_TCTL_NEAR = 36; // ボタンのアンカーとカーソルの距離がこの px 以内のときだけ表示
    function rbEnsureTctl() {
      if (rbTctlEl) return;
      rbTctlEl = document.createElement('div');
      rbTctlEl.id = 'rb-tctl';
      rbTctlEl.hidden = true;
      rbTctlEl.innerHTML =
        '<button type="button" class="rb-tctl rb-tctl-add" data-rb-tctl="ins-col" title="ここに列を挿入">＋</button>' +
        '<button type="button" class="rb-tctl rb-tctl-add" data-rb-tctl="ins-row" title="ここに行を挿入">＋</button>' +
        '<button type="button" class="rb-tctl rb-tctl-del" data-rb-tctl="del-col" title="この列を削除">−</button>' +
        '<button type="button" class="rb-tctl rb-tctl-del" data-rb-tctl="del-row" title="この行を削除">−</button>';
      document.body.appendChild(rbTctlEl);
    }
    function rbHideTctl() { if (rbTctlEl) rbTctlEl.hidden = true; rbCtx = null; }
    // カーソルに近い境界へ挿入ボタン、ホバー中の行・列へ削除ボタンを配置し、
    // それぞれ「本来出る位置」から RB_TCTL_NEAR px 以内にカーソルがあるものだけ表示する。
    function rbPositionTctl(e) {
      rbEnsureTctl();
      const t = rbCtx.table.getBoundingClientRect();
      const c = rbCtx.cell.getBoundingClientRect();
      const cell = rbCtx.cell;
      const tr = cell.closest('tr');
      // 列挿入: セルの左右どちらか近い方の境界（最終境界＝末尾追加）
      const colRight = e.clientX > c.left + c.width / 2;
      rbCtx.insColIdx = cell.cellIndex + (colRight ? 1 : 0);
      const insColX = colRight ? c.right : c.left;
      // 行挿入: 行の上下どちらか近い方の境界。ただし見出し行の上には出さない。
      const inHead = tr.parentElement && tr.parentElement.tagName === 'THEAD';
      const rowBottom = inHead || e.clientY > c.top + c.height / 2;
      const insRowY = rowBottom ? c.bottom : c.top;
      const bodyRows = Array.from(rbCtx.table.tBodies[0] ? rbCtx.table.tBodies[0].rows : []);
      if (inHead) rbCtx.insRowRef = bodyRows[0] || null;                 // 見出しの下＝先頭行の前
      else rbCtx.insRowRef = rowBottom ? tr.nextElementSibling : tr;     // 境界の直後の行の前（null＝末尾）
      const b = rbTctlEl.children;
      const place = (el, x, y) => {
        const show = Math.hypot(e.clientX - x, e.clientY - y) <= RB_TCTL_NEAR;
        el.style.display = show ? '' : 'none';
        if (show) { el.style.left = (x - 10) + 'px'; el.style.top = (y - 10) + 'px'; }
        return show;
      };
      let any = false;
      any = place(b[0], insColX, t.top) || any;                    // 列挿入＝境界の上端
      any = place(b[1], t.left, insRowY) || any;                   // 行挿入＝境界の左端
      any = place(b[2], c.left + c.width / 2, t.top - 22) || any;  // 列削除＝列中央・表の少し上
      any = place(b[3], t.left - 22, c.top + c.height / 2) || any; // 行削除＝行中央・表の少し左
      rbTctlEl.hidden = !any;
    }
    function rbHandleTctl(action) {
      if (!rbCtx) return;
      const { editor, table, cell } = rbCtx;
      if (!editor || !table || !editor.contains(table)) return;
      if (action === 'ins-col') rbAddColumnAt(table, rbCtx.insColIdx);
      else if (action === 'ins-row') rbAddRowAt(table, rbCtx.insRowRef);
      else if (action === 'del-col') rbDelColumn(table, cell.cellIndex);
      else if (action === 'del-row') rbDelRow(table, cell.closest('tr'));
      rbNormalizeTable(table);
      rbHideTctl();
      rbCommitEditor(editor);
    }
    // 色パレット
    function rbClosePalette() { const p = document.getElementById('rb-palette'); if (p) p.remove(); }
    function rbOpenPalette(btn, colors, withNone, onPick) {
      rbClosePalette();
      const pal = document.createElement('div');
      pal.className = 'rb-palette'; pal.id = 'rb-palette';
      colors.forEach((col) => {
        const b = document.createElement('button');
        b.type = 'button'; b.style.background = col; b.title = col;
        b.addEventListener('mousedown', (e) => { e.preventDefault(); onPick(col); rbClosePalette(); });
        pal.appendChild(b);
      });
      if (withNone) {
        const b = document.createElement('button');
        b.type = 'button'; b.className = 'rb-pal-none'; b.textContent = 'なし';
        b.addEventListener('mousedown', (e) => { e.preventDefault(); onPick('none'); rbClosePalette(); });
        pal.appendChild(b);
      }
      document.body.appendChild(pal);
      const r = btn.getBoundingClientRect();
      pal.style.left = Math.max(8, Math.min(r.left, window.innerWidth - 162)) + 'px';
      pal.style.top = (r.bottom + 4) + 'px';
    }
    // 表/TSV の貼り付けをセルに取り込む
    function rbTsvToTable(text) {
      const rows = text.replace(/\r/g, '').replace(/\n+$/, '').split('\n').map((line) => line.split('\t'));
      if (!rows.length) return '';
      const cols = Math.max.apply(null, rows.map((r) => r.length));
      const cell = (tag, v) => `<${tag}>${escapeHtml(v || '')}<br></${tag}>`;
      const head = '<tr>' + Array.from({ length: cols }, (_, i) => cell('th', rows[0][i])).join('') + '</tr>';
      const body = rows.slice(1).map((r) => '<tr>' + Array.from({ length: cols }, (_, i) => cell('td', r[i])).join('') + '</tr>').join('');
      return `<table class="rb-table"><thead>${head}</thead><tbody>${body}</tbody></table><p><br></p>`;
    }
    // すべての配線を一度だけ行う
    function rbInit() {
      rbEnsureTctl();
      // ツールバー / 行列コントロール / パレット閉じ
      document.addEventListener('mousedown', (e) => {
        const cmdBtn = e.target.closest && e.target.closest('[data-rb-cmd]');
        const tctlBtn = e.target.closest && e.target.closest('[data-rb-tctl]');
        const inPalette = e.target.closest && e.target.closest('.rb-palette');
        if (!cmdBtn && !inPalette) rbClosePalette();
        if (tctlBtn) { e.preventDefault(); rbHandleTctl(tctlBtn.dataset.rbTctl); return; }
        if (cmdBtn) {
          e.preventDefault(); // 選択・フォーカスを本文に残す
          const rb = cmdBtn.closest('.rb');
          const editor = rb && rb.querySelector('[data-rb-edit]');
          if (editor) rbExec(cmdBtn.dataset.rbCmd, editor, cmdBtn);
        }
      });
      // Alt+Enter でセル内/段落内改行
      document.addEventListener('keydown', (e) => {
        const ed = e.target.closest && e.target.closest('[data-rb-edit]');
        if (!ed) return;
        if (e.altKey && e.key === 'Enter') { e.preventDefault(); document.execCommand('insertHTML', false, '<br>'); }
      });
      // 貼り付け（表/TSV を取り込み、それ以外は素のテキスト/サニタイズHTML）
      document.addEventListener('paste', (e) => {
        const ed = e.target.closest && e.target.closest('[data-rb-edit]');
        if (!ed) return;
        const cd = e.clipboardData; if (!cd) return;
        const html = cd.getData('text/html');
        const text = cd.getData('text/plain');
        if (html && /<table/i.test(html)) { e.preventDefault(); document.execCommand('insertHTML', false, sanitizeBodyHtml(html)); rbCommitEditor(ed); }
        else if (text && /\t/.test(text) && /\n/.test(text)) { e.preventDefault(); document.execCommand('insertHTML', false, rbTsvToTable(text)); rbCommitEditor(ed); }
        else if (text) { e.preventDefault(); document.execCommand('insertText', false, text); }
      }, true);
      // フォーカスアウトで保存（パレット/コントロールへの移動は除く）
      document.addEventListener('focusout', (e) => {
        const ed = e.target.closest && e.target.closest('[data-rb-edit]');
        if (!ed) return;
        const to = e.relatedTarget;
        if (to && to.closest && (to.closest('.rb-palette') || to.closest('#rb-tctl'))) return;
        rbCommitEditor(ed);
      });
      // 表セルへの近接で行列コントロールを表示
      document.addEventListener('mousemove', (e) => {
        if (rbTctlEl && e.target.closest && e.target.closest('#rb-tctl')) { clearTimeout(rbHideTimer); return; }
        const cell = e.target.closest && e.target.closest('.rb-body td, .rb-body th');
        if (cell) {
          rbCtx = { editor: cell.closest('[data-rb-edit]'), table: cell.closest('table'), cell };
          clearTimeout(rbHideTimer); rbPositionTctl(e);
        } else {
          clearTimeout(rbHideTimer); rbHideTimer = setTimeout(rbHideTctl, 160);
        }
      });
      window.addEventListener('scroll', rbHideTctl, true);
    }

    // 表紙（カバーページ）の HTML を組み立てる。画面プレビュー・印刷で共用。
    // cover: coverPage オブジェクト（または編集中ドラフト）。fallbackTitle: タイトル未入力時の代替。
    const COVER_PRESETS = ['centered','left-top','top-band','side-band','framed','hero','logo-top','split','minimal','doc-header'];
    const COVER_PRESET_NAMES = {
      centered:'1. 中央', 'left-top':'2. 左上', 'top-band':'3. 上帯', 'side-band':'4. 左帯',
      framed:'5. 枠', hero:'6. 特大', 'logo-top':'7. ロゴ上', split:'8. 分割', minimal:'9. 余白', 'doc-header':'10. 文書',
    };
    function renderCoverHtml(cover, fallbackTitle = '') {
      const c = cover || {};
      const preset = COVER_PRESETS.includes(c.preset) ? c.preset : 'centered';
      const accent = /^#[0-9a-fA-F]{3,8}$/.test(c.accent || '') ? c.accent : '#3b6ea5';
      const t = escapeHtml(c.title || fallbackTitle || '');
      const author = escapeHtml(c.author || ''), date = escapeHtml(c.date || '');
      const ver = escapeHtml(c.version || ''), docn = escapeHtml(c.docNumber || '');
      const title = `<h1 class="title">${t}</h1>`;
      const subtitle = c.subtitle ? `<p class="subtitle">${escapeHtml(c.subtitle)}</p>` : '';
      const logo = c.logo ? `<div class="logo"><img src="${c.logo}" alt="" /></div>` : '';
      const metaInlineParts = [author, date, ver].filter(Boolean);
      const metaInline = metaInlineParts.length ? `<div class="meta">${metaInlineParts.join('　｜　')}</div>` : '';
      const metaRows = [['作成者', author], ['日付', date], ['版数', ver]].filter(([, v]) => v);
      const metaList = metaRows.length
        ? `<div class="meta" style="display:grid;gap:8px">${metaRows.map(([k, v]) => `<div class="meta-row"><b>${k}</b><span>${v}</span></div>`).join('')}</div>` : '';
      const revs = (Array.isArray(c.revisions) ? c.revisions : []).filter((r) => r.version || r.date || r.author || r.note);
      const revTable = revs.length
        ? `<table class="rev"><caption>改訂履歴</caption><thead><tr><th>版</th><th>日付</th><th>作成者</th><th>内容</th></tr></thead><tbody>${revs.map((r) => `<tr><td>${escapeHtml(r.version || '')}</td><td>${escapeHtml(r.date || '')}</td><td>${escapeHtml(r.author || '')}</td><td>${escapeHtml(r.note || '')}</td></tr>`).join('')}</tbody></table>` : '';
      const infoRows = [['文書番号', docn], ['版数', ver], ['作成者', author], ['発行日', date]].filter(([, v]) => v);
      const infobox = infoRows.length
        ? `<div class="infobox">${infoRows.map(([k, v]) => `<div><b>${k}</b><span>${v}</span></div>`).join('')}</div>` : '';
      const inner = {
        centered: `${logo}${title}<div class="rule"></div>${subtitle}<div class="footer">${metaInline}</div>`,
        'left-top': `${logo}${title}${subtitle}<div class="divider"></div>${metaList}<div class="spacer"></div>${revTable}`,
        'top-band': `<div class="band">${title}</div><div class="body">${subtitle}${metaList}${revTable}</div>`,
        'side-band': `<div class="strip"></div><div class="body">${logo}${title}${subtitle}<div class="spacer"></div>${metaList}</div>`,
        framed: `<div class="inner"><div>${logo}</div><div style="align-self:center">${title}${subtitle}</div><div class="footer">${metaInline}</div></div>`,
        hero: `${logo}<div class="accentbar"></div>${title}${subtitle}${metaInline}`,
        'logo-top': `${logo}${title}${subtitle}<div class="footer">${metaInline}</div>`,
        split: `<div class="top">${title}${subtitle}${metaInline}</div><div class="bottom">${revTable}</div>`,
        minimal: `${title}${subtitle}<div class="spacer"></div>${metaInline}`,
        'doc-header': `<div class="head">${title}${infobox}</div>${subtitle}${revTable}<div class="spacer"></div>`,
      }[preset];
      return `<div class="cover cover--${preset}" style="--cover-accent:${accent}">${inner}</div>`;
    }
    // .cover-stage 内の .cover を枠幅にあわせて transform: scale() で縮小表示する。
    function scaleCoverStages(root) {
      if (!root) return;
      root.querySelectorAll('.cover-stage').forEach((st) => {
        const w = st.clientWidth;
        if (!w) return;
        st.style.height = (w * 1123 / 794) + 'px';
        const cv = st.querySelector('.cover');
        if (cv) cv.style.transform = 'scale(' + (w / 794) + ')';
      });
    }

    // 印刷（ブラウザの印刷→PDF保存を想定）用の読み取り専用ビューを組み立てる。
    // 入力欄は印刷でテキストが折り返せないため、span/li のプレーンな表現で描く。
    function renderPrintView(checklist) {
      const p = progress(checklist);
      const isTemplate = checklist.type === MODES.TEMPLATE;
      const dateStr = new Date().toLocaleDateString('ja-JP');
      const totalMin = isTemplate
        ? checklist.sections.reduce((a, s) => a + sumMinutes(s.items), 0)
        : 0;
      let stepNo = 0;
      const sections = checklist.sections
        .map((s) => {
          const itemsHtml = s.items
            .map((it) => {
              const box = it.done ? '☑' : '☐';
              const imgs = (Array.isArray(it.images) ? it.images : [])
                .map((src) => `<img class="print-img" src="${src}" alt="" />`)
                .join('');
              const imgsHtml = imgs ? `<div class="print-imgs">${imgs}</div>` : '';
              if (isTemplate) {
                stepNo += 1;
                const time = it.time
                  ? `<span class="print-step-time">⏱${escapeHtml(String(it.time))}分</span>`
                  : '';
                const note = it.note
                  ? `<div class="print-note">${escapeHtml(it.note)}</div>`
                  : '';
                const bodyClean = sanitizeBodyHtml(it.body || '');
                const bodyHtml = bodyClean ? `<div class="print-body">${bodyClean}</div>` : '';
                return `<li class="print-item ${it.done ? 'done' : ''}">
                  <span class="print-no">${stepNo}</span>
                  <span class="print-box">${box}</span>
                  <span class="print-text">${escapeHtml(it.text)}</span>
                  ${time}${bodyHtml}${note}${imgsHtml}
                </li>`;
              }
              return `<li class="print-item ${it.done ? 'done' : ''}">
                <span class="print-box">${box}</span>
                <span class="print-text">${escapeHtml(it.text)}</span>
                ${imgsHtml}
              </li>`;
            })
            .join('');
          const mins = isTemplate ? sumMinutes(s.items) : 0;
          const meta = mins ? `<span class="print-section-meta">（⏱${mins}分）</span>` : '';
          const titleText = escapeHtml(s.title);
          const titleHtml =
            titleText || meta
              ? `<h2 class="print-section-title">${titleText}${meta}</h2>`
              : '';
          return `<section class="print-section">${titleHtml}<ul class="print-items">${itemsHtml}</ul></section>`;
        })
        .join('');
      const coverHtml =
        isTemplate && checklist.coverPage && checklist.coverPage.enabled
          ? `<div class="print-cover">${renderCoverHtml(checklist.coverPage, checklist.title)}</div>`
          : '';
      return `
        ${coverHtml}
        <div class="print-header">
          <h1>${escapeHtml(checklist.title)}</h1>
          <div class="print-meta">
            <span>${modeLabel(checklist.type)}</span>
            <span>${p.done} / ${p.total} 完了（${p.percent}%）${
              totalMin ? ` ・ 総所要 約${totalMin}分` : ''
            }</span>
            <span>${dateStr}</span>
          </div>
        </div>
        ${sections}`;
    }

    // =========================================================================
    // dragdrop — セクション/項目のドラッグ&ドロップ並べ替え
    // =========================================================================
    function attachDragAndDrop(container, onMove) {
      let dragging = null;
      container.addEventListener('dragstart', (e) => {
        const el = e.target.closest('[data-drag]');
        if (!el) return;
        const kind = el.dataset.drag;
        if (kind === 'item') {
          const li = el.closest('.item');
          dragging = { kind, id: li.dataset.item, fromSection: li.dataset.section };
        } else if (kind === 'section') {
          const sec = el.closest('.section');
          dragging = { kind, id: sec.dataset.section, fromSection: null };
        }
        e.dataTransfer.effectAllowed = 'move';
        e.dataTransfer.setData('text/plain', dragging ? dragging.id : '');
        requestAnimationFrame(() => el.closest('.item, .section')?.classList.add('dragging'));
      });
      container.addEventListener('dragend', () => {
        container.querySelectorAll('.dragging, .drop-target')
          .forEach((n) => n.classList.remove('dragging', 'drop-target'));
        dragging = null;
      });
      container.addEventListener('dragover', (e) => {
        if (!dragging) return;
        e.preventDefault();
        e.dataTransfer.dropEffect = 'move';
        const target = dragging.kind === 'item'
          ? e.target.closest('.item, .items, .section')
          : e.target.closest('.section');
        container.querySelectorAll('.drop-target').forEach((n) => n.classList.remove('drop-target'));
        if (target) target.classList.add('drop-target');
      });
      container.addEventListener('drop', (e) => {
        if (!dragging) return;
        e.preventDefault();
        if (dragging.kind === 'item') {
          const overItem = e.target.closest('.item');
          const overList = e.target.closest('.items');
          let toSection;
          let toIndex;
          if (overItem) {
            toSection = overItem.dataset.section;
            const siblings = [...overItem.parentElement.querySelectorAll('.item')];
            toIndex = siblings.indexOf(overItem);
            const rect = overItem.getBoundingClientRect();
            if (e.clientY > rect.top + rect.height / 2) toIndex += 1;
          } else if (overList) {
            toSection = overList.dataset.section;
            toIndex = overList.querySelectorAll('.item').length;
          } else {
            return;
          }
          onMove({
            kind: 'item',
            itemId: dragging.id,
            fromSection: dragging.fromSection,
            toSection,
            toIndex,
          });
        } else if (dragging.kind === 'section') {
          const overSection = e.target.closest('.section');
          if (!overSection || overSection.dataset.section === dragging.id) return;
          const sections = [...container.querySelectorAll('.section')];
          let toIndex = sections.indexOf(overSection);
          const rect = overSection.getBoundingClientRect();
          if (e.clientY > rect.top + rect.height / 2) toIndex += 1;
          onMove({ kind: 'section', sectionId: dragging.id, toIndex });
        }
      });
    }

    // =========================================================================
    // router — ハッシュベースの簡易ルーター
    //   #/ → ホーム / #/c/<id> → エディタ / #share=... → 共有データ
    // =========================================================================
    function parseHash(hash = location.hash) {
      if (hash.startsWith('#share=')) return { name: 'share', raw: hash };
      const m = hash.match(/^#\/c\/(.+)$/);
      if (m) return { name: 'editor', id: m[1] };
      return { name: 'home' };
    }
    function goHome() { location.hash = '#/'; }
    function goEditor(id) { location.hash = '#/c/' + id; }
    function startRouter(onChange) {
      const handler = () => onChange(parseHash());
      window.addEventListener('hashchange', handler);
      handler();
      return () => window.removeEventListener('hashchange', handler);
    }

    // =========================================================================
    // app — ストア・ルーター・描画・イベントの結線（エントリポイント）
    // =========================================================================
    // 単体文書モード: 出力した .html を単体で開いたとき。埋め込み #clm-data を種にした
    // MemoryAdapter でストアを作り（localStorage を汚さない）、その1件の editor を表示する。
    const IS_STANDALONE = !!window.__CLM_STANDALONE__;
    function readEmbeddedState() {
      const node = document.getElementById('clm-data');
      if (!node) return null;
      try {
        const data = JSON.parse(node.textContent);
        if (data && Array.isArray(data.checklists)) return data;
      } catch (e) {
        console.warn('埋め込みデータの解析に失敗しました:', e);
      }
      return null;
    }
    const store = IS_STANDALONE
      ? new Store(new MemoryAdapter(readEmbeddedState()))
      : new Store(new LocalStorageAdapter());
    const app = document.getElementById('app');
    const fileInput = document.getElementById('file-input');

    function applyTheme(theme) {
      if (theme === 'auto') document.documentElement.removeAttribute('data-theme');
      else document.documentElement.setAttribute('data-theme', theme);
    }
    function cycleTheme() {
      const order = ['auto', 'light', 'dark'];
      const cur = store.state.settings.theme || 'auto';
      const next = order[(order.indexOf(cur) + 1) % order.length];
      store.commit((s) => (s.settings.theme = next), { history: false });
      applyTheme(next);
    }

    // ---- 録画（クリック連動スクリーンショット） ----
    // 実体は Electron メインプロセス側（main.js）。preload が公開する
    // window.recorderAPI が無い＝素のブラウザでは、ボタンは無効表示にする。
    let isRecording = false;
    function updateRecordButton() {
      const btn = document.querySelector('[data-action="record"]');
      if (!btn) return;
      if (!window.recorderAPI) {
        btn.disabled = true;
        btn.title = '録画はデスクトップ版（Electron）でのみ利用できます';
        return;
      }
      btn.classList.toggle('recording', isRecording);
      btn.title = isRecording
        ? '録画停止'
        : '録画開始（クリックの度にスクショ保存）';
    }
    function toggleRecording() {
      if (!window.recorderAPI) {
        alert('録画機能はデスクトップ版（Electron）でのみ利用できます。\n「npm start」で起動してください。');
        return;
      }
      if (isRecording) {
        window.recorderAPI.stopRecording();
      } else {
        const c = currentChecklist();
        const name = c && c.title ? c.title : '記録';
        window.recorderAPI.startRecording(name);
      }
    }

    function render() {
      const route = parseHash();
      if (route.name === 'editor') {
        const checklist = M.findChecklist(store.state, route.id);
        if (!checklist) { goHome(); return; }
        app.innerHTML = renderEditor(checklist);
        attachDragAndDrop(app, handleMove);
        scaleCoverStages(app);
      } else {
        app.innerHTML = renderHome(store.state);
      }
      updateTopbar();
    }
    function updateTopbar() {
      document.querySelector('[data-action="undo"]').disabled = !store.canUndo();
      document.querySelector('[data-action="redo"]').disabled = !store.canRedo();
      updateRecordButton();
    }
    function currentChecklist() {
      const route = parseHash();
      return route.name === 'editor' ? M.findChecklist(store.state, route.id) : null;
    }

    function handleMove(move) {
      const c = currentChecklist();
      if (!c) return;
      if (move.kind === 'item') {
        store.commit((s) => {
          const cc = M.findChecklist(s, c.id);
          M.moveItem(cc, move.fromSection, move.itemId, move.toSection, move.toIndex);
        });
      } else if (move.kind === 'section') {
        store.commit((s) => {
          const cc = M.findChecklist(s, c.id);
          M.moveSection(cc, move.sectionId, move.toIndex);
        });
      }
    }

    function openShareDialog(checklist) {
      const { url, length, hadImages } = encodeShareLink(checklist);
      const warn =
        length > 2000
          ? `<p class="warn">⚠ リンクが長い（${length}文字）ため一部の環境で開けない場合があります。大きなリストはエクスポート(JSON)での共有を推奨します。</p>`
          : '';
      const imgNote = hadImages
        ? `<p class="warn">※ 画像は共有リンクには含まれません（容量のため）。画像も渡す場合はエクスポート(JSON)をご利用ください。</p>`
        : '';

        <h3>共有リンク</h3>

        <textarea class="share-url" readonly rows="4">${url}</textarea>

      overlay.querySelector('[data-copy]').addEventListener('click', async () => {

    function maybeImportShare() {
      const route = parseHash();
      if (route.name !== 'share') return false;
      const checklist = readShareFromHash();
      if (!checklist) { goHome(); return true; }
      const ok = confirm(`「${checklist.title}」を取り込みますか？`);
      if (ok) {
        const copy = JSON.parse(JSON.stringify(checklist));
        copy.id = M.createChecklist().id;
        copy.createdAt = copy.updatedAt = Date.now();
        store.commit((s) => M.addChecklist(s, copy));
        goEditor(copy.id);

    // 印刷ビューを差し込んでブラウザの印刷ダイアログを開く。
    // 印刷後（またはキャンセル後）は中身を空にして画面に残らないようにする。
    function printChecklist(checklist) {
      let root = document.getElementById('print-root');
      if (!root) {
        root = document.createElement('div');
        root.id = 'print-root';
        document.body.appendChild(root);
      }
      root.innerHTML = renderPrintView(checklist);
      const cleanup = () => {
        root.innerHTML = '';
        window.removeEventListener('afterprint', cleanup);
      };
      window.addEventListener('afterprint', cleanup);
      window.print();
    }

    function buildModal(innerHtml) {
      const overlay = document.createElement('div');
      overlay.className = 'modal-overlay';
      overlay.innerHTML = `<div class="modal" role="dialog" aria-modal="true">${innerHtml}</div>`;
      document.body.appendChild(overlay);
      overlay.addEventListener('click', (e) => {
        if (e.target === overlay || e.target.hasAttribute('data-close')) closeModal(overlay);
      });
      return overlay;
    }
    function closeModal(overlay) { overlay.remove(); }

    // 表紙編集モーダル。左=設定フォーム / 右=ライブプレビュー。
    // 変更はドラフトに反映 → プレビュー即時更新、確定（クリック/blur）でストアへ commit。

      const SWATCHES = [['#3b6ea5', '青'], ['#2f8f6b', '緑'], ['#2b3a67', '紺'], ['#5b6470', 'グレー'], ['#9b3b4a', '臙脂']];

      const overlay = document.createElement('div');
      overlay.className = 'modal-overlay';
      overlay.innerHTML = `
        <div class="modal cover-editor" role="dialog" aria-modal="true">
