  }
  .share-url {
    width: 100%;
    font-family: monospace;
    font-size: 0.8rem;
    padding: 8px;
    border: 1px solid var(--border);
    border-radius: 8px;
    background: var(--bg);
    color: var(--text);
    resize: vertical;
  }
  .warn { color: var(--danger); font-size: 0.85rem; }
  .modal-actions { display: flex; justify-content: flex-end; gap: 8px; margin-top: 14px; }

  /* ---- 録画取り込みウィザード（2-R4） ---- */
  .modal.import-wiz { max-width: 760px; display: flex; flex-direction: column; max-height: 88vh; }
  .iw-meta { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
  .iw-badge { font-size: 0.75rem; border: 1px solid var(--border); border-radius: 999px; padding: 1px 8px; color: var(--muted); }
  .iw-badge.warn { color: var(--danger); border-color: var(--danger); }
  .iw-bulk { display: flex; gap: 6px; align-items: center; margin-bottom: 10px; font-size: 0.85rem; color: var(--muted); }
  .iw-bulk input { flex: 1; min-width: 0; font: inherit; padding: 6px 8px; border: 1px solid var(--border); border-radius: 8px; background: var(--bg); color: var(--text); }
  .iw-list { overflow-y: auto; flex: 1; min-height: 120px; display: grid; gap: 8px; padding: 2px; align-content: start; }
  .iw-row { display: flex; gap: 10px; border: 1px solid var(--border); border-radius: 10px; padding: 8px; background: var(--surface); }
  .iw-thumb { width: 132px; height: 88px; flex: none; border-radius: 6px; background: var(--surface-2); display: flex; align-items: center; justify-content: center; overflow: hidden; color: var(--muted); font-size: 0.78rem; }
  .iw-thumb img { width: 100%; height: 100%; object-fit: contain; }
  .iw-main { flex: 1; min-width: 0; display: grid; gap: 6px; align-content: start; }
  .iw-row-head { display: flex; align-items: center; gap: 8px; }
  .iw-seq { font-weight: 600; color: var(--muted); min-width: 1.6em; }
  .iw-seg { display: inline-flex; border: 1px solid var(--border); border-radius: 8px; overflow: hidden; }
  .iw-seg button { font: inherit; font-size: 0.78rem; padding: 3px 8px; border: 0; background: transparent; color: var(--muted); cursor: pointer; }
  .iw-seg button.active { background: var(--primary); color: #fff; }
  .iw-seg button:disabled { opacity: 0.4; cursor: default; }
  .iw-tools { margin-left: auto; display: inline-flex; gap: 4px; }
  .iw-tools button { font: inherit; font-size: 0.8rem; padding: 3px 7px; border: 1px solid var(--border); border-radius: 6px; background: transparent; color: var(--text); cursor: pointer; }
  .iw-tools button:hover:not(:disabled) { background: var(--surface-2); }
  .iw-tools button:disabled { opacity: 0.35; cursor: default; }
  .iw-text { width: 100%; font: inherit; font-size: 0.9rem; padding: 6px 8px; border: 1px solid var(--border); border-radius: 8px; background: var(--bg); color: var(--text); resize: vertical; }
  .iw-dest { display: flex; gap: 8px; align-items: center; margin-top: 12px; font-size: 0.85rem; color: var(--muted); flex-wrap: wrap; }
  .iw-dest select, .iw-dest input { font: inherit; padding: 6px 8px; border: 1px solid var(--border); border-radius: 8px; background: var(--bg); color: var(--text); }
  .iw-dest input { flex: 1; min-width: 140px; }
  .iw-sessions { display: grid; gap: 8px; max-height: 60vh; overflow-y: auto; }
  .iw-session { text-align: left; font: inherit; display: flex; gap: 8px; align-items: center; flex-wrap: wrap; padding: 10px 12px; border: 1px solid var(--border); border-radius: 10px; background: var(--surface); color: inherit; cursor: pointer; }
  .iw-session:hover { border-color: var(--primary); background: var(--surface-2); }

  /* ---- 印刷用ビュー ----
     画面では隠し、印刷時だけ #app / #topbar と入れ替えて表示する。
     編集用の <input> は印刷でテキストが折り返せず欠けてしまうため、
     印刷専用のテキスト表現（span/li）で描き直す。 */
  #print-root { display: none; }
  .print-header h1 { margin: 0 0 6px; font-size: 1.5rem; }
  .print-meta {
    display: flex;
    flex-wrap: wrap;
    gap: 4px 16px;
    color: #444;
    font-size: 0.9rem;
    border-bottom: 2px solid #000;
    padding-bottom: 8px;
    margin-bottom: 14px;
  }
  .print-section { margin-bottom: 14px; break-inside: avoid; }
  .print-section-title {
    font-size: 1.15rem;
    margin: 0 0 6px;
    padding-bottom: 3px;
    border-bottom: 1px solid #999;
  }
  .print-section-meta { font-weight: 400; font-size: 0.9rem; color: #555; }
  .print-items { list-style: none; margin: 0; padding: 0; }
  .print-item {
    display: flex;
    align-items: baseline;
    flex-wrap: wrap;
    gap: 6px;
    padding: 3px 0;
    break-inside: avoid;
  }
  .print-no { min-width: 1.4em; font-weight: 700; color: #555; }
  .print-box { font-size: 1.05rem; line-height: 1; }
  .print-text { flex: 1; min-width: 0; word-break: break-word; }
  .print-item.done .print-text { text-decoration: line-through; color: #666; }
  .print-step-time { color: #555; font-size: 0.9rem; white-space: nowrap; }
  .print-note {
    flex-basis: 100%;
    margin-left: 1.9em;
    color: #555;
    font-size: 0.95rem;
    word-break: break-word;
  }
  .print-imgs {
    flex-basis: 100%;
    margin: 4px 0 4px 1.9em;
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
  }
  .print-img {
    object-fit: contain;
    border: 1px solid #ccc;
    break-inside: avoid;
  }
  /* 画像の配置（印刷プレビューで選択・記憶）:
     1列=1枚ずつ縦に並べる / 2列=横に2枚並べる。
     どちらも原寸より拡大しない（トリミングした画像が紙幅まで引き伸ばされないように）。
     紙幅を超える大きい画像だけ収まるよう縮小する。 */
  .print-cols-1 .print-img { width: auto; max-width: 100%; max-height: 160mm; }
  .print-cols-2 .print-img { max-width: 49%; max-height: 110mm; }

  /* ---- 目次ページ（表紙の「目次を含める」ON のとき、表紙の直後に出す） ---- */
  .print-toc-title {
    font-size: 1.4rem;
    margin: 0 0 12px;
    padding-bottom: 6px;
    border-bottom: 2px solid #000;
  }
  .print-toc-list { list-style: none; margin: 0; padding: 0; }
  .print-toc-sec {
    font-weight: 700;
    font-size: 1.05rem;
    margin: 10px 0 2px;
    break-inside: avoid;
  }
  .print-toc-meta { font-weight: 400; font-size: 0.85rem; color: #555; margin-left: 6px; }
  .print-toc-steps { list-style: none; margin: 2px 0 0; padding: 0 0 0 1.7em; }
  .print-toc-step {
    font-weight: 400;
    font-size: 0.95rem;
    color: #333;
    padding: 1px 0;
    word-break: break-word;
  }

  /* ---- 印刷プレビュー（モーダル） ---- */
  .modal.print-preview { max-width: min(900px, 96vw); display: flex; flex-direction: column; }
  .print-preview-bar {
    display: flex;
    align-items: center;
    flex-wrap: wrap;
    gap: 8px;
    margin-bottom: 12px;
  }
  .print-preview-bar .pp-label { color: var(--muted); font-size: 0.9rem; }
  .print-preview-bar .pp-spacer { flex: 1; }
  .pp-seg { display: inline-flex; border: 1px solid var(--border); border-radius: 8px; overflow: hidden; }
  .pp-seg button {
    font: inherit;
    font-size: 0.9rem;
    padding: 6px 12px;
    border: none;
    background: var(--surface);
    color: var(--text);
    cursor: pointer;
  }
  .pp-seg button + button { border-left: 1px solid var(--border); }
  .pp-seg button.active { background: var(--primary); color: #fff; }
  .print-preview-body {
    background: #6b7076;
    padding: 18px;
    border-radius: 8px;
    overflow: auto;
    max-height: min(68vh, 900px);
  }
  .print-preview-page {
    background: #fff;
    color: #000;
    width: 210mm;
    max-width: 100%;
    margin: 0 auto;
    padding: 16mm;
    box-shadow: 0 3px 14px rgba(0, 0, 0, 0.45);
  }

  /* =========================================================================
     表紙（カバーページ） — テンプレート型の任意の先頭ページ
     .cover は A4 縦・96dpi 換算の固定サイズ(794x1123)。画面表示時は
     .cover-stage でラップし transform: scale() で縮小（JS が倍率を設定）。
     印刷時は名前付きページ(coverpage, margin:0)で 1:1 表示する。
     配色は共通トーン。差し色だけ --cover-accent でプリセット毎に流し込む。 */
  .cover-stage { position: relative; overflow: hidden; width: 100%;
    background: #fff; border: 1px solid var(--border); border-radius: 6px; }
  .cover-stage > .cover { position: absolute; top: 0; left: 0; transform-origin: top left; }
  .cover { position: relative; width: 794px; height: 1123px; background: #fff; overflow: hidden;
    color: #1f2329; font-family: system-ui, -apple-system, 'Segoe UI', 'Hiragino Sans', Meiryo, sans-serif;
    line-height: 1.5; --cover-accent: #3b6ea5; }
  .cover .logo { display: inline-flex; align-items: center; justify-content: center; width: 120px; height: 120px; border-radius: 8px; background: color-mix(in srgb, var(--cover-accent) 12%, #fff); border: 1px dashed color-mix(in srgb, var(--cover-accent) 45%, #fff); overflow: hidden; }
  .cover .logo img { width: 100%; height: 100%; object-fit: contain; }
  .cover .title { font-size: 44px; font-weight: 800; letter-spacing: .02em; margin: 0; color: #1f2329; }
  .cover .subtitle { font-size: 20px; color: #6b7280; margin: 0; }
  .cover .meta { font-size: 16px; color: #1f2329; }
  .cover .meta-row { display: flex; gap: 8px; } .cover .meta-row b { min-width: 84px; color: #6b7280; font-weight: 600; }
  .cover .rev { width: 100%; border-collapse: collapse; font-size: 13px; }
  .cover .rev caption { text-align: left; font-weight: 700; font-size: 14px; margin-bottom: 6px; }
  .cover .rev th, .cover .rev td { border: 1px solid #e2e4e9; padding: 6px 8px; text-align: left; }
  .cover .rev th { background: color-mix(in srgb, var(--cover-accent) 8%, #fff); font-weight: 600; }
  .cover--centered { display: grid; grid-template-rows: 1fr auto auto 1fr; padding: 90px 80px; text-align: center; justify-items: center; gap: 18px; }
  .cover--centered .logo { margin-bottom: 24px; }
  .cover--centered .rule { width: 90px; height: 4px; background: var(--cover-accent); border-radius: 2px; margin: 8px 0 4px; }
  .cover--centered .footer { align-self: end; display: grid; gap: 6px; color: #6b7280; }
  .cover--left-top { padding: 96px 80px; display: flex; flex-direction: column; gap: 22px; }
  .cover--left-top .title { font-size: 50px; } .cover--left-top .divider { height: 1px; background: #e2e4e9; margin: 6px 0; }
  .cover--left-top .meta { display: grid; gap: 10px; max-width: 420px; } .cover--left-top .spacer { flex: 1; }
  .cover--top-band { padding: 0; } .cover--top-band .band { min-height: 210px; background: var(--cover-accent); color: #fff; padding: 60px 80px; display: flex; align-items: center; }
  .cover--top-band .band .title { color: #fff; } .cover--top-band .body { padding: 60px 80px; display: grid; gap: 26px; }
  .cover--side-band { display: grid; grid-template-columns: 140px 1fr; } .cover--side-band .strip { background: var(--cover-accent); }
  .cover--side-band .body { padding: 110px 70px; display: flex; flex-direction: column; gap: 22px; } .cover--side-band .title { font-size: 46px; } .cover--side-band .spacer { flex: 1; }
  .cover--framed { padding: 46px; } .cover--framed .inner { height: 100%; border: 3px solid var(--cover-accent); padding: 70px 64px; display: grid; grid-template-rows: auto 1fr auto; text-align: center; justify-items: center; gap: 20px; }
  .cover--framed .footer { align-self: end; color: #6b7280; display: grid; gap: 6px; }
  .cover--hero { padding: 80px; display: flex; flex-direction: column; } .cover--hero .title { font-size: 58px; line-height: 1.1; font-weight: 900; margin-top: auto; white-space: nowrap; }
  .cover--hero .subtitle { font-size: 24px; margin-top: 12px; } .cover--hero .accentbar { width: 160px; height: 8px; background: var(--cover-accent); margin: 28px 0; } .cover--hero .meta { margin-top: auto; display: flex; gap: 40px; }
  .cover--logo-top { padding: 90px 80px; display: grid; grid-template-rows: auto auto 1fr auto; justify-items: center; text-align: center; gap: 20px; }
  .cover--logo-top .logo { width: 150px; height: 150px; } .cover--logo-top .title { font-size: 46px; } .cover--logo-top .footer { align-self: end; color: #6b7280; display: grid; gap: 6px; }
  .cover--split { display: grid; grid-template-rows: 0.9fr 1.1fr; } .cover--split .top { background: color-mix(in srgb, var(--cover-accent) 10%, #fff); padding: 80px; display: flex; flex-direction: column; justify-content: center; gap: 16px; border-bottom: 4px solid var(--cover-accent); }
  .cover--split .top .title { font-size: 52px; } .cover--split .bottom { padding: 50px 70px; display: grid; gap: 18px; align-content: start; }
  .cover--minimal { padding: 150px 90px; display: flex; flex-direction: column; gap: 40px; } .cover--minimal .title { font-size: 52px; font-weight: 700; padding-bottom: 22px; border-bottom: 2px solid var(--cover-accent); }
  .cover--minimal .meta { display: flex; gap: 48px; color: #6b7280; } .cover--minimal .spacer { flex: 1; }
  .cover--doc-header { padding: 80px; display: flex; flex-direction: column; } .cover--doc-header .head { display: flex; justify-content: space-between; align-items: flex-start; border-bottom: 3px solid var(--cover-accent); padding-bottom: 24px; gap: 28px; }
  .cover--doc-header .head .title { font-size: 34px; max-width: 100%; white-space: nowrap; } .cover--doc-header .infobox { border: 1px solid #e2e4e9; font-size: 13px; width: 210px; flex: none; }
  .cover--doc-header .infobox div { display: flex; border-bottom: 1px solid #e2e4e9; } .cover--doc-header .infobox div:last-child { border-bottom: 0; }
  .cover--doc-header .infobox b { width: 90px; background: #fff; color: #6b7280; padding: 6px 8px; border-right: 1px solid #e2e4e9; font-weight: 600; } .cover--doc-header .infobox span { padding: 6px 8px; }
  .cover--doc-header .subtitle { margin-top: 36px; } .cover--doc-header .rev { margin-top: 30px; }

  /* エディタ先頭の表紙プレビューカード */
  .cover-card { border: 1px solid var(--border); border-radius: var(--radius); background: var(--surface); padding: 12px; margin-bottom: 14px; }
  .cover-card-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
  .cover-card-head strong { font-size: 0.95rem; }
  .cover-stage--card { max-width: 360px; }

  /* 表紙編集モーダル */
  .modal.cover-editor { max-width: 1040px; width: min(1040px, 98vw); padding: 0; display: flex; flex-direction: column; max-height: 94vh; }
  .cover-editor .ce-head { display: flex; align-items: center; justify-content: space-between; padding: 16px 20px 10px; }
  .cover-editor .ce-head h3 { margin: 0; font-size: 1.05rem; }
  .cover-editor .ce-x { border: none; background: transparent; font-size: 18px; color: var(--muted); cursor: pointer; }
  .cover-editor .ce-enable { display: flex; align-items: center; gap: 10px; padding: 0 20px 12px; border-bottom: 1px solid var(--border); color: var(--text); }
  .cover-editor .ce-enable small { color: var(--muted); }
  .ce-switch { width: 40px; height: 22px; border-radius: 11px; background: var(--border); position: relative; cursor: pointer; flex: none; transition: background .15s; }
  .ce-switch::after { content: ''; position: absolute; top: 2px; left: 2px; width: 18px; height: 18px; border-radius: 50%; background: #fff; transition: left .15s; }
  .ce-switch.on { background: var(--cover-accent, #3b6ea5); } .ce-switch.on::after { left: 20px; }
  .cover-editor .ce-body { display: grid; grid-template-columns: 1fr 340px; align-items: start; overflow: auto; }
  .cover-editor .ce-form { padding: 16px 20px; }
  .cover-editor .ce-preview { border-left: 1px solid var(--border); background: var(--surface-2); padding: 16px; position: sticky; top: 0; display: grid; gap: 8px; }
  .cover-editor .ce-grp { margin-bottom: 18px; }
  .cover-editor .ce-grp > .ce-lbl { font-size: 0.8rem; font-weight: 700; color: var(--text); margin-bottom: 8px; }
  .cover-editor .ce-grp > .ce-lbl .hint { font-weight: 400; color: var(--muted); font-size: 0.75rem; }
  .ce-preset-grid { display: grid; grid-template-columns: repeat(5, minmax(0, 1fr)); gap: 8px; }
  .ce-preset { border: 2px solid var(--border); border-radius: 8px; padding: 5px; background: var(--surface); cursor: pointer; min-width: 0; }
  .ce-preset.sel { border-color: var(--cover-accent, #3b6ea5); box-shadow: 0 0 0 2px color-mix(in srgb, var(--cover-accent, #3b6ea5) 25%, #fff); }
  .ce-preset .pname { font-size: 0.6rem; text-align: center; margin-top: 4px; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .ce-preset.sel .pname { color: var(--cover-accent, #3b6ea5); font-weight: 600; }
  .ce-swatches { display: flex; gap: 10px; align-items: center; }
  .ce-swatch { width: 28px; height: 28px; border-radius: 50%; cursor: pointer; border: 2px solid var(--surface); box-shadow: 0 0 0 1px var(--border); }
  .ce-swatch.sel { box-shadow: 0 0 0 2px var(--text); }
  .ce-swatch-custom { position: relative; overflow: hidden; background: conic-gradient(red,orange,yellow,green,cyan,blue,magenta,red); }
  .ce-swatch-custom input { position: absolute; inset: -4px; opacity: 0; cursor: pointer; }
  .ce-logo-row { display: flex; align-items: center; gap: 12px; }
  .ce-logo-box { width: 60px; height: 60px; border-radius: 8px; border: 1px dashed color-mix(in srgb, var(--cover-accent, #3b6ea5) 45%, #fff); background: color-mix(in srgb, var(--cover-accent, #3b6ea5) 12%, #fff); display: flex; align-items: center; justify-content: center; overflow: hidden; font-size: 11px; color: var(--muted); flex: none; }
  .ce-logo-box img { width: 100%; height: 100%; object-fit: contain; }
  .ce-fields { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .ce-field { display: grid; gap: 5px; font-size: 0.75rem; color: var(--muted); }
  .ce-field.col2 { grid-column: 1 / -1; }
  .ce-field input { font: inherit; font-size: 0.9rem; padding: 8px 10px; border: 1px solid var(--border); border-radius: 8px; background: var(--bg); color: var(--text); }
  table.ce-rev { width: 100%; border-collapse: collapse; font-size: 0.75rem; }
  table.ce-rev th { text-align: left; color: var(--muted); font-weight: 600; padding: 2px 5px; }
  table.ce-rev td { padding: 3px 4px; vertical-align: middle; }
  table.ce-rev input { width: 100%; font: inherit; font-size: 0.78rem; padding: 5px 6px; border: 1px solid var(--border); border-radius: 6px; background: var(--bg); color: var(--text); }
  table.ce-rev .ce-rev-del { border: none; background: transparent; color: var(--danger); cursor: pointer; font-size: 14px; }
  .ce-addrow { margin-top: 8px; border: 1px dashed var(--border); background: var(--surface); border-radius: 8px; padding: 6px 12px; font-size: 0.85rem; color: var(--cover-accent, #3b6ea5); cursor: pointer; width: 100%; }
  .ce-preview .ce-plbl { font-size: 0.8rem; font-weight: 700; }
  .ce-preview .ce-note { font-size: 0.72rem; color: var(--muted); }
  .cover-editor .modal-actions { padding: 12px 20px; border-top: 1px solid var(--border); margin: 0; }
  @media (max-width: 720px) {
    .cover-editor .ce-body { grid-template-columns: 1fr; }
    .cover-editor .ce-preview { border-left: none; border-top: 1px solid var(--border); position: static; }
    .ce-preset-grid { grid-template-columns: repeat(3, minmax(0, 1fr)); }
    .ce-fields { grid-template-columns: 1fr; }
  }

  /* =========================================================================
     リッチ本文（手順の本文：書式付きテキスト＋表）
     contenteditable の本文。ツールバーはフォーカス時のみ表示。
     表の行列コントロールは body:hover 時に近接セルへフローティング表示する(#rb-tctl)。 */
  .rb { border: 1px solid var(--border); border-radius: 8px; background: var(--surface); margin: 6px 0 8px; }
  .rb:focus-within { border-color: var(--primary); box-shadow: 0 0 0 2px color-mix(in srgb, var(--primary) 16%, transparent); }
  .rb-toolbar { display: none; align-items: center; gap: 2px; flex-wrap: wrap; padding: 5px 6px; background: var(--surface-2); border-bottom: 1px solid var(--border); border-radius: 8px 8px 0 0; }
  .rb:focus-within .rb-toolbar { display: flex; }
  .rb-btn { min-width: 28px; height: 28px; border: 1px solid transparent; border-radius: 6px; background: transparent; color: var(--text); cursor: pointer; font-size: 0.9rem; display: inline-flex; align-items: center; justify-content: center; padding: 0 6px; font-family: inherit; }
  .rb-btn:hover { background: var(--surface); border-color: var(--border); }
  .rb-sep { width: 1px; height: 18px; background: var(--border); margin: 0 3px; }
  /* 文字サイズコンボ（Word/Excel 風: 現在値入力＋▾一覧。本文編集と画像編集で共用） */
  .rb-sizebox { display: inline-flex; align-items: stretch; height: 26px; border: 1px solid var(--border); border-radius: 6px; background: var(--bg); overflow: hidden; }
  .rb-sizebox .rb-size-in { width: 44px; border: none; background: transparent; color: var(--text); font: inherit; font-size: 0.85rem; text-align: center; padding: 0 2px; }
  .rb-sizebox .rb-size-in:focus { outline: none; }
  /* type=number のスピンボタンはコンボの見た目を崩すので出さない */
  .rb-sizebox .rb-size-in::-webkit-outer-spin-button, .rb-sizebox .rb-size-in::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
  .rb-sizebox .rb-size-dd { border: none; border-left: 1px solid var(--border); background: transparent; color: var(--muted); padding: 0 4px; cursor: pointer; font-size: 0.7rem; line-height: 1; }
  .rb-sizebox .rb-size-dd:hover { background: var(--surface-2); color: var(--text); }
  .rb-sizebox:focus-within { border-color: var(--primary); }
  .rb-swatch { display: inline-block; width: 13px; height: 4px; border-radius: 2px; background: #c0392b; margin-left: 1px; vertical-align: 2px; }
  .rb-swatch-hl { padding: 0 3px; background: #fff3a3; color: #1f2329; border-radius: 3px; }
  .rb-ins-table { margin-left: auto; border: 1px solid var(--border); background: var(--surface); font-size: 0.85rem; gap: 4px; }
  .rb-body { padding: 10px 12px; min-height: 38px; font-size: 0.95rem; outline: none; }
  .rb-body:empty::before { content: attr(data-placeholder); color: var(--muted); opacity: 0.7; }
  .rb-body p { margin: 0 0 6px; }
  .rb-body ul, .rb-body ol { margin: 4px 0 6px 1.4em; padding: 0; }
  .rb-body table { border-collapse: collapse; margin: 6px 0; font-size: 0.9rem; max-width: 100%; }
  .rb-body th, .rb-body td { border: 1px solid #c9ccd2; padding: 5px 9px; text-align: left; vertical-align: top; min-width: 48px; }
  .rb-body thead th { background: #eef4fb; font-weight: 700; }
  /* 行列コントロール（フローティング・近接時のみ表示） */
  #rb-tctl { position: fixed; inset: 0; pointer-events: none; z-index: 60; }
  #rb-tctl[hidden] { display: none; }
  .rb-tctl { position: fixed; width: 20px; height: 20px; border-radius: 50%; border: 1px solid var(--border); background: #fff; color: var(--primary); font-weight: 700; cursor: pointer; display: flex; align-items: center; justify-content: center; box-shadow: 0 1px 4px rgba(0,0,0,.25); font-size: 0.8rem; line-height: 1; padding: 0; pointer-events: auto; }
  .rb-tctl.rb-tctl-del { color: var(--muted); }
  /* 色パレット */
  /* Excel/Office 風カラーパレット（モーダル(z=100)の上にも出すため z を高く） */
  .rb-palette { position: fixed; z-index: 130; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; box-shadow: 0 6px 20px rgba(0,0,0,.28); padding: 8px; }
  .op-title { font-size: 0.7rem; color: var(--muted); margin: 8px 2px 4px; }
  .op-title:first-child { margin-top: 0; }
  .op-row { display: grid; grid-template-columns: repeat(10, 20px); gap: 3px; }
  .op-vars { margin-top: 4px; display: grid; gap: 2px; }
  .op-vars .op-row { gap: 3px; }
  .rb-palette .op-swatch { width: 20px; height: 20px; border-radius: 3px; border: 1px solid rgba(0,0,0,.22); cursor: pointer; padding: 0; }
  .rb-palette .op-swatch:hover { outline: 2px solid var(--primary); outline-offset: 1px; position: relative; }
  .op-footer { display: flex; gap: 6px; margin-top: 8px; }
  .op-none, .op-more { flex: 1; font: inherit; font-size: 0.75rem; padding: 4px 6px; border: 1px solid var(--border); border-radius: 6px; background: var(--surface); color: var(--text); cursor: pointer; white-space: nowrap; }
  .op-none:hover, .op-more:hover { border-color: var(--primary); }
  /* 文字サイズ一覧（Word のサイズプルダウン風。rb-palette の枠で開く） */
  .op-sizes { display: grid; max-height: 280px; overflow-y: auto; min-width: 64px; }
  .op-size { font: inherit; font-size: 0.9rem; padding: 4px 18px 4px 14px; border: none; border-radius: 4px; background: transparent; color: var(--text); text-align: left; cursor: pointer; }
  .op-size:hover { background: var(--surface-2); }
  .op-size.active { background: var(--primary); color: var(--primary-text, #fff); }
  /* 画像編集の右クリックミニメニュー（rb-palette の枠を流用） */
  .ie-ctx { padding: 4px; }
  .ie-ctx button { display: block; width: 100%; font: inherit; font-size: 0.85rem; padding: 6px 14px; border: none; border-radius: 5px; background: transparent; color: var(--text); text-align: left; cursor: pointer; white-space: nowrap; }
  .ie-ctx button:hover { background: var(--surface-2); }
  /* 印刷用リッチ本文 */
  .print-body { flex-basis: 100%; margin: 4px 0 2px 1.9em; font-size: 1rem; }
  .print-body p { margin: 0 0 5px; }
  .print-body ul, .print-body ol { margin: 3px 0 5px 1.3em; padding: 0; }
  .print-body table { border-collapse: collapse; margin: 5px 0; font-size: 0.95rem; break-inside: avoid; max-width: 100%; }
  .print-body th, .print-body td { border: 1px solid #555; padding: 4px 8px; text-align: left; vertical-align: top; }
  .print-body thead th { background: #e9eef5; font-weight: 700; }

  @media print {
    #topbar, #app { display: none !important; }
    /* プレビューモーダルを開いたまま印刷/PDF化するため、モーダル類も紙面から除く */
    .modal-overlay { display: none !important; }
    #print-root { display: block !important; }
    body { background: #fff; color: #000; }
    @page { margin: 16mm; }
    /* 表紙は余白なしの専用ページにして 794x1123 を A4 に 1:1 で載せる */
    @page coverpage { margin: 0; }
    .print-cover { page: coverpage; break-after: page; overflow: hidden; }
    .print-cover .cover { width: 794px; height: 1123px; }
    /* 目次は通常余白ページで独立させ、本文を次ページから始める */
    .print-toc { break-after: page; }
  }
  /* 単体文書モード（出力した .html を単体で開いたとき）は一覧へ戻る導線を隠す */
  .clm-standalone [data-action="home"] { display: none; }

  /* モーション控えめ設定を尊重：トランジション・ホバーのリフトを無効化 */
  @media (prefers-reduced-motion: reduce) {
    .card, .item, .btn, .section, .progress-bar { transition: none; }
    .card:hover, .item:hover { transform: none; }
    .toast { animation: none; }
  }

  /* トースト通知（エラー可視化 1-3）。クリックで閉じる */
  #toast-host {
    position: fixed; right: 16px; bottom: 16px; z-index: 9999;
    display: flex; flex-direction: column; gap: 8px;
    max-width: min(420px, calc(100vw - 32px));
  }
  .toast {
    background: var(--surface); color: var(--text);
    border: 1px solid var(--border); border-left: 4px solid var(--accent);
    border-radius: 8px; padding: 10px 14px; box-shadow: var(--shadow);
    font-size: 0.9rem; line-height: 1.5; cursor: pointer;
    white-space: pre-wrap; word-break: break-word;
    animation: toast-in 0.18s ease-out;
  }
  .toast.error { border-left-color: var(--danger); }
  @keyframes toast-in { from { opacity: 0; transform: translateY(6px); } }
  @media print { #toast-host { display: none !important; } }
</style>
</head>
<body>
  <div id="topbar">
    <span class="topbar-brand">✓ チェックリスト</span>
    <span class="topbar-spacer"></span>
    <button class="icon" data-action="undo" title="元に戻す (Undo)">↶</button>
    <button class="icon" data-action="redo" title="やり直す (Redo)">↷</button>
    <button class="icon" data-action="record" title="録画ガジェットを開く（ガジェットの「録画開始」で撮影開始）">
      <svg class="rec-ico" width="20" height="20" viewBox="0 0 20 20" aria-hidden="true">
        <rect x="1" y="1" width="18" height="18" rx="4" fill="#111827" />
        <circle cx="10" cy="10" r="5" fill="#ef4444" />
      </svg>
    </button>
    <button class="icon" data-action="import-rec" title="録画を取り込む（過去のセッション一覧から選択）">📥</button>
  </div>

  <main id="app"></main>

  <input id="file-input" type="file" accept="application/json,.json,text/html,.html" hidden />

  <!-- アプリ全体を1ファイルに内包（ES Modules不使用 → file:// のダブルクリックで動作） -->
  <script>
  (async function () {
    'use strict';

    // アプリ自身の <script> 要素を同期実行中に捕捉しておく。
    // HTML 出力（自己クローン方式）で、このスクリプト本文をそのまま再パッケージするのに使う。
    const __selfScript = document.currentScript;

    // =========================================================================
    // エラー可視化（ロードマップ 1-3・仕様は docs/spec-1-3-error-visibility.md）
    //   グローバルエラー → console＋ローカルログ（Electron のみ・外部送信なし）
    //   保存失敗 → 右下トースト（30秒に1回まで。force は必ず表示）＋ローカルログ
    // =========================================================================
    function showToast(message, { type = 'info', duration = 10000 } = {}) {
      let host = document.getElementById('toast-host');
      if (!host) {
        host = document.createElement('div');
        host.id = 'toast-host';
        document.body.appendChild(host);
      }
      const el = document.createElement('div');
      el.className = 'toast' + (type === 'error' ? ' error' : '');
      el.textContent = message;
      el.title = 'クリックで閉じる';
      el.addEventListener('click', () => el.remove());
      host.appendChild(el);
      while (host.children.length > 3) host.firstChild.remove(); // 溜めても読めないため最大3件
      setTimeout(() => el.remove(), duration);
      return el;
    }

    // ローカルログへの記録（Electron のみ。エラーループ対策で1セッション最大50件）
    let errorLogCount = 0;
    const ERROR_LOG_LIMIT = 50;
    function logError(kind, message, stack, extra) {
      if (!window.appLogAPI || errorLogCount >= ERROR_LOG_LIMIT) return;
      errorLogCount++;
      try {
        window.appLogAPI
          .error({
            kind,
            message: String(message || ''),
            stack: stack ? String(stack) : undefined,
            extra: extra ? String(extra) : undefined,
          })
          .catch(() => {});
      } catch (_) {
        /* ログ書き込み失敗でアプリを止めない */
      }
    }
    window.addEventListener('error', (e) => {
      logError('error', e.message, e.error && e.error.stack,
        e.filename ? `${e.filename}:${e.lineno}:${e.colno}` : '');
    });
    window.addEventListener('unhandledrejection', (e) => {
      const r = e.reason;
      logError('unhandledrejection', (r && r.message) || r, r && r.stack);
    });

    // 保存失敗の通知はここに一本化する。表示はスロットル、ログは毎回。
    let lastSaveErrorShownAt = 0;
    function notifySaveError(message, { force = false } = {}) {
      logError('save-failure', message);
      const now = Date.now();
      if (!force && now - lastSaveErrorShownAt < 30000) return;
      lastSaveErrorShownAt = now;
      showToast(message, { type: 'error' });
    }

    // =========================================================================
    // model — データモデルと純粋な操作関数（副作用なし。永続化やDOMには触れない）
    // =========================================================================
    const uid = () =>
      (crypto.randomUUID && crypto.randomUUID()) ||
      'id-' + Math.random().toString(36).slice(2) + Date.now().toString(36);

    const MODES = { TEMPLATE: 'template', TODO: 'todo' };

    function createItem(text = '') {
      return { id: uid(), text, done: false, note: '', time: '', images: [], body: '' };
    }
    function createSection(title = '') {
      return { id: uid(), title, items: [] };
    }
    // 改訂履歴の1行
    function createRevision(version = '', date = '', author = '', note = '') {
      return { id: uid(), version, date, author, note };
    }
    // テンプレート型の任意の表紙（カバーページ）。初回有効化時に生成する。
    function createCoverPage() {
      return {
        enabled: true,
        includeToc: true,
        preset: 'centered',
        accent: '#3b6ea5',
        title: '',
        subtitle: '',
        author: '',
        date: new Date().toLocaleDateString('ja-JP'),
        version: '',
        docNumber: '',
        logo: '',
        revisions: [],
      };
    }
    function createChecklist(type = MODES.TODO, title = '') {
      const now = Date.now();
      return {
        id: uid(),
        title: title || (type === MODES.TEMPLATE ? '新しいテンプレート' : '新しいリスト'),
        type,
        sections: [createSection('')],
        createdAt: now,
        updatedAt: now,
      };
    }
    function createInitialState() {
      return { checklists: [], settings: { theme: 'auto' } };
    }

    const findChecklist = (state, id) =>
      state.checklists.find((c) => c.id === id) || null;
    const findSection = (checklist, sectionId) =>
      checklist.sections.find((s) => s.id === sectionId) || null;

    function progress(checklist) {
      let total = 0;
      let done = 0;
      const sections = checklist.sections.map((s) => {
        const t = s.items.length;
        const d = s.items.filter((i) => i.done).length;
        total += t;
        done += d;
        return { id: s.id, total: t, done: d, percent: t ? Math.round((d / t) * 100) : 0 };
      });
      return { total, done, percent: total ? Math.round((done / total) * 100) : 0, sections };
    }

    function touch(checklist) {
      checklist.updatedAt = Date.now();
      return checklist;
    }
    function addChecklist(state, checklist) {
      state.checklists.unshift(checklist);
      return state;
    }
    function removeChecklist(state, id) {
      state.checklists = state.checklists.filter((c) => c.id !== id);
      return state;
    }
    function duplicateChecklist(state, id) {
      const src = findChecklist(state, id);
      if (!src) return state;
      const copy = JSON.parse(JSON.stringify(src));
      copy.id = uid();
      copy.title = src.title + '（コピー）';
      copy.createdAt = copy.updatedAt = Date.now();
      copy.sections.forEach((s) => {
        s.id = uid();
        s.items.forEach((i) => (i.id = uid()));
      });
      const idx = state.checklists.findIndex((c) => c.id === id);
      state.checklists.splice(idx + 1, 0, copy);
      return state;
    }
    function renameChecklist(checklist, title) {
      checklist.title = title;
      return touch(checklist);
    }
    function addSection(checklist, title = '') {
      checklist.sections.push(createSection(title));
      return touch(checklist);
    }
    function renameSection(checklist, sectionId, title) {
      const s = findSection(checklist, sectionId);
      if (s) s.title = title;
      return touch(checklist);
    }
    function removeSection(checklist, sectionId) {
      checklist.sections = checklist.sections.filter((s) => s.id !== sectionId);
      if (checklist.sections.length === 0) checklist.sections.push(createSection(''));
      return touch(checklist);
    }
    function addItem(checklist, sectionId, text) {
      const s = findSection(checklist, sectionId);
      if (s && text.trim()) s.items.push(createItem(text.trim()));
      return touch(checklist);
    }
    // セクションバーの「＋」用：空の項目を末尾に追加し、その項目を返す
    function addBlankItem(checklist, sectionId) {
      const s = findSection(checklist, sectionId);
      if (!s) return null;
      const item = createItem('');
      s.items.push(item);
      touch(checklist);
      return item;
    }
    // テキスト/メモ/所要時間など任意フィールドを更新する汎用関数
    function setItemField(checklist, sectionId, itemId, field, value) {
      const s = findSection(checklist, sectionId);
      const i = s && s.items.find((x) => x.id === itemId);
      if (i) i[field] = value;
      return touch(checklist);
    }
    function editItem(checklist, sectionId, itemId, text) {
      return setItemField(checklist, sectionId, itemId, 'text', text);
    }
    // ---- 画像（スクリーンショット注釈）操作 ----
    // 画像は圧縮済み JPEG の dataURL 文字列として item.images に配列で持つ。
    // item.imageEdits は images と index を揃えた並行配列で、画像エディタの
    // 編集ソース（{v:1, base, strokes, objects}）を保持する。null は「編集
    // データ無し（未編集 or 旧形式の焼き込み済み画像）」。images[index] は
    // 常に合成済み JPEG のままなので、サムネイル・印刷・Word 出力・共有は
    // imageEdits を知らなくてよい。
    function itemImages(item) {
      if (!Array.isArray(item.images)) item.images = [];
      return item.images;
    }
    // imageEdits を images と同じ長さに正規化して返す
    function itemImageEdits(item) {
      const n = itemImages(item).length;
      if (!Array.isArray(item.imageEdits)) item.imageEdits = [];
      while (item.imageEdits.length < n) item.imageEdits.push(null);
      if (item.imageEdits.length > n) item.imageEdits.length = n;
      return item.imageEdits;
    }
    function addItemImage(checklist, sectionId, itemId, dataUrl) {
      const s = findSection(checklist, sectionId);
      const i = s && s.items.find((x) => x.id === itemId);
      if (i) { itemImages(i).push(dataUrl); itemImageEdits(i); }
      return touch(checklist);
    }
    function replaceItemImage(checklist, sectionId, itemId, index, dataUrl, edit) {
      const s = findSection(checklist, sectionId);
      const i = s && s.items.find((x) => x.id === itemId);
      if (i && itemImages(i)[index] !== undefined) {
        i.images[index] = dataUrl;
        itemImageEdits(i)[index] = edit || null;
      }
      return touch(checklist);
    }
    function removeItemImage(checklist, sectionId, itemId, index) {
      const s = findSection(checklist, sectionId);
      const i = s && s.items.find((x) => x.id === itemId);
      if (i && Array.isArray(i.images)) {
        itemImageEdits(i).splice(index, 1); // 先に長さを揃えてから同じ index を消す
        i.images.splice(index, 1);
      }
      return touch(checklist);
    }
    // 所要時間(分)の合計。数値解釈できない time は 0 とみなす
    function sumMinutes(items) {
      return items.reduce((a, i) => a + (parseInt(i.time, 10) || 0), 0);
    }
    function toggleItem(checklist, sectionId, itemId) {
      const s = findSection(checklist, sectionId);
      const i = s && s.items.find((x) => x.id === itemId);
      if (i) i.done = !i.done;
      return touch(checklist);
    }
    function removeItem(checklist, sectionId, itemId) {
      const s = findSection(checklist, sectionId);
      if (s) s.items = s.items.filter((x) => x.id !== itemId);
      return touch(checklist);
    }
    function resetChecklist(checklist) {
      checklist.sections.forEach((s) => s.items.forEach((i) => (i.done = false)));
      return touch(checklist);
    }
    function clearCompleted(checklist) {
      checklist.sections.forEach((s) => (s.items = s.items.filter((i) => !i.done)));
      return touch(checklist);
    }
    function moveItem(checklist, fromSectionId, itemId, toSectionId, toIndex) {
      const from = findSection(checklist, fromSectionId);
      const to = findSection(checklist, toSectionId);
      if (!from || !to) return checklist;
      const idx = from.items.findIndex((i) => i.id === itemId);
      if (idx < 0) return checklist;
      const [item] = from.items.splice(idx, 1);
      const insertAt = Math.max(0, Math.min(toIndex, to.items.length));
      to.items.splice(insertAt, 0, item);
      return touch(checklist);
    }
    function moveSection(checklist, sectionId, toIndex) {
      const idx = checklist.sections.findIndex((s) => s.id === sectionId);
      if (idx < 0) return checklist;
      const [sec] = checklist.sections.splice(idx, 1);
      const insertAt = Math.max(0, Math.min(toIndex, checklist.sections.length));
      checklist.sections.splice(insertAt, 0, sec);
      return touch(checklist);
    }

    // app 側から M.xxx で参照する名前空間
    const M = {
      MODES, createItem, createSection, createRevision, createCoverPage, createChecklist, createInitialState,
      findChecklist, progress, sumMinutes, addChecklist, removeChecklist, duplicateChecklist,
      renameChecklist, addSection, renameSection, removeSection, addItem, addBlankItem,
      setItemField, editItem, toggleItem, removeItem, resetChecklist, clearCompleted,
      moveItem, moveSection,
      addItemImage, replaceItemImage, removeItemImage,
    };

    // =========================================================================
    // storage — 永続化の抽象化(StorageAdapter) と Undo/Redo を備えた中央ストア(Store)
    //   将来グループウェア等で共用したくなったら、同じIFの RemoteAdapter に差し替え可能。
    // =========================================================================
    const STORAGE_KEY = 'checklistmaker.v1';
    const HISTORY_LIMIT = 50;

    class LocalStorageAdapter {
      constructor(key = STORAGE_KEY) {
        this.key = key;
      }
      load() {
        try {
          const raw = localStorage.getItem(this.key);
          return raw ? JSON.parse(raw) : null;
        } catch (e) {
          console.warn('状態の読み込みに失敗しました:', e);
          return null;
        }
      }
      save(state) {
        try {
          localStorage.setItem(this.key, JSON.stringify(state));
          return true;
        } catch (e) {
          console.warn('状態の保存に失敗しました:', e);
          return false;
        }
      }
    }

    // 単体文書モード（出力した .html を単体で開いたとき）用のアダプタ。
    // localStorage を汚さず、永続化は「保存＝新しい .html を再ダウンロード」に一本化する。
    // load は埋め込みデータで初期化した seed を返し、save は何もしない（成功扱い）。
    class MemoryAdapter {
      constructor(seed) {
        this.seed = seed || null;
      }
      load() {
        return this.seed;
      }
      save() {
        return true;
      }
    }

    // Electron 版のファイル保存アダプタ（ロードマップ 1-1）。
    // load() は起動時に await 済みの初期 state を返す（Store の同期IFを変えない）。
    // save() は JSON を直列キューで storage:save へ流し、楽観的に true を返す。
    // 失敗は console＋トースト＋ローカルログ（1-3）。
    class FileAdapter {
      constructor(initialState) {
        this.initialState = initialState || null;
        this.queue = Promise.resolve();
        this.lastError = null;
      }
      load() {
        return this.initialState;
      }
      save(state) {
        const json = JSON.stringify(state);
        this.queue = this.queue
          .then(() => window.storageAPI.save(json))
          .then((res) => {
            if (!res || !res.ok) throw new Error((res && res.error) || '不明なエラー');
            this.lastError = null;
          })
          .catch((e) => {
            this.lastError = e;
            console.error('ファイルへの保存に失敗しました:', e);
            notifySaveError('データのファイル保存に失敗しました: ' + (e.message || e) +
              '\nディスク容量・アクセス権を確認してください。アプリを閉じる前に JSON エクスポートでの退避を推奨します。');
          });
        return true;
      }
    }

    const clone = (obj) => JSON.parse(JSON.stringify(obj));

    // -------------------------------------------------------------------------
    // 画像の参照化レイヤ（Electron のみ。仕様は docs/spec-file-storage-migration.md）
    //   item.images[] と item.imageEdits[].base/.strokes を 'img:<uuid>.<ext>' の
    //   参照で持ち、実体は <userData>/data/images/ の個別ファイルに置く。
    //   ブラウザ単体・単体HTMLは従来どおり dataURL 直持ち（下の関数は素通し）。
    // -------------------------------------------------------------------------
    const IMG_REF_PREFIX = 'img:';
    const HAS_FILE_IMAGES = !!(window.storageAPI && !window.__CLM_STANDALONE__);
    const isImgRef = (s) => typeof s === 'string' && s.startsWith(IMG_REF_PREFIX);
    // 読み込み中プレースホルダ（薄いグレーの矩形）
    const IMG_PLACEHOLDER = 'data:image/svg+xml;charset=utf-8,' + encodeURIComponent(
      '<svg xmlns="http://www.w3.org/2000/svg" width="160" height="120"><rect width="100%" height="100%" fill="#e5e7eb"/></svg>');
    const imageCache = new Map(); // ref -> dataURL（セッション中キャッシュ）
    const imageFetching = new Set();

    // 同期 render 用: キャッシュ済みなら dataURL、未取得ならプレースホルダを返しつつ
    // 非同期取得を発火する。取得後は再描画せず該当 <img> の src を直接差し替える
    // （全再描画すると編集中のフォーカスが壊れるため）。
    function resolveImageSync(src) {
      if (!isImgRef(src)) return src;
      if (imageCache.has(src)) return imageCache.get(src);
      fetchImageRef(src);
      return IMG_PLACEHOLDER;
    }
    function fetchImageRef(ref) {
      if (imageFetching.has(ref) || imageCache.has(ref)) return;
      imageFetching.add(ref);
      window.storageAPI.imageGet(ref)
        .then((res) => {
          const url = res && res.ok ? res.dataUrl : '';
          if (url) {
            imageCache.set(ref, url);
            document.querySelectorAll(`img[data-img-ref="${CSS.escape(ref)}"]`)
              .forEach((el) => { el.src = url; });
          } else {
            // 破損参照はプレースホルダのまま固定（無限リトライしない）
            imageCache.set(ref, IMG_PLACEHOLDER);
            console.warn('画像を読み込めませんでした:', ref, res && res.error);
          }
        })
        .catch((e) => console.warn('画像の取得に失敗しました:', ref, e))
        .finally(() => imageFetching.delete(ref));
    }
    async function resolveImageAsync(src) {
      if (!isImgRef(src)) return src;
      if (imageCache.has(src)) return imageCache.get(src);
      const res = await window.storageAPI.imageGet(src);
      if (res && res.ok && res.dataUrl) {
        imageCache.set(src, res.dataUrl);
        return res.dataUrl;
      }
      console.warn('画像を読み込めませんでした:', src, res && res.error);
      return ''; // 破損参照は空（<img src=""> は表示されないだけ）
    }
    // dataURL を個別ファイルへ保存して参照を返す（ブラウザモードは素通し）
    async function storeImage(dataUrl) {
      if (!HAS_FILE_IMAGES || typeof dataUrl !== 'string' || !dataUrl.startsWith('data:image/')) {
        return dataUrl;
      }
      const res = await window.storageAPI.imageSave(dataUrl);
      if (res && res.ok && res.ref) {
        imageCache.set(res.ref, dataUrl);
        return res.ref;
      }
      throw new Error((res && res.error) || '画像の保存に失敗しました');
    }

    // checklist 内の全画像（images[] / imageEdits[].base / .strokes）へ fn を適用する。
    // coverPage.logo は対象外（小さく同期参照されるため dataURL 直持ちのまま）。
    async function mapChecklistImages(checklist, fn) {
      for (const s of checklist.sections || []) {
        for (const it of s.items || []) {
          if (Array.isArray(it.images)) {
            for (let i = 0; i < it.images.length; i++) it.images[i] = await fn(it.images[i]);
          }
          if (Array.isArray(it.imageEdits)) {
            for (const ed of it.imageEdits) {
              if (ed && typeof ed === 'object') {
                if (ed.base) ed.base = await fn(ed.base);
                if (ed.strokes) ed.strokes = await fn(ed.strokes);
              }
            }
          }
        }
      }
      return checklist;
    }
    // 参照 → dataURL（出力用の deep clone を返す。印刷/PDF/Word/HTML/JSON出力の前段）
    async function materializeChecklist(checklist) {
      const copy = clone(checklist);
      if (!HAS_FILE_IMAGES) return copy;
      return mapChecklistImages(copy, resolveImageAsync);
    }
    async function materializeState(state) {
      const copy = clone(state);
      if (!HAS_FILE_IMAGES) return copy;
      for (const c of copy.checklists || []) await mapChecklistImages(c, resolveImageAsync);
      return copy;
    }
    // dataURL → 参照（インポート/マイグレーション時。渡されたオブジェクトを直接書き換える）
    async function absorbChecklistImages(checklist) {
      if (!HAS_FILE_IMAGES) return checklist;
      return mapChecklistImages(checklist, storeImage);
    }

    class Store {
      constructor(adapter) {
        this.adapter = adapter;
        this.state = adapter.load() || createInitialState();
        if (!this.state.settings) this.state.settings = { theme: 'auto' };
        if (!Array.isArray(this.state.checklists)) this.state.checklists = [];
        this.undoStack = [];
        this.redoStack = [];
        this.listeners = new Set();
      }
      subscribe(fn) {
        this.listeners.add(fn);
        return () => this.listeners.delete(fn);
      }
      notify() {
        this.listeners.forEach((fn) => fn(this.state));
      }
      commit(mutator, { history = true } = {}) {
        if (history) {
          this.undoStack.push(clone(this.state));
          if (this.undoStack.length > HISTORY_LIMIT) this.undoStack.shift();
          this.redoStack = [];
        }
        mutator(this.state);
        this.persist();
        this.notify();
      }
      replaceState(newState, { history = true } = {}) {
        if (history) {
          this.undoStack.push(clone(this.state));
          this.redoStack = [];
        }
        this.state = newState;
        this.persist();
        this.notify();
      }
      canUndo() { return this.undoStack.length > 0; }
      canRedo() { return this.redoStack.length > 0; }
      undo() {
        if (!this.canUndo()) return;
        this.redoStack.push(clone(this.state));
        this.state = this.undoStack.pop();
        this.persist();
        this.notify();
      }
      redo() {
        if (!this.canRedo()) return;
        this.undoStack.push(clone(this.state));
        this.state = this.redoStack.pop();
        this.persist();
        this.notify();
      }
      persist() {
        // 画像追加などで localStorage 上限に達したか呼び出し側が判定できるよう結果を保持。
        this.lastSaveOk = this.adapter.save(this.state);
        if (this.lastSaveOk === false) {
          notifySaveError('データの保存に失敗しました（容量上限の可能性）。\nJSON エクスポートでの退避を推奨します。');
        }
        return this.lastSaveOk;
      }
    }

    // =========================================================================
    // io — JSON のエクスポート/インポートと、URLリンク共有のエンコード/デコード
    // =========================================================================
    function exportStateToFile(state) {
      const blob = new Blob([JSON.stringify(state, null, 2)], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      const stamp = new Date().toISOString().slice(0, 10);
      a.href = url;
      a.download = `checklists-${stamp}.json`;
      document.body.appendChild(a);
      a.click();
      a.remove();
      URL.revokeObjectURL(url);
    }

    // ---- HTML 出力（自己完結・フル編集可能）／HTML 取り込み ----
    // 実行中アプリの <style> と <script> をそのまま再パッケージし、単一チェックリストの
    // データを埋め込んだ独立 HTML を作る。開くと単体文書モード（window.__CLM_STANDALONE__）で
    // 起動し、本アプリと同じフル編集が使える。保存は「新しい .html を再ダウンロード」。
    function buildStandaloneHtml(checklist) {
      const state = {
        checklists: [clone(checklist)],
        settings: clone(store.state.settings || { theme: 'auto' }),
      };
      // 埋め込みJSON内の "</" を退避し、スクリプト要素が途中で閉じないようにする。
      const dataJson = JSON.stringify(state).replace(/<\//g, '<\\/');
      const styleCss = (document.querySelector('style') || {}).textContent || '';
      const appJs = (__selfScript && __selfScript.textContent) || '';
      const title = checklist.title || 'チェックリスト';
      return (
        '<!DOCTYPE html>\n' +
        '<html lang="ja">\n' +
        '<head>\n' +
        '  <meta charset="UTF-8" />\n' +
        '  <meta name="viewport" content="width=device-width, initial-scale=1.0" />\n' +
        '  <title>' + escapeHtml(title) + '</title>\n' +
        '  <style>' + styleCss + '</style>\n' +
        '</head>\n' +
        '<body>\n' +
        '  <div id="topbar">\n' +
        '    <span class="topbar-brand">✓ チェックリスト</span>\n' +
        '    <span class="topbar-spacer"></span>\n' +
        '    <button class="icon" data-action="undo" title="元に戻す (Undo)">↶</button>\n' +
        '    <button class="icon" data-action="redo" title="やり直す (Redo)">↷</button>\n' +
        '  </div>\n' +
        '  <main id="app"></main>\n' +
        '  <input id="file-input" type="file" accept="application/json,.json,text/html,.html" hidden />\n' +
        '  <script>window.__CLM_STANDALONE__ = true;<\/script>\n' +
        '  <script type="application/json" id="clm-data">' + dataJson + '<\/script>\n' +
        '  <script>' + appJs + '<\/script>\n' +
        '</body>\n' +
        '</html>\n'
      );
    }
    function sanitizeFilename(name) {
      return (String(name || 'checklist').trim() || 'checklist')
        .replace(/[\\/:*?"<>|]/g, '_')
        .slice(0, 120);
    }
    function downloadHtml(filename, html) {
      const blob = new Blob([html], { type: 'text/html' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = /\.html?$/i.test(filename) ? filename : filename + '.html';
      document.body.appendChild(a);
      a.click();
      a.remove();
      URL.revokeObjectURL(url);
    }
    async function saveAsHtml(checklist) {
      const def = sanitizeFilename(checklist.title || 'checklist');
      // 画像参照を dataURL に戻してから埋め込む（単体HTMLは自己完結が仕様）
      const html = buildStandaloneHtml(await materializeChecklist(checklist));
      // Electron 版: window.prompt() が使えない（例外になる）ため、
      // ファイル名の入力ごとネイティブの保存ダイアログに任せる。
      if (window.fileAPI && window.fileAPI.saveHtml) {
        try {
          const res = await window.fileAPI.saveHtml({ title: def, html });
          if (res && res.error) alert('HTML の保存に失敗しました: ' + res.error);
        } catch (e) {
          alert('HTML の保存に失敗しました: ' + e.message);
        }
        return;
      }
      // 素のブラウザ: prompt でファイル名を確認してダウンロード。
      const input = prompt('ファイル名（.html）', def);
      if (input == null) return; // キャンセル
      downloadHtml(sanitizeFilename(input), html);
    }
    // 本アプリが出力した HTML から、埋め込みチェックリストを取り出す。
    function parseChecklistFromHtml(text) {
      const doc = new DOMParser().parseFromString(text, 'text/html');
      const node = doc.getElementById('clm-data');
      if (!node) {
        throw new Error('このHTMLには CheckListMaker の埋め込みデータが見つかりません。');
      }
      let data;
      try {
        data = JSON.parse(node.textContent);
      } catch (e) {
        throw new Error('埋め込みデータの解析に失敗しました: ' + e.message);
      }
      const checklist =
        data && Array.isArray(data.checklists) ? data.checklists[0] : data;
      if (!checklist || !Array.isArray(checklist.sections)) {
        throw new Error('チェックリストの形式が不正です。');
      }
      return checklist;
    }

    // ---- .docx 出力（Electron 版のみ）----
    // Word 向けの静的HTMLを組み、メインプロセス(main.js)の docx:save 経由で .docx に
    // 変換・保存する。素のブラウザでは window.docxAPI が無いためボタン自体を出さない
    // （下の renderEditor 参照）。
    //
    // 印刷ビュー(renderPrintView)を流用しない理由: html-to-docx は「<li> の中の
    // ブロック要素(div等)に入った <img>」を無視するため、<li><div class="print-imgs">
    // 構造だと画像が全て消える（<li> 内の表も同リスク）。そこで docx 用には
    // ul/li を使わず、見出し・段落・表・画像を全てトップレベルに並べたHTMLを組む。
    // 社内様式「操作説明書様式」のデザインに寄せた docx 用 HTML を組む。
    // 表題と目次は html-to-docx では表現できないため、マーカー入りの段落を置いておき、
    // メインプロセスの後処理（docx-postprocess.js）が様式の OOXML に置換する。
    // 戻り値は { html, meta }。meta のマーカーを後処理に渡す。
    function renderDocxView(checklist, opts = {}) {
      const isTemplate = checklist.type === MODES.TEMPLATE;
      const totalMin = isTemplate
        ? checklist.sections.reduce((a, s) => a + sumMinutes(s.items), 0)
        : 0;
      let stepNo = 0;
      const parts = [];
      // accent は表紙の差し色に連動（表紙が無くても既定色でモダン様式に使う）。後処理が見出し等に流す。
      const accent = (checklist.coverPage && checklist.coverPage.accent) || '#3b6ea5';
      const meta = { isTemplate, markerTitle: '', markerToc: '', accent };
      const pageBreak = '<div class="page-break" style="page-break-after: always;"></div>';
      if (isTemplate) {
        // マーカーは英数字トークン（正規表現エスケープ不要な文字種のみ）。
        meta.markerTitle = '@@DXTITLE' + Math.random().toString(36).slice(2, 10) + '@@';
        meta.markerToc = '@@DXTOC' + Math.random().toString(36).slice(2, 10) + '@@';
        const cover = checklist.coverPage;
        const coverImage = opts.coverImage;
        if (cover && cover.enabled && coverImage) {
          // 表紙: アプリの表紙作成機能で作った表紙を画像として 1 ページ目に埋め込む
          // （デザイン忠実再現）。表題は画像に含まれるため表題マーカーは出さない。
          // 605x856px ≒ 本文幅160mm・A4縦比。
          parts.push(`<p><img src="${coverImage}" width="605" height="856" /></p>`);
          parts.push(pageBreak);
          meta.markerTitle = '';
          if (cover.includeToc !== false) {
            parts.push(`<p>${meta.markerToc}</p>`);
            parts.push(pageBreak);
          } else {
            meta.markerToc = '';
          }
        } else {
          // 表紙なし: 表題のみ（目次は表紙機能のオプションのため出さない）。
          parts.push(`<p>${meta.markerTitle}${escapeHtml(checklist.title)}</p>`);
          meta.markerToc = '';
        }
        // 所要時間は手順書の情報として残す（種別・進捗・出力日付は出さない）。
        if (totalMin) parts.push(`<p>総所要 約${totalMin}分</p>`);
      } else {
        // ToDo 型は従来どおり（表紙・目次・表題装飾なし。16pt 太字の表題のみ）。
        parts.push(
          `<p><span style="font-size:16pt"><strong>${escapeHtml(checklist.title)}</strong></span></p>`
        );
      }
      checklist.sections.forEach((s) => {
        const mins = isTemplate ? sumMinutes(s.items) : 0;
        // 所要時間は @@DXTAB@@（後処理で右タブに置換）で見出し行末に右詰めする。
        const heading = `${escapeHtml(s.title)}${mins ? `@@DXTAB@@⏱${mins}分` : ''}`;
        // h2 → Heading2（後処理でモダン様式の見出しに差し替わる）
        if (heading) parts.push(`<h2>${heading}</h2>`);
        s.items.forEach((it) => {
          if (isTemplate) {
            // 手順名は h4 → Heading4（様式「見出し4」＝太字＋点線下罫線。目次にも載る）。
            // スタイルが太字を持つので <strong> は不要。☐/☑ は手順書には出さない。
            stepNo += 1;
            // 所要時間は @@DXTAB@@（後処理で右タブに置換）で手順名の行末に右詰めする。
            const time = it.time ? `@@DXTAB@@⏱${escapeHtml(String(it.time))}分` : '';
            parts.push(`<h4>${stepNo}. ${escapeHtml(it.text)}${time}</h4>`);
            const bodyClean = sanitizeBodyHtml(it.body || '');
            if (bodyClean) parts.push(bodyClean);
            if (it.note) parts.push(`<p>（メモ）${escapeHtml(it.note)}</p>`);
          } else {
            // ToDo 型はチェック状態が本体情報なので従来通り記号を出す
            const box = it.done ? '☑' : '☐';
            parts.push(`<p>${box} ${escapeHtml(it.text)}</p>`);
          }
          (Array.isArray(it.images) ? it.images : []).forEach((src) => {
            // 画像は必ず独立した段落に置く（li/div 入れ子だと html-to-docx が落とす）。
            // サイズ指定は不要: html-to-docx が原寸を読み、ページ幅を超える分は
            // 自動でページ幅いっぱいに縮小する。
            parts.push(`<p><img src="${src}" alt="" /></p>`);
          });
        });
      });
      return { html: parts.join('\n'), meta };
    }
    function buildStaticHtmlForDocx(checklist, opts = {}) {
      const { html: body, meta } = renderDocxView(checklist, opts);
      // アプリの <style> 全文は渡さない（html-to-docx はほぼ無視する上、巨大になる）。
      // 表の罫線など docx 側で効く最小限のスタイルだけ付ける。
      const styleCss =
        'table { border-collapse: collapse; } ' +
        'th, td { border: 1px solid #cfd3da; padding: 5px 9px; } ' +
        'thead th { background-color: #f2f4f7; }';
      const html =
        '<!DOCTYPE html><html lang="ja"><head><meta charset="UTF-8" />' +
        '<title>' + escapeHtml(checklist.title || '') + '</title>' +
        '<style>' + styleCss + '</style></head><body>' + body + '</body></html>';
      return { html, meta };
    }
    async function saveDocxViaElectron(checklist) {
      if (!window.docxAPI || !window.docxAPI.save) {
        alert('.docx 出力はデスクトップ版（Electron）でのみ利用できます。');
        return;
      }
      try {
        // 画像参照を dataURL に戻す（html-to-docx は実データが必要）
        checklist = await materializeChecklist(checklist);
        // 表紙有効なテンプレートは、アプリの表紙を画像化して 1 ページ目に埋め込む。
        // 画像化に失敗したら出力は中止する（簡易表紙にフォールバックしない＝仕様どおり）。
        const opts = {};
        const cover = checklist.coverPage;
        if (checklist.type === MODES.TEMPLATE && cover && cover.enabled) {
          opts.coverImage = await rasterizeCoverToPng(cover, checklist.title);
        }
        const { html, meta } = buildStaticHtmlForDocx(checklist, opts);
        const res = await window.docxAPI.save({
          title: sanitizeFilename(checklist.title || 'checklist'),
          html,
          meta,
        });
        if (res && res.error) alert('.docx の出力に失敗しました: ' + res.error);
      } catch (e) {
        alert('.docx の出力に失敗しました: ' + e.message);
      }
    }

    function utf8ToBase64(str) {
      return btoa(unescape(encodeURIComponent(str)));
    }
    function base64ToUtf8(b64) {
      return decodeURIComponent(escape(atob(b64)));
    }
    function encodeShareLink(checklist) {
      // 画像はサイズが大きく URL に載せると共有リンクが破綻するため除外する。
      // 画像も渡したい場合は JSON エクスポートを使う想定（ダイアログで案内）。
      const stripped = JSON.parse(JSON.stringify(checklist));
      let hadImages = false;
      stripped.sections.forEach((s) =>
        s.items.forEach((it) => {
          if (Array.isArray(it.images) && it.images.length) {
            hadImages = true;
            it.images = [];
          }
          delete it.imageEdits; // 編集ソース（元画像・注釈）も画像同様に巨大なので除外
        })
      );
      const payload = utf8ToBase64(JSON.stringify(stripped));
      const base = location.origin + location.pathname;
      const url = `${base}#share=${payload}`;
      return { url, length: url.length, hadImages };
    }
    function readShareFromHash(hash = location.hash) {
      const m = hash.match(/[#&]share=([^&]+)/);
      if (!m) return null;
      try {
        const checklist = JSON.parse(base64ToUtf8(m[1]));
        if (!checklist || !Array.isArray(checklist.sections)) return null;
        return checklist;
      } catch (e) {
        console.warn('共有データの解析に失敗しました:', e);
        return null;
      }
    }

    // =========================================================================
    // render — 状態から HTML 文字列を組み立てる純粋な描画関数
    // =========================================================================
    function escapeHtml(str = '') {
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }
    const modeLabel = (type) => (type === MODES.TEMPLATE ? 'テンプレート' : 'ToDo');

    function renderHome(state) {
      const { checklists } = state;
      const cards = checklists.length
        ? checklists.map((c) => renderCard(c)).join('')
        : `<p class="empty">まだチェックリストがありません。「新規作成」から始めましょう。</p>`;
      return `
        <section class="home">
          <div class="home-head">
            <h1>チェックリスト</h1>
            <div class="home-actions">
              <button class="btn primary" data-action="new">＋ 新規作成</button>
              <button class="btn" data-action="import">インポート</button>
              <button class="btn" data-action="export">エクスポート</button>
            </div>
          </div>
          <div class="cards">${cards}</div>
        </section>`;
    }
    function renderCard(c) {
      const p = progress(c);
      return `
        <article class="card" data-id="${c.id}">
          <button class="card-open" data-action="open" data-id="${c.id}">
            <span class="badge ${c.type}">${modeLabel(c.type)}</span>
            <h2>${escapeHtml(c.title)}</h2>
            <div class="progress"><div class="progress-bar" style="width:${p.percent}%"></div></div>
            <small>${p.done} / ${p.total} 完了（${p.percent}%）</small>
          </button>
          <div class="card-tools">
            <button class="icon" title="複製" data-action="duplicate" data-id="${c.id}">⧉</button>
            <button class="icon" title="名前変更" data-action="rename" data-id="${c.id}">✎</button>
            <button class="icon danger" title="削除" data-action="delete" data-id="${c.id}">🗑</button>
          </div>
        </article>`;
    }
    function renderEditor(checklist) {
      const p = progress(checklist);
      const isTemplate = checklist.type === MODES.TEMPLATE;
      // テンプレート型はセクションをまたいで手順を連番(1..N)で振る
      let stepNo = 0;
      const sections = checklist.sections
        .map((s, idx) => {
          const html = renderSection(s, p.sections[idx], checklist.type, stepNo);
          stepNo += s.items.length;
          return html;
        })
        .join('');
      const totalMin = isTemplate
        ? checklist.sections.reduce((a, s) => a + sumMinutes(s.items), 0)
        : 0;
      const timeNote = isTemplate && totalMin ? ` ・ 総所要 約${totalMin}分` : '';
      return `
        <section class="editor ${isTemplate ? 'is-template' : 'is-todo'}" data-id="${checklist.id}">
          <div class="editor-head">
            <button class="btn" data-action="home">← 一覧</button>
            <input class="title-input" data-action="edit-title"
                   value="${escapeHtml(checklist.title)}" aria-label="タイトル" />
            <span class="badge ${checklist.type}">${modeLabel(checklist.type)}</span>
          </div>
          <div class="editor-progress">
            <div class="progress"><div class="progress-bar" style="width:${p.percent}%"></div></div>
            <small>${p.done} / ${p.total} 完了（${p.percent}%）${timeNote}</small>
          </div>
          <div class="editor-toolbar">
            <button class="btn" data-action="add-section">＋ ${isTemplate ? 'フェーズ' : 'セクション'}</button>
            ${
              isTemplate
                ? `<button class="btn" data-action="reset">↺ 一括リセット</button>
                   <button class="btn" data-action="cover">🪧 表紙</button>`
                : `<button class="btn" data-action="clear-completed">完了を削除</button>`
            }
            <button class="btn" data-action="share">🔗 共有リンク</button>
            <button class="btn" data-action="print">🖨 印刷 / PDF</button>
            <button class="btn" data-action="save-html">💾 ${IS_STANDALONE ? '保存（HTML）' : '名前を付けて保存 (HTML)'}</button>
            ${window.docxAPI ? '<button class="btn" data-action="save-docx">📄 Word (.docx)</button>' : ''}
          </div>
          ${
            isTemplate && checklist.coverPage && checklist.coverPage.enabled
              ? `<div class="cover-card">
                   <div class="cover-card-head"><strong>🪧 表紙</strong>
                     <button class="btn" data-action="cover">表紙を編集</button></div>
                   <div class="cover-stage cover-stage--card">${renderCoverHtml(checklist.coverPage, checklist.title)}</div>
                 </div>`
              : ''
          }
          <div class="sections">${sections}</div>
        </section>`;
    }
    // type/startNo を受け取り、テンプレート時は手順タイムライン、ToDo時は通常リストを描く
    function renderSection(section, prog, type, startNo) {
      const isTemplate = type === MODES.TEMPLATE;
      const items = isTemplate
        ? section.items.map((it, i) => renderStep(section.id, it, startNo + i + 1)).join('')
        : section.items.map((it) => renderItem(section.id, it)).join('');
      const mins = isTemplate ? sumMinutes(section.items) : 0;
      const meta = `${prog.done}/${prog.total}${mins ? ` ・⏱${mins}分` : ''}`;
      return `
        <div class="section" data-section="${section.id}" draggable="false">
          <div class="section-head" data-drag="section">
            <span class="grip" title="ドラッグで並べ替え">⠿</span>
            <input class="section-title" data-action="edit-section" data-section="${section.id}"
                   placeholder="${isTemplate ? 'フェーズ名（任意）' : 'セクション名（任意）'}"
                   value="${escapeHtml(section.title)}" />
            <small class="section-progress">${meta}</small>
            <button class="icon add" title="${isTemplate ? '手順を追加' : '項目を追加'}"
                    data-action="add-item-btn" data-section="${section.id}">＋</button>
            <button class="icon danger" title="削除"
                    data-action="delete-section" data-section="${section.id}">🗑</button>
          </div>
          <ul class="items ${isTemplate ? 'steps' : ''}" data-section="${section.id}">${items}</ul>
        </div>`;
    }
    // 項目に添付された画像のサムネイル列 ＋「画像を追加」ボタン。
    // サムネイルのクリックでペイント編集を開く。複数枚に対応。
    function renderImages(sectionId, item, large) {
      const imgs = Array.isArray(item.images) ? item.images : [];
      const thumbs = imgs
        .map(
          (src, idx) => `
          <span class="thumb-wrap">
            <img class="thumb" src="${resolveImageSync(src)}"${isImgRef(src) ? ` data-img-ref="${src}"` : ''}
                 alt="添付画像 ${idx + 1}" draggable="false"
                 data-action="edit-image" data-section="${sectionId}"
                 data-item="${item.id}" data-index="${idx}" title="クリックで編集" />
            <button class="thumb-del" title="画像を削除" data-action="delete-image"
                    data-section="${sectionId}" data-item="${item.id}" data-index="${idx}">✕</button>
          </span>`
        )
        .join('');
      return `
        <div class="item-images${large ? ' is-large' : ''}" data-section="${sectionId}" data-item="${item.id}">
          ${thumbs}
          <button class="add-image" data-action="add-image"
                  data-section="${sectionId}" data-item="${item.id}"
                  title="画像を貼り付け／選択して追加">🖼 画像</button>
        </div>`;
    }
    // ToDo型の項目
    function renderItem(sectionId, item) {
      return `
        <li class="item ${item.done ? 'done' : ''}" data-item="${item.id}"
            data-section="${sectionId}" data-drag="item">
          <span class="grip" title="ドラッグで並べ替え">⠿</span>
          <input type="checkbox" ${item.done ? 'checked' : ''}
                 data-action="toggle" data-section="${sectionId}" data-item="${item.id}" />
          <input class="item-text" data-action="edit-item"
                 data-section="${sectionId}" data-item="${item.id}"
                 value="${escapeHtml(item.text)}" />
          <button class="icon" title="上へ移動"
                  data-action="move-item-up" data-section="${sectionId}" data-item="${item.id}">↑</button>
          <button class="icon" title="下へ移動"
                  data-action="move-item-down" data-section="${sectionId}" data-item="${item.id}">↓</button>
          <button class="icon danger" title="削除"
                  data-action="delete-item" data-section="${sectionId}" data-item="${item.id}">✕</button>
          ${renderImages(sectionId, item)}
          <button class="insert-after" data-action="insert-item-after"
                  data-section="${sectionId}" data-item="${item.id}"
                  title="この下に項目を追加">＋ ここに追加</button>
        </li>`;
    }
    // テンプレート型の手順ステップ（番号バッジ＋連結線＋メモ＋所要時間）
    function renderStep(sectionId, item, no) {
      const note = item.note || '';
      const time = item.time || '';
      return `
        <li class="item step ${item.done ? 'done' : ''}" data-item="${item.id}"
            data-section="${sectionId}" data-drag="item">
          <div class="step-rail" title="ドラッグで並べ替え">
            <span class="step-badge">${no}</span>
            <span class="step-line"></span>
          </div>
          <div class="step-body">
            <div class="step-main">
              <input type="checkbox" ${item.done ? 'checked' : ''}
                     data-action="toggle" data-section="${sectionId}" data-item="${item.id}" />
              <input class="item-text step-text" data-action="edit-item"
                     data-section="${sectionId}" data-item="${item.id}"
                     placeholder="手順の内容" value="${escapeHtml(item.text)}" />
              <span class="step-time">
                <input class="step-time-input" data-action="edit-time" inputmode="numeric"
                       data-section="${sectionId}" data-item="${item.id}"
                       placeholder="–" aria-label="所要時間（分）" value="${escapeHtml(time)}" />
                <span class="unit">分</span>
              </span>
              <button class="icon" title="上へ移動"
                      data-action="move-item-up" data-section="${sectionId}" data-item="${item.id}">↑</button>
              <button class="icon" title="下へ移動"
                      data-action="move-item-down" data-section="${sectionId}" data-item="${item.id}">↓</button>
              <button class="icon danger" title="削除"
                      data-action="delete-item" data-section="${sectionId}" data-item="${item.id}">✕</button>
            </div>
            ${renderRichBody(sectionId, item)}
            <input class="step-note-input" data-action="edit-note"
                   data-section="${sectionId}" data-item="${item.id}"
                   placeholder="メモ（任意）" value="${escapeHtml(note)}" />
            ${renderImages(sectionId, item, true)}
          </div>
          <button class="insert-after" data-action="insert-item-after"
                  data-section="${sectionId}" data-item="${item.id}"
                  title="この下に手順を追加">＋ ここに追加</button>
        </li>`;
    }
    // 手順の「リッチ本文」: 書式付きテキスト＋表を編集できる contenteditable 領域。
    // ツールバーはフォーカス時のみ表示。保存はフォーカスアウト時に sanitize して commit。
    function renderRichBody(sectionId, item) {
      const body = sanitizeBodyHtml(item.body || '');
      return `
        <div class="rb" draggable="false">
          <div class="rb-toolbar">
            <button type="button" class="rb-btn" data-rb-cmd="bold" title="太字"><b>B</b></button>
            <button type="button" class="rb-btn" data-rb-cmd="italic" title="斜体"><i>I</i></button>
            <button type="button" class="rb-btn" data-rb-cmd="underline" title="下線"><u>U</u></button>
            <button type="button" class="rb-btn" data-rb-cmd="strikeThrough" title="取消線"><s>S</s></button>
            <span class="rb-sizebox" title="文字サイズ（pt）">
              <input type="text" class="rb-size-in" data-rb-size inputmode="decimal" aria-label="文字サイズ（pt）" />
              <button type="button" class="rb-size-dd" data-rb-size-dd tabindex="-1" title="サイズ一覧">▾</button>
            </span>
            <button type="button" class="rb-btn" data-rb-size-step="up" title="文字を大きく">A˄</button>
            <button type="button" class="rb-btn" data-rb-size-step="down" title="文字を小さく">A˅</button>
            <span class="rb-sep"></span>
            <button type="button" class="rb-btn" data-rb-cmd="foreColor" title="文字色">A<span class="rb-swatch"></span></button>
            <button type="button" class="rb-btn" data-rb-cmd="hiliteColor" title="ハイライト（文字）"><span class="rb-swatch-hl">H</span></button>
            <button type="button" class="rb-btn" data-rb-cmd="cellFill" title="セル塗りつぶし">🪣</button>
            <span class="rb-sep"></span>
            <button type="button" class="rb-btn" data-rb-cmd="insertUnorderedList" title="箇条書き">•≡</button>
            <button type="button" class="rb-btn" data-rb-cmd="insertOrderedList" title="番号付きリスト">1.≡</button>
            <button type="button" class="rb-btn rb-ins-table" data-rb-cmd="insertTable" title="表を挿入">▦ 表</button>
          </div>
          <div class="rb-body" contenteditable="true" data-rb-edit
               data-section="${sectionId}" data-item="${item.id}"
               data-placeholder="本文（任意）。書式や表を使えます">${body}</div>
        </div>`;
    }

    // =========================================================================
    // richbody — 手順本文のサニタイズ・表操作・編集ツールバー
    // =========================================================================
    const RB_ALLOWED_TAGS = new Set(['P','BR','STRONG','B','EM','I','U','S','STRIKE','SPAN','UL','OL','LI','TABLE','THEAD','TBODY','TR','TH','TD','DIV']);
    const RB_COLOR_RE = /^(#[0-9a-fA-F]{3,8}|rgb\(\s*\d{1,3}\s*,\s*\d{1,3}\s*,\s*\d{1,3}\s*\)|rgba\(\s*\d{1,3}\s*,\s*\d{1,3}\s*,\s*\d{1,3}\s*,\s*(0|1|0?\.\d+)\s*\)|transparent|[a-zA-Z]{3,20})$/;
    const RB_ALIGN_RE = /^(left|right|center|justify)$/i;
    // ---- Word/Excel 風の文字サイズ一覧 ----
    // コンボの▾一覧と A˄/A˅（拡大/縮小）ボタンで使う。A˄/A˅ は Word の
    // 「フォントサイズの拡大/縮小」と同じく一覧上の次/前のサイズへ移動する。
    // 単位は本文編集=pt（Word標準の並び）、画像編集=px で別々に持つ（変換はしない）。
    const RB_FONT_SIZES_PT = [8, 9, 10, 10.5, 11, 12, 14, 16, 18, 20, 22, 24, 26, 28, 36, 48, 72];
    const IE_FONT_SIZES_PX = [10, 12, 14, 16, 20, 24, 28, 32, 40, 48, 64, 80, 96, 128, 160, 200];
    function nextFontSize(list, cur) {
      for (const v of list) if (v > cur) return v;
      return list[list.length - 1];
    }
    function prevFontSize(list, cur) {
      for (let i = list.length - 1; i >= 0; i--) if (list[i] < cur) return list[i];
      return list[0];
    }
    // サイズ一覧メニュー（rb-palette の枠で開く縦リスト）。op-swatch と同じく
    // mousedown で確定して本文の選択範囲・フォーカスを奪わない。
    function buildSizeMenu(sizes, current, onPick) {
      const menu = document.createElement('div');
      menu.className = 'op-sizes';
      sizes.forEach((v) => {
        const b = document.createElement('button');
        b.type = 'button';
        b.className = 'op-size' + (current !== null && Math.abs(v - current) < 0.26 ? ' active' : '');
        b.textContent = String(v);
        b.addEventListener('mousedown', (e) => { e.preventDefault(); onPick(v); });
        menu.appendChild(b);
      });
      return menu;
    }
    // ---- Excel/Office 風カラーパレット ----
    // 「テーマの色（10色）＋各列の濃淡5段」「標準の色」「塗りつぶしなし」「その他の色」
    // で構成する（Office アプリの色選択と同じ構造）。文字色・ハイライト・セル塗り・
    // 画像編集の色選択で共通に使う。
    const OP_THEME = ['#FFFFFF', '#000000', '#E7E6E6', '#44546A', '#4472C4', '#ED7D31', '#A5A5A5', '#FFC000', '#5B9BD5', '#70AD47'];
    const OP_STANDARD = ['#C00000', '#FF0000', '#FFC000', '#FFFF00', '#92D050', '#00B050', '#00B0F0', '#0070C0', '#002060', '#7030A0'];
    // t>0: 白へ近づける（明るく） / t<0: 黒へ近づける（暗く）
    function opTint(hex, t) {
      const n = parseInt(hex.slice(1), 16);
      const ch = (v) => Math.max(0, Math.min(255, Math.round(t >= 0 ? v + (255 - v) * t : v * (1 + t))));
      const r = ch((n >> 16) & 255), g = ch((n >> 8) & 255), b = ch(n & 255);
      return '#' + ((1 << 24) | (r << 16) | (g << 8) | b).toString(16).slice(1).toUpperCase();
    }
    // テーマ各列の濃淡5段（Excel と同じく、列の明るさで段の作り方が変わる）
    function opVariants(hex, col) {
      const steps =
        col === 0 ? [-0.05, -0.15, -0.25, -0.35, -0.5]   // 白: 暗く
        : col === 1 ? [0.5, 0.35, 0.25, 0.15, 0.05]      // 黒: 明るく
        : col === 2 ? [-0.1, -0.25, -0.5, -0.75, -0.9]   // 薄い灰: 暗く
        : [0.8, 0.6, 0.4, -0.25, -0.5];                  // 他: 明3段＋暗2段
      return steps.map((t) => opTint(hex, t));
    }
    // パレット DOM を組み立てる。onPick(色 or 'none') → onClose() の順で呼ぶ。
    function buildOfficePalette({ withNone, onPick, onClose }) {
      const pal = document.createElement('div');
      const pick = (col) => { onPick(col); onClose(); };
      const swatchRow = (colors, parent) => {
        const row = document.createElement('div');
        row.className = 'op-row';
        colors.forEach((col) => {
          const b = document.createElement('button');
          b.type = 'button'; b.className = 'op-swatch'; b.style.background = col; b.title = col;
          b.addEventListener('mousedown', (e) => { e.preventDefault(); pick(col); });
          row.appendChild(b);
        });
        parent.appendChild(row);
      };
      const title = (text) => {
        const t = document.createElement('div');
        t.className = 'op-title'; t.textContent = text;
        pal.appendChild(t);
      };
      title('テーマの色');
      swatchRow(OP_THEME, pal);
      const varRows = [0, 1, 2, 3, 4].map((r) => OP_THEME.map((c, colIdx) => opVariants(c, colIdx)[r]));
      const vars = document.createElement('div');
      vars.className = 'op-vars';
      varRows.forEach((row) => swatchRow(row, vars));
      pal.appendChild(vars);
      title('標準の色');
      swatchRow(OP_STANDARD, pal);
      const footer = document.createElement('div');
      footer.className = 'op-footer';
      if (withNone) {
        const b = document.createElement('button');
        b.type = 'button'; b.className = 'op-none'; b.textContent = '塗りつぶしなし';
        b.addEventListener('mousedown', (e) => { e.preventDefault(); pick('none'); });
        footer.appendChild(b);
      }
      const more = document.createElement('button');
      more.type = 'button'; more.className = 'op-more'; more.textContent = '🎨 その他の色…';
      const inp = document.createElement('input');
      inp.type = 'color'; inp.hidden = true;
      let savedRange = null;
      more.addEventListener('mousedown', (e) => {
        e.preventDefault();
        // ネイティブの色ダイアログでフォーカスが移っても、本文の選択範囲へ
        // 適用できるよう、開く直前の選択を保存しておく。
        const sel = window.getSelection();
        savedRange = sel && sel.rangeCount ? sel.getRangeAt(0).cloneRange() : null;
        inp.click();
      });
      inp.addEventListener('change', () => {
        if (savedRange) {
          const sel = window.getSelection();
          try { sel.removeAllRanges(); sel.addRange(savedRange); } catch (_) { /* noop */ }
        }
        pick(inp.value);
      });
      footer.appendChild(more);
      footer.appendChild(inp);
      pal.appendChild(footer);
      return pal;
    }

    const RB_SIZE_RE = /^\d+(\.\d+)?(px|%)$/; // 表リサイズの保存単位。pt を通さない（Excel 貼り付けのゴミ幅対策）

    // ---- 編集（commit / コマンド / 表操作 / 行列コントロール / 色パレット） ----
    function rbItemBody(checklistId, sectionId, itemId) {

        r.insertBefore(c, r.children[idx] || null);

      const tbody = table.tBodies[0] || table.createTBody();
      const tr = document.createElement('tr');
      for (let i = 0; i < cols; i++) { const td = document.createElement('td'); td.innerHTML = '<br>'; tr.appendChild(td); }
      tbody.insertBefore(tr, beforeTr && beforeTr.parentElement === tbody ? beforeTr : null);

    function rbStartResize(zone, e) {

    // 文字サイズ（pt）を選択範囲へ適用する。execCommand('fontSize', 7) で一旦
