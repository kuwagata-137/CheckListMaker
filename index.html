<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CheckListMaker</title>
  <link rel="icon"
        href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'%3E%3Ctext y='14' font-size='14'%3E%E2%9C%93%3C/text%3E%3C/svg%3E" />
  <style>
  /* テーマ変数・レイアウト・ダーク対応・印刷向け簡易調整。
     外部依存なし。色は CSS カスタムプロパティで一元管理する。 */
  /* 方向D（プロ/ダッシュボード）— スレート系・アクセント青1色。
     影は「やや強め」の多層ソフトシャドウで、面が背景から浮くように見せる。 */
  :root {
    --bg: #eef1f5;
    --surface: #ffffff;
    --surface-2: #eff2f6;
    --text: #1c2430;
    --muted: #5f6b7a;
    --border: #dfe3e8;
    --border-strong: #c4cbd3;
    --primary: #2f6feb;
    --primary-text: #ffffff;
    --danger: #dc2626;
    --accent: #2f6feb;
    --radius: 10px;
    --shadow: 0 2px 4px rgba(16, 24, 40, 0.06), 0 10px 24px rgba(16, 24, 40, 0.12);
    --shadow-hover: 0 6px 14px rgba(16, 24, 40, 0.10), 0 18px 38px rgba(16, 24, 40, 0.17);
    --shadow-item: 0 2px 8px rgba(16, 24, 40, 0.12);
    --topbar-shadow: 0 1px 0 var(--border), 0 4px 10px rgba(16, 24, 40, 0.06);
  }
  /* 手動ダーク（GitHub Dark 系） */
  :root[data-theme='dark'] {
    --bg: #0d1117;
    --surface: #161b22;
    --surface-2: #1b2129;
    --text: #e6edf3;
    --muted: #8b949e;
    --border: #2a303a;
    --border-strong: #3a424e;
    --primary: #4a8dff;
    --accent: #4a8dff;
    --shadow: 0 2px 5px rgba(0, 0, 0, 0.5), 0 14px 30px rgba(0, 0, 0, 0.55);
    --shadow-hover: 0 8px 18px rgba(0, 0, 0, 0.5), 0 22px 44px rgba(0, 0, 0, 0.62);
    --shadow-item: 0 3px 10px rgba(0, 0, 0, 0.55);
    --topbar-shadow: 0 1px 0 var(--border), 0 4px 12px rgba(0, 0, 0, 0.5);
  }
  /* 自動（OS設定に追従。data-theme 未指定時のみ） */
  @media (prefers-color-scheme: dark) {
    :root:not([data-theme]) {
      --bg: #0d1117;
      --surface: #161b22;
      --surface-2: #1b2129;
      --text: #e6edf3;
      --muted: #8b949e;
      --border: #2a303a;
      --border-strong: #3a424e;
      --primary: #4a8dff;
      --accent: #4a8dff;
      --shadow: 0 2px 5px rgba(0, 0, 0, 0.5), 0 14px 30px rgba(0, 0, 0, 0.55);
      --shadow-hover: 0 8px 18px rgba(0, 0, 0, 0.5), 0 22px 44px rgba(0, 0, 0, 0.62);
      --shadow-item: 0 3px 10px rgba(0, 0, 0, 0.55);
      --topbar-shadow: 0 1px 0 var(--border), 0 4px 12px rgba(0, 0, 0, 0.5);
    }
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    font-family: system-ui, -apple-system, 'Segoe UI', 'Hiragino Sans', Meiryo, sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.5;
  }

  /* ---- トップバー ---- */
  #topbar {
    position: sticky;
    top: 0;
    z-index: 10;
    display: flex;
    align-items: center;
    gap: 4px;
    padding: 8px 14px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    box-shadow: var(--topbar-shadow);
  }
  .topbar-brand { font-weight: 700; letter-spacing: -0.01em; }
  .topbar-spacer { flex: 1; }

  #app {
    max-width: 880px;
    margin: 0 auto;
    padding: 20px 16px 60px;
  }

  /* ---- ボタン類 ---- */
  .btn {
    font: inherit;
    padding: 7px 14px;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    background: var(--surface);
    color: var(--text);
    cursor: pointer;
    transition: background 0.15s ease, box-shadow 0.15s ease, border-color 0.15s ease;
  }
  .btn:hover { background: var(--surface-2); }
  .btn.primary {
    background: var(--primary);
    color: var(--primary-text);
    border-color: var(--primary);
    box-shadow: 0 1px 2px rgba(16, 24, 40, 0.12), 0 2px 8px color-mix(in srgb, var(--primary) 30%, transparent);
  }
  .btn.primary:hover { background: color-mix(in srgb, var(--primary) 88%, #000); }
  .btn:focus-visible, .icon:focus-visible {
    outline: 2px solid var(--primary);
    outline-offset: 2px;
  }
  .icon {
    font: inherit;
    background: transparent;
    border: none;
    cursor: pointer;
    color: var(--muted);
    padding: 4px 7px;
    border-radius: 8px;
    font-size: 1rem;
  }
  .icon:hover { background: var(--surface-2); color: var(--text); }
  .icon:disabled { opacity: 0.35; cursor: default; }
  .icon.danger:hover { color: var(--danger); }
  /* 録画ボタン: 黒い四角の中心に赤い丸のアイコン（一般的な録画マーク）。 */
  .icon .rec-ico { display: block; }
  .icon.recording { animation: rec-blink 1.4s infinite; }
  @keyframes rec-blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.35; } }

  /* ---- ホーム ---- */
  .home-head {
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 12px;
    margin-bottom: 18px;
  }
  .home-head h1 { margin: 0; font-size: 1.6rem; }
  .home-actions { display: flex; gap: 8px; flex-wrap: wrap; }

  .cards {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
    gap: 14px;
  }
  .empty { color: var(--muted); }

  .card {
    position: relative;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    overflow: hidden;
    transition: box-shadow 0.18s ease, transform 0.18s ease;
  }
  .card:hover { box-shadow: var(--shadow-hover); transform: translateY(-2px); }
  .card-open {
    display: block;
    width: 100%;
    text-align: left;
    background: none;
    border: none;
    cursor: pointer;
    color: inherit;
    font: inherit;
    padding: 14px 14px 10px;
  }
  .card-open h2 { margin: 6px 0 10px; font-size: 1.1rem; }
  .card-tools {
    display: flex;
    justify-content: flex-end;
    gap: 2px;
    padding: 4px 8px 8px;
    border-top: 1px solid var(--border);
  }

  .badge {
    display: inline-block;
    font-size: 0.72rem;
    padding: 2px 8px;
    border-radius: 999px;
    background: var(--surface-2);
    color: var(--muted);
  }
  .badge.template { background: #ede9fe; color: #6d28d9; }
  .badge.todo { background: #dbeafe; color: #1d4ed8; }
  :root[data-theme='dark'] .badge.template { background: #3b2f5e; color: #c4b5fd; }
  :root[data-theme='dark'] .badge.todo { background: #1e3a5f; color: #93c5fd; }

  /* ---- 進捗バー ---- */
  .progress {
    height: 8px;
    background: var(--surface-2);
    border-radius: 999px;
    overflow: hidden;
    box-shadow: inset 0 1px 2px rgba(16, 24, 40, 0.10);
  }
  .progress-bar {
    height: 100%;
    background: var(--accent);
    border-radius: 999px;
    box-shadow: 0 1px 3px color-mix(in srgb, var(--accent) 55%, transparent);
    transition: width 0.2s ease;
  }

  /* ---- エディタ ---- */
  .editor-head {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 12px;
    flex-wrap: wrap;
  }
  .title-input {
    flex: 1;
    min-width: 160px;
    font-size: 1.3rem;
    font-weight: 700;
    padding: 4px 8px;
    border: 1px solid transparent;
    border-radius: 8px;
    background: transparent;
    color: var(--text);
  }
  .title-input:focus { border-color: var(--border); background: var(--surface); outline: none; }

  .editor-progress { margin-bottom: 14px; }
  .editor-progress small { color: var(--muted); }

  .editor-toolbar {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    margin-bottom: 18px;
  }

  /* セクション */
  .section {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    margin-bottom: 16px;
    box-shadow: var(--shadow);
    transition: box-shadow 0.18s ease;
  }
  .section-head {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 10px 12px;
    border-bottom: 1px solid var(--border);
    cursor: grab;
  }
  .section-title {
    flex: 1;
    font-weight: 600;
    font-size: 1rem;
    border: 1px solid transparent;
    border-radius: 6px;
    background: transparent;
    color: var(--text);
    padding: 3px 6px;
  }
  .section-title:focus { border-color: var(--border); background: var(--bg); outline: none; }
  .section-progress { color: var(--muted); white-space: nowrap; }

  .grip { color: var(--muted); cursor: grab; user-select: none; }

  .items { list-style: none; margin: 0; padding: 6px 8px; }
  .item {
    display: flex;
    align-items: center;
    flex-wrap: wrap;
    gap: 8px;
    padding: 4px 6px;
    border-radius: 8px;
    transition: background 0.15s ease, box-shadow 0.15s ease, transform 0.15s ease;
  }
  /* 項目ホバー時のリフト（背景＋影＋わずかな浮き上がり）。
     テンプレート手順(.item.step)は grid レイアウトのため下で無効化する。 */
  .item:hover {
    background: var(--surface);
    box-shadow: var(--shadow-item);
    transform: translateY(-1px);
    position: relative;
    z-index: 1;
  }

  /* 行ホバー時に出る「ここに追加」ボタン。
     手順・項目の途中に空項目を挿入するためのもの（末尾追加はセクションバーの＋）。
     手順と手順の間にマウスカーソルがある時だけ出したいので :hover のみで表示する
     （:focus-within だと編集中ずっと出っぱなしになるため使わない）。 */
  .insert-after {
    display: none;
    font: inherit;
    font-size: 0.8rem;
    color: var(--primary);
    background: transparent;
    border: 1px dashed var(--border);
    border-radius: 6px;
    padding: 1px 10px;
    margin-top: 2px;
    cursor: pointer;
  }
  .insert-after:hover { background: var(--surface-2); border-color: var(--primary); }
  .item:hover > .insert-after { display: inline-block; }
  /* ToDo項目（flex）は独立行に折り返す */
  .item > .insert-after { flex-basis: 100%; margin-left: 26px; }
  /* テンプレート手順（grid）は両カラムをまたいで本文の下に置く */
  .step > .insert-after { grid-column: 1 / -1; justify-self: start; margin-left: 40px; }
  .item.done .item-text { text-decoration: line-through; color: var(--muted); }
  .item-text {
    flex: 1;
    border: 1px solid transparent;
    border-radius: 6px;
    background: transparent;
    color: var(--text);
    font: inherit;
    padding: 3px 6px;
  }
  .item-text:focus { border-color: var(--border); background: var(--surface); outline: none; }
  .item input[type='checkbox'] { width: 18px; height: 18px; cursor: pointer; accent-color: var(--primary); }

  /* セクションバーの「＋」追加ボタン */
  .icon.add {
    font-weight: 700;
    color: var(--primary);
    font-size: 1.15rem;
    line-height: 1;
  }
  .icon.add:hover { background: var(--primary); color: var(--primary-text); }

  /* 空セクションの余白（項目ゼロでもバーがつぶれないように） */
  .items:empty { padding: 2px 8px; }
  .items.steps:empty::after {
    content: '右上の ＋ から手順を追加';
    display: block;
    color: var(--muted);
    font-size: 0.85rem;
    padding: 6px 8px 10px 8px;
  }

  /* ---- テンプレート型：番号付きタイムライン手順 ---- */
  .items.steps { padding: 8px 12px 12px; }
  .step {
    display: grid;
    grid-template-columns: 30px 1fr;
    gap: 10px;
    align-items: stretch;
    padding: 0;
  }
  .step:hover { background: transparent; box-shadow: none; transform: none; }
  .step-rail {
    display: flex;
    flex-direction: column;
    align-items: center;
    cursor: grab;
  }
  .step-badge {
    width: 28px;
    height: 28px;
    flex: 0 0 auto;
    border-radius: 50%;
    border: 1px solid var(--border);
    background: var(--surface-2);
    color: var(--muted);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.85rem;
    font-weight: 700;
  }
  .step.done .step-badge {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
  }
  .step-line {
    flex: 1 1 auto;
    width: 2px;
    background: var(--border);
    margin: 4px 0 0;
    min-height: 6px;
  }
  .step:last-child .step-line { display: none; }
  .step-body { padding-bottom: 12px; min-width: 0; }
  .step-main { display: flex; align-items: center; gap: 8px; }
  .step-text { flex: 1; font-weight: 600; }
  .step.done .step-text { text-decoration: line-through; color: var(--muted); font-weight: 500; }
  .step-time { display: inline-flex; align-items: center; gap: 2px; color: var(--muted); white-space: nowrap; }
  .step-time-input {
    width: 38px;
    text-align: right;
    border: 1px solid transparent;
    border-radius: 6px;
    background: transparent;
    color: var(--text);
    font: inherit;
    padding: 3px 4px;
  }
  .step-time-input:focus { border-color: var(--border); background: var(--surface); outline: none; }
  .step-time .unit { font-size: 0.8rem; }
  .step-note-input {
    width: 100%;
    margin-top: 2px;
    border: 1px solid transparent;
    border-radius: 6px;
    background: transparent;
    color: var(--muted);
    font: inherit;
    font-size: 0.85rem;
    padding: 2px 6px;
  }
  .step-note-input::placeholder { color: var(--muted); opacity: 0.6; }
  .step-note-input:focus { border-color: var(--border); background: var(--surface); color: var(--text); outline: none; }

  /* ---- 添付画像（スクリーンショット注釈）のサムネイル ---- */
  .item-images {
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    gap: 6px;
    margin-top: 4px;
  }
  /* ToDo項目（flexの.item直下）は画像列を独立行に折り返す */
  .item > .item-images { flex-basis: 100%; margin-left: 26px; }
  .thumb-wrap { position: relative; display: inline-flex; }
  .thumb {
    height: 56px;
    max-width: 120px;
    object-fit: cover;
    border: 1px solid var(--border);
    border-radius: 8px;
    cursor: pointer;
    display: block;
  }
  .thumb:hover { border-color: var(--primary); }
  .thumb-del {
    position: absolute;
    top: -6px;
    right: -6px;
    width: 18px;
    height: 18px;
    line-height: 1;
    padding: 0;
    border: none;
    border-radius: 50%;
    background: var(--danger, #e5484d);
    color: #fff;
    font-size: 0.7rem;
    cursor: pointer;
    display: none;
  }
  .thumb-wrap:hover .thumb-del { display: block; }
  .add-image {
    font: inherit;
    font-size: 0.8rem;
    color: var(--primary);
    background: transparent;
    border: 1px dashed var(--border);
    border-radius: 8px;
    padding: 4px 10px;
    cursor: pointer;
  }
  .add-image:hover { background: var(--surface-2); border-color: var(--primary); }
  /* 手順に組み込んだ画像は手順そのものの説明なので、手順欄の幅いっぱいに大きく見せる。
     （サムネイルではなく原寸に近い表示。クリックで編集できる点は同じ。） */
  .item-images.is-large {
    flex-direction: column;
    align-items: stretch;
    gap: 10px;
  }
  .item-images.is-large .thumb-wrap { display: block; width: 100%; }
  .item-images.is-large .thumb {
    width: 100%;
    height: auto;
    max-width: 100%;
    max-height: 70vh;
    object-fit: contain;
  }
  .item-images.is-large .thumb-del { top: 4px; right: 4px; }
  .item-images.is-large .add-image { align-self: flex-start; }

  /* ---- 画像ペイントエディタ ---- */
  /* 画像編集はできるだけ広い面積で行いたいので、モーダルは画面いっぱい近くまで広げる。
     基底の .modal が後方で max-width:460px / width:100% を指定するため、
     同等以上の詳細度（.modal.img-editor）で確実に上書きする。 */
  /* ウインドウは固定サイズ（高さ 92vh）。ズームで大きさは変わらない。幅はビューポートの
     余白（modal-overlay の padding 16px×2）を差し引いてはみ出さないようにする。
     全体を flex 縦積みにして、ツールバー/操作列は自然な高さ、キャンバス枠が残りを埋める。 */
  .modal.img-editor {
    max-width: min(1500px, calc(100vw - 32px));
    width: 100%;
    height: 92vh;
    display: flex;
    flex-direction: column;
    padding: 16px;
  }
  .ie-toolbar {
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    gap: 10px;
    margin-bottom: 12px;
  }
  .ie-tools { display: inline-flex; flex-wrap: wrap; gap: 4px; }
  /* 編集中だけ対象画像を拡大縮小する表示用ズーム（仕上がり＝保存内容には影響しない）。 */
  .ie-zoom { display: inline-flex; align-items: center; gap: 6px; font-size: 0.85rem; color: var(--muted); }
  .ie-zoom input[type="range"] { width: 130px; vertical-align: middle; }
  .ie-zoom .ie-zoom-num {
    width: 58px;
    font: inherit;
    text-align: right;
    padding: 4px 6px;
    border: 1px solid var(--border);
    border-radius: 8px;
    background: var(--bg);
    color: var(--text);
  }
  .ie-zoom .ie-zoom-fit {
    font: inherit;
    font-size: 0.8rem;
    padding: 4px 8px;
    border: 1px solid var(--border);
    border-radius: 8px;
    background: var(--surface);
    color: var(--text);
    cursor: pointer;
  }
  .ie-zoom .ie-zoom-fit:hover { background: var(--surface-2); }
  .ie-tool {
    width: 34px;
    height: 34px;
    border: 1px solid var(--border);
    border-radius: 8px;
    background: var(--surface);
    color: var(--text);
    font-size: 1rem;
    cursor: pointer;
  }
  .ie-tool:hover { background: var(--surface-2); }
  .ie-tool.active { background: var(--primary); color: var(--primary-text); border-color: var(--primary); }
  .ie-color input { width: 34px; height: 34px; padding: 0; border: 1px solid var(--border); border-radius: 8px; background: none; cursor: pointer; }
  .ie-size input { vertical-align: middle; }
  .ie-canvas-wrap {
    /* ウインドウ固定のもと、ここが残り高さを埋めて内部スクロールする。
       100% では画像全体がちょうど収まり（fitScale）、スクロール不要。 */
    position: relative; /* テキスト入力オーバーレイの絶対配置基準 */
    flex: 1 1 auto;
    min-height: 0;
    overflow: auto;
    background: repeating-conic-gradient(#0001 0% 25%, transparent 0% 50%) 50% / 20px 20px;
    border: 1px solid var(--border);
    border-radius: 8px;
    /* flex+justify-content:center は拡大時に左端がスクロールで届かなくなるため、
       block + margin:auto にする（収まる時は中央、はみ出す時は左端から見られる）。 */
    display: block;
    padding: 10px;
  }
  .ie-canvas {
    display: block;
    margin: 0 auto;
    max-width: 100%;
    height: auto;
    touch-action: none;
    cursor: crosshair;
  }
  .ie-canvas.tool-hand { cursor: grab; }
  .ie-canvas.tool-hand.panning { cursor: grabbing; }
  .ie-canvas.tool-crop { cursor: default; }
  /* 画像内テキストのその場入力欄（Electron は prompt 不可のため自前 UI） */
  .ie-text-input {
    position: absolute;
    z-index: 5;
    margin: 0;
    padding: 1px 3px;
    border: 1px dashed var(--primary);
    background: rgba(255, 255, 255, 0.92);
    line-height: 1.2;
    white-space: pre;
    resize: none;
    overflow: hidden;
    min-width: 40px;
    box-sizing: content-box;
  }
  /* 吹き出しの本文入力（透明背景で吹き出し本体の上に重ねる）。 */
  .ie-callout-input {
    position: absolute;
    z-index: 5;
    margin: 0;
    padding: 0;
    border: none;
    outline: none;
    background: transparent;
    line-height: 1.3;
    white-space: pre;
    resize: none;
    overflow: hidden;
    box-sizing: content-box;
    text-align: left;
  }
  .ie-crop-actions { display: inline-flex; gap: 6px; }
  .ie-crop-actions .btn { padding: 6px 10px; }
  .ie-actions { display: flex; gap: 8px; margin-top: 12px; }
  .ie-hint { font-size: 0.8rem; color: var(--muted); margin: 8px 0 0; }

  /* ドラッグ中 */
  .dragging { opacity: 0.5; }
  .drop-target { outline: 2px dashed var(--primary); outline-offset: 2px; }

  /* ---- モーダル ---- */

  .cover-stage { position: relative; overflow: hidden; width: 100%;

    color: #1f2329; font-family: system-ui, -apple-system, 'Segoe UI', 'Hiragino Sans', Meiryo, sans-serif;

  .cover--top-band { padding: 0; } .cover--top-band .band { min-height: 210px; background: var(--cover-accent); color: #fff; padding: 60px 80px; display: flex; align-items: center; }
  .cover--top-band .band .title { color: #fff; } .cover--top-band .body { padding: 60px 80px; display: grid; gap: 26px; }
  .cover--side-band { display: grid; grid-template-columns: 140px 1fr; } .cover--side-band .strip { background: var(--cover-accent); }

  .cover--framed { padding: 46px; } .cover--framed .inner { height: 100%; border: 3px solid var(--cover-accent); padding: 70px 64px; display: grid; grid-template-rows: auto 1fr auto; text-align: center; justify-items: center; gap: 20px; }
  .cover--framed .footer { align-self: end; color: #6b7280; display: grid; gap: 6px; }
  .cover--hero { padding: 80px; display: flex; flex-direction: column; } .cover--hero .title { font-size: 58px; line-height: 1.1; font-weight: 900; margin-top: auto; white-space: nowrap; }
  .cover--hero .subtitle { font-size: 24px; margin-top: 12px; } .cover--hero .accentbar { width: 160px; height: 8px; background: var(--cover-accent); margin: 28px 0; } .cover--hero .meta { margin-top: auto; display: flex; gap: 40px; }
  .cover--logo-top { padding: 90px 80px; display: grid; grid-template-rows: auto auto 1fr auto; justify-items: center; text-align: center; gap: 20px; }
  .cover--logo-top .logo { width: 150px; height: 150px; } .cover--logo-top .title { font-size: 46px; } .cover--logo-top .footer { align-self: end; color: #6b7280; display: grid; gap: 6px; }
  .cover--split { display: grid; grid-template-rows: 0.9fr 1.1fr; } .cover--split .top { background: color-mix(in srgb, var(--cover-accent) 10%, #fff); padding: 80px; display: flex; flex-direction: column; justify-content: center; gap: 16px; border-bottom: 4px solid var(--cover-accent); }
  .cover--split .top .title { font-size: 52px; } .cover--split .bottom { padding: 50px 70px; display: grid; gap: 18px; align-content: start; }
  .cover--minimal { padding: 150px 90px; display: flex; flex-direction: column; gap: 40px; } .cover--minimal .title { font-size: 52px; font-weight: 700; padding-bottom: 22px; border-bottom: 2px solid var(--cover-accent); }
  .cover--minimal .meta { display: flex; gap: 48px; color: #6b7280; } .cover--minimal .spacer { flex: 1; }
  .cover--doc-header { padding: 80px; display: flex; flex-direction: column; } .cover--doc-header .head { display: flex; justify-content: space-between; align-items: flex-start; border-bottom: 3px solid var(--cover-accent); padding-bottom: 24px; gap: 28px; }
  .cover--doc-header .head .title { font-size: 34px; max-width: 100%; white-space: nowrap; } .cover--doc-header .infobox { border: 1px solid #e2e4e9; font-size: 13px; width: 210px; flex: none; }
  .cover--doc-header .infobox div { display: flex; border-bottom: 1px solid #e2e4e9; } .cover--doc-header .infobox div:last-child { border-bottom: 0; }
  .cover--doc-header .infobox b { width: 90px; background: #fff; color: #6b7280; padding: 6px 8px; border-right: 1px solid #e2e4e9; font-weight: 600; } .cover--doc-header .infobox span { padding: 6px 8px; }
  .cover--doc-header .subtitle { margin-top: 36px; } .cover--doc-header .rev { margin-top: 30px; }

  /* エディタ先頭の表紙プレビューカード */
  .cover-card { border: 1px solid var(--border); border-radius: var(--radius); background: var(--surface); padding: 12px; margin-bottom: 14px; }

  /* 表紙編集モーダル */
  .modal.cover-editor { max-width: 1040px; width: min(1040px, 98vw); padding: 0; display: flex; flex-direction: column; max-height: 94vh; }

  .cover-editor .ce-enable { display: flex; align-items: center; gap: 10px; padding: 0 20px 12px; border-bottom: 1px solid var(--border); color: var(--text); }
  .cover-editor .ce-enable small { color: var(--muted); }
  .ce-switch { width: 40px; height: 22px; border-radius: 11px; background: var(--border); position: relative; cursor: pointer; flex: none; transition: background .15s; }

  .ce-preset { border: 2px solid var(--border); border-radius: 8px; padding: 5px; background: var(--surface); cursor: pointer; min-width: 0; }
  .ce-preset.sel { border-color: var(--cover-accent, #3b6ea5); box-shadow: 0 0 0 2px color-mix(in srgb, var(--cover-accent, #3b6ea5) 25%, #fff); }
  .ce-preset .pname { font-size: 0.6rem; text-align: center; margin-top: 4px; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .ce-preset.sel .pname { color: var(--cover-accent, #3b6ea5); font-weight: 600; }
  .ce-swatches { display: flex; gap: 10px; align-items: center; }
  .ce-swatch { width: 28px; height: 28px; border-radius: 50%; cursor: pointer; border: 2px solid var(--surface); box-shadow: 0 0 0 1px var(--border); }
  .ce-swatch.sel { box-shadow: 0 0 0 2px var(--text); }
  .ce-swatch-custom { position: relative; overflow: hidden; background: conic-gradient(red,orange,yellow,green,cyan,blue,magenta,red); }
  .ce-swatch-custom input { position: absolute; inset: -4px; opacity: 0; cursor: pointer; }
  .ce-logo-row { display: flex; align-items: center; gap: 12px; }
  .ce-logo-box { width: 60px; height: 60px; border-radius: 8px; border: 1px dashed color-mix(in srgb, var(--cover-accent, #3b6ea5) 45%, #fff); background: color-mix(in srgb, var(--cover-accent, #3b6ea5) 12%, #fff); display: flex; align-items: center; justify-content: center; overflow: hidden; font-size: 11px; color: var(--muted); flex: none; }
  .ce-logo-box img { width: 100%; height: 100%; object-fit: contain; }

  .ce-field input { font: inherit; font-size: 0.9rem; padding: 8px 10px; border: 1px solid var(--border); border-radius: 8px; background: var(--bg); color: var(--text); }
  table.ce-rev { width: 100%; border-collapse: collapse; font-size: 0.75rem; }
  table.ce-rev th { text-align: left; color: var(--muted); font-weight: 600; padding: 2px 5px; }

  .ce-preview .ce-plbl { font-size: 0.8rem; font-weight: 700; }

  .cover-editor .modal-actions { padding: 12px 20px; border-top: 1px solid var(--border); margin: 0; }
  @media (max-width: 720px) {

  /* =========================================================================
     リッチ本文（手順の本文：書式付きテキスト＋表）

  .rb-palette { position: fixed; z-index: 70; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; box-shadow: 0 6px 20px rgba(0,0,0,.18); padding: 6px; display: flex; gap: 5px; flex-wrap: wrap; width: 150px; }

  .rb-palette .rb-pal-none { width: auto; padding: 0 8px; background: var(--surface); color: var(--muted); border-style: dashed; font-size: 0.72rem; }

  .print-body { flex-basis: 100%; margin: 4px 0 2px 1.9em; font-size: 0.9rem; }

  @media print {
    #topbar, #app { display: none !important; }
