<svg xmlns="http://www.w3.org/2000/svg" width="1240" height="840" viewBox="0 0 1240 840" font-family="'Hiragino Sans','Noto Sans JP','Yu Gothic',sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f7f9fc"/><stop offset="1" stop-color="#eef2f8"/>
    </linearGradient>
    <linearGradient id="blue" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#4f86f7"/><stop offset="1" stop-color="#3a6fe0"/>
    </linearGradient>
    <linearGradient id="exe" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#2fbf71"/><stop offset="1" stop-color="#23a95f"/>
    </linearGradient>
    <filter id="sh" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="5" flood-color="#1b2a4a" flood-opacity="0.16"/>
    </filter>
    <marker id="arr" markerWidth="10" markerHeight="10" refX="6" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#b3c0d2"/>
    </marker>
  </defs>

  <rect width="1240" height="840" fill="url(#bg)"/>

  <!-- Header -->
  <text x="50" y="58" font-size="30" font-weight="700" fill="#1f2d45">CheckListMaker　.exe の作り方</text>
  <text x="50" y="90" font-size="16" fill="#5a6678">パソコン初心者向け。自分のPCで作る「方法B」を4ステップで。手早く1個だけ欲しいときは「方法A（クラウド）」。</text>

  <!-- ===== Method B header ===== -->
  <rect x="50" y="116" width="1140" height="46" rx="12" fill="url(#blue)"/>
  <text x="74" y="146" font-size="20" font-weight="700" fill="#ffffff">💻 方法B：自分の Windows PC で作る（メイン）</text>
  <text x="1166" y="146" font-size="14" fill="#dce7ff" text-anchor="end">所要：初回20〜40分</text>

  <!-- ===== 4 step cards ===== -->
  <!-- arrows between cards -->
  <g>
    <line x1="322" y1="360" x2="338" y2="360" stroke="#b3c0d2" stroke-width="3" marker-end="url(#arr)"/>
    <line x1="612" y1="360" x2="628" y2="360" stroke="#b3c0d2" stroke-width="3" marker-end="url(#arr)"/>
    <line x1="902" y1="360" x2="918" y2="360" stroke="#b3c0d2" stroke-width="3" marker-end="url(#arr)"/>
  </g>

  <!-- Card 1 -->
  <rect x="50" y="182" width="270" height="350" rx="14" fill="#ffffff" filter="url(#sh)"/>
  <circle cx="84" cy="222" r="18" fill="#3a6fe0"/><text x="84" y="228" font-size="17" font-weight="700" fill="#fff" text-anchor="middle">1</text>
  <text x="112" y="220" font-size="18" font-weight="700" fill="#1f2d45">Node.js を</text>
  <text x="112" y="242" font-size="18" font-weight="700" fill="#1f2d45">入れる</text>
  <g font-size="13.5" fill="#3a4658">
    <text x="74" y="282">• nodejs.org を開く</text>
    <text x="74" y="308">• 緑の「LTS」を入れる</text>
    <text x="74" y="334">• 「Native Modules」に✓</text>
  </g>
  <rect x="68" y="356" width="234" height="158" rx="8" fill="#f4f7fc" stroke="#dbe4f0"/>
  <rect x="84" y="372" width="202" height="24" rx="5" fill="#ffffff" stroke="#cfdae8"/>
  <text x="96" y="389" font-size="12" fill="#6b7c91">🔒 nodejs.org</text>
  <rect x="84" y="410" width="96" height="40" rx="7" fill="#2fbf71"/>
  <text x="132" y="430" font-size="12.5" font-weight="700" fill="#fff" text-anchor="middle">LTS</text>
  <text x="132" y="443" font-size="9.5" fill="#eafff1" text-anchor="middle">推奨版</text>
  <rect x="190" y="410" width="96" height="40" rx="7" fill="#ffffff" stroke="#cfdae8"/>
  <text x="238" y="434" font-size="12" fill="#9aa7b8" text-anchor="middle">Current</text>
  <rect x="84" y="462" width="202" height="38" rx="6" fill="#fff7e6" stroke="#f0dca8"/>
  <text x="96" y="479" font-size="11.5" fill="#9a7b2e">☑ Tools for Native</text>
  <text x="96" y="494" font-size="11.5" fill="#9a7b2e">　 Modules（チェック）</text>

  <!-- Card 2 -->
  <rect x="340" y="182" width="270" height="350" rx="14" fill="#ffffff" filter="url(#sh)"/>
  <circle cx="374" cy="222" r="18" fill="#3a6fe0"/><text x="374" y="228" font-size="17" font-weight="700" fill="#fff" text-anchor="middle">2</text>
  <text x="402" y="220" font-size="18" font-weight="700" fill="#1f2d45">ファイルを</text>
  <text x="402" y="242" font-size="18" font-weight="700" fill="#1f2d45">取得（ZIP）</text>
  <g font-size="13.5" fill="#3a4658">
    <text x="364" y="282">• GitHubで「&lt;&gt; Code」</text>
    <text x="364" y="308">• 「Download ZIP」</text>
    <text x="364" y="334">• 右クリックで解凍</text>
  </g>
  <rect x="358" y="356" width="234" height="158" rx="8" fill="#f4f7fc" stroke="#dbe4f0"/>
  <rect x="430" y="372" width="120" height="34" rx="7" fill="#2fbf71"/>
  <text x="490" y="394" font-size="13" font-weight="700" fill="#fff" text-anchor="middle">&lt;&gt; Code ▾</text>
  <rect x="392" y="414" width="180" height="86" rx="7" fill="#ffffff" stroke="#cfdae8"/>
  <text x="406" y="438" font-size="12" fill="#6b7c91">Clone</text>
  <line x1="392" y1="450" x2="572" y2="450" stroke="#eef2f7"/>
  <rect x="396" y="458" width="172" height="34" rx="5" fill="#eaf3ff"/>
  <text x="410" y="480" font-size="12.5" font-weight="700" fill="#3a6fe0">⬇ Download ZIP</text>

  <!-- Card 3 -->
  <rect x="630" y="182" width="270" height="350" rx="14" fill="#ffffff" filter="url(#sh)"/>
  <circle cx="664" cy="222" r="18" fill="#3a6fe0"/><text x="664" y="228" font-size="17" font-weight="700" fill="#fff" text-anchor="middle">3</text>
  <text x="692" y="220" font-size="18" font-weight="700" fill="#1f2d45">ビルドする</text>
  <text x="692" y="242" font-size="13" font-weight="400" fill="#6b7c91">2つのコマンド</text>
  <g font-size="13.5" fill="#3a4658">
    <text x="654" y="282">• フォルダでPowerShell</text>
    <text x="654" y="308">　を開く（青い画面）</text>
    <text x="654" y="334">• 下を順に実行</text>
  </g>
  <rect x="648" y="352" width="234" height="162" rx="9" fill="#1e2733"/>
  <circle cx="666" cy="370" r="4.5" fill="#ff5f56"/><circle cx="682" cy="370" r="4.5" fill="#ffbd2e"/><circle cx="698" cy="370" r="4.5" fill="#27c93f"/>
  <text x="664" y="404" font-size="13" font-family="monospace" fill="#8be9a0">$ npm install</text>
  <text x="664" y="430" font-size="13" font-family="monospace" fill="#8be9a0">$ npm run dist</text>
  <text x="664" y="462" font-size="11" font-family="monospace" fill="#9fb0c3">→ 数分待つ…</text>
  <text x="664" y="494" font-size="10.5" font-family="monospace" fill="#6b7c91"># 失敗時: npm run rebuild</text>

  <!-- Card 4 -->
  <rect x="920" y="182" width="270" height="350" rx="14" fill="#ffffff" filter="url(#sh)"/>
  <circle cx="954" cy="222" r="18" fill="#23a95f"/><text x="954" y="228" font-size="17" font-weight="700" fill="#fff" text-anchor="middle">4</text>
  <text x="982" y="220" font-size="18" font-weight="700" fill="#1f2d45">完成を確認</text>
  <g font-size="13.5" fill="#3a4658">
    <text x="944" y="282">• dist フォルダを開く</text>
    <text x="944" y="308">• 中の .exe が完成品</text>
    <text x="944" y="334">• 配るのはこれ1個だけ</text>
  </g>
  <rect x="938" y="356" width="234" height="158" rx="8" fill="#f4f7fc" stroke="#dbe4f0"/>
  <text x="958" y="384" font-size="12.5" fill="#8a97a8">📁 dist</text>
  <rect x="958" y="398" width="194" height="58" rx="8" fill="#ffffff" stroke="#bfe8cf"/>
  <text x="976" y="424" font-size="24">🖥️</text>
  <text x="1008" y="420" font-size="11.5" font-weight="700" fill="#1f2d45">CheckListMaker</text>
  <text x="1008" y="436" font-size="11.5" font-weight="700" fill="#1f2d45">Setup 1.0.0.exe</text>
  <rect x="958" y="466" width="194" height="32" rx="6" fill="#eafaf0"/>
  <text x="1055" y="486" font-size="12" font-weight="700" fill="#23a95f" text-anchor="middle">🎉 これが完成品</text>

  <!-- ===== Method A strip ===== -->
  <rect x="50" y="560" width="1140" height="118" rx="14" fill="#ffffff" filter="url(#sh)"/>
  <rect x="50" y="560" width="10" height="118" rx="5" fill="#9aa7b8"/>
  <text x="80" y="596" font-size="18" font-weight="700" fill="#1f2d45">☁ 方法A：GitHub（クラウド）で作る　— かんたん・PCに準備不要</text>
  <text x="80" y="628" font-size="14" fill="#3a4658">GitHub →「Actions」→「Build Windows installer」→「Run workflow」を押して数分待つだけ。</text>
  <text x="80" y="654" font-size="14" fill="#3a4658">✅ になったら「Artifacts」から ZIP をダウンロード → 解凍すれば同じ .exe が手に入る。</text>
  <rect x="980" y="600" width="180" height="40" rx="8" fill="#2fbf71"/>
  <text x="1070" y="625" font-size="14" font-weight="700" fill="#fff" text-anchor="middle">▶ Run workflow</text>

  <!-- arrows down to result -->
  <path d="M620,532 L620,700 L600,700" fill="none" stroke="#b3c0d2" stroke-width="2.5"/>
  <path d="M620,678 L620,700 L640,700" fill="none" stroke="#b3c0d2" stroke-width="2.5"/>

  <!-- result -->
  <rect x="410" y="710" width="420" height="56" rx="14" fill="url(#exe)" filter="url(#sh)"/>
  <text x="620" y="745" font-size="20" font-weight="700" fill="#ffffff" text-anchor="middle">✅ 完成：CheckListMaker Setup 1.0.0.exe</text>

  <text x="620" y="800" font-size="13" fill="#8a97a8" text-anchor="middle">※ 初回起動時に SmartScreen の警告が出たら「詳細情報 → 実行」（未署名のため／故障ではありません）</text>
</svg>
